{{- if .Values.secretBroker.enabled }}
{{- $certDir := "/etc/c8s/certs" -}}
{{- $ob := .Values.secretBroker.openbao -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "secret-broker.fullname" . }}-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secret-broker.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-broker
data:
  policy.json: |
{{ .Values.secretBroker.releasePolicy | toJson | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "secret-broker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secret-broker.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-broker
spec:
  type: {{ .Values.secretBroker.service.type }}
  ports:
    - port: {{ .Values.secretBroker.port }}
      targetPort: https
      protocol: TCP
      name: https
  selector:
    {{- include "secret-broker.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "secret-broker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secret-broker.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-broker
spec:
  replicas: {{ .Values.secretBroker.replicas }}
  selector:
    matchLabels:
      {{- include "secret-broker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "secret-broker.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.kata.enabled }}
      # Chart-managed mesh component (same pattern as cds): the webhook
      # excludes the release namespace, so the RuntimeClass is pinned directly.
      # The broker terminates attestation-gated TLS, so its plaintext (brokered
      # secrets) must stay inside the TEE boundary.
      runtimeClassName: kata-qemu-snp
      {{- end }}
      securityContext:
        {{- if .Values.kata.enabled }}
        runAsUser: 0
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
        {{- else }}
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        {{- end }}
      {{- include "c8s.imagePullSecrets" (dict "root" $ "local" .Values.secretBroker.imagePullSecrets) | nindent 6 }}
      initContainers:
        {{- include "c8s.getCertContainers" (dict
          "root" .
          "san" (printf "%s.%s.svc" (include "secret-broker.fullname" .) .Release.Namespace)
          "certOut" (printf "%s/tls.crt" $certDir)
          "keyOut" (printf "%s/tls.key" $certDir)
          "caOut" (printf "%s/ca.crt" $certDir)
          "volume" "c8s-certs"
          "mountPath" $certDir
          "renewInterval" .Values.secretBroker.certProvisioning.renewInterval
          "keyMode" "0640"
          "runAsUser" 65532
          "runAsGroup" 65532
          "runAsNonRoot" true
          "reloadNginx" "false"
        ) | nindent 8 }}
      containers:
        - name: secret-broker
          image: {{ include "c8s.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          args:
            - secret-broker
            - --host=0.0.0.0
            - --port={{ .Values.secretBroker.port }}
            - --tls-cert={{ $certDir }}/tls.crt
            - --tls-key={{ $certDir }}/tls.key
            - --policy=/etc/secret-broker/policy.json
            - --peer-verify={{ .Values.secretBroker.peerVerify }}
            {{- if eq .Values.secretBroker.peerVerify "ca" }}
            - --client-ca={{ $certDir }}/ca.crt
            {{- else }}
            - --attestation-api-url={{ include "c8s.attestationApiURL" . }}
            {{- range .Values.secretBroker.measurements }}
            - --measurements={{ . }}
            {{- end }}
            {{- end }}
            - --openbao-addr={{ required "secretBroker.openbao.address is required when secretBroker.enabled" $ob.address }}
            - --openbao-attested={{ $ob.attested }}
            {{- range $ob.measurements }}
            - --openbao-measurements={{ . }}
            {{- end }}
            {{- if $ob.credentialSecret.name }}
            {{- if eq $ob.authMethod "approle" }}
            - --openbao-approle-role-id={{ required "secretBroker.openbao.roleId is required for approle auth" $ob.roleId }}
            - --openbao-approle-secret-id-file=/etc/secret-broker-creds/{{ $ob.credentialSecret.key }}
            {{- else }}
            - --openbao-token-file=/etc/secret-broker-creds/{{ $ob.credentialSecret.key }}
            {{- end }}
            {{- end }}
          ports:
            - name: https
              containerPort: {{ .Values.secretBroker.port }}
              protocol: TCP
          volumeMounts:
            - name: c8s-certs
              mountPath: {{ $certDir }}
              readOnly: true
            - name: policy
              mountPath: /etc/secret-broker
              readOnly: true
            {{- if $ob.credentialSecret.name }}
            - name: openbao-creds
              mountPath: /etc/secret-broker-creds
              readOnly: true
            {{- end }}
          # Strict mTLS: the broker requires a client cert on every connection,
          # so an httpGet probe would fail the handshake. A TCP accept is the
          # correct "serving" signal (same pattern as cds under kata).
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: https
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              {{- toYaml .Values.secretBroker.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.secretBroker.resources.limits | nindent 14 }}
      volumes:
        - name: c8s-certs
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: policy
          configMap:
            name: {{ include "secret-broker.fullname" . }}-policy
        {{- if $ob.credentialSecret.name }}
        - name: openbao-creds
          secret:
            secretName: {{ $ob.credentialSecret.name }}
        {{- end }}
      nodeSelector:
        kubernetes.io/os: linux
        {{- with .Values.secretBroker.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.secretBroker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
