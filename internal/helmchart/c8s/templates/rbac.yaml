apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "c8s.operatorName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
{{ include "c8s.serviceAccountImagePullSecrets" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "c8s.operatorName" . }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
rules:
  - apiGroups: [confidential.ai]
    resources: [confidentialworkloads]
    verbs: [get, list, watch]
  - apiGroups: [confidential.ai]
    resources: [confidentialworkloads/status]
    verbs: [get, update, patch]
  - apiGroups: [""]
    resources: [pods]
    # delete: the startup reinject sweep deletes un-injected cw pods so their
    # controllers recreate them through the webhook.
    verbs: [get, list, watch, delete]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [admissionregistration.k8s.io]
    resources: [mutatingwebhookconfigurations]
    verbs: [get, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "c8s.operatorName" . }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "c8s.operatorName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "c8s.operatorName" . }}
    namespace: {{ .Release.Namespace }}
