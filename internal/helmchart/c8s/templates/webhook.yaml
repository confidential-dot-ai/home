apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "c8s.fullname" . }}-pod-injector
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
  {{- $webhookAnnotations := deepCopy (.Values.webhook.annotations | default dict) }}
  {{- /*
    AKS runs an "admissionsenforcer" controller that rewrites the
    namespaceSelector of admission webhooks and takes server-side-apply
    ownership of that field. Every later `helm upgrade` then fails with a
    field-manager conflict (UPGRADE FAILED: conflict with "admissionsenforcer"
    on .webhooks[...].namespaceSelector). On cvmMode=aks (what
    `c8s install --cvm-mode aks` sets) opt out so the chart's namespaceSelector
    stays authoritative across re-installs. An explicit webhook.annotations
    value for the same key wins.
  */}}
  {{- if and (eq (.Values.attestationApi.cvmMode | default "node") "aks") (not (hasKey $webhookAnnotations "admissions.enforcer/disabled")) }}
  {{- $_ := set $webhookAnnotations "admissions.enforcer/disabled" "true" }}
  {{- end }}
  {{- with $webhookAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
webhooks:
  - name: pods.c8s.confidential.ai
    admissionReviewVersions: [v1]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    timeoutSeconds: 5
    reinvocationPolicy: IfNeeded
    # get-cert injection is opt-in (confidential.ai/cw), so an un-annotated pod
    # is a no-op regardless of namespace. The exclusion matters for kata
    # enforcement, which forces a runtimeClassName onto any in-scope pod with
    # no annotation: without it, --kata-enforce would try to run c8s's own
    # control plane (operator, cds, attestation-api, tls-lb are not
    # hostNetwork) as kata VMs. The reinject sweep excludes the same set.
    namespaceSelector:
      matchExpressions:
        {{- include "c8s.webhookExcludedNamespaces" . | nindent 8 }}
    rules:
      - operations: [CREATE]
        apiGroups: [""]
        apiVersions: [v1]
        resources: [pods]
        scope: Namespaced
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "c8s.operatorName" . }}
        path: /mutate-pods
        port: {{ .Values.webhook.service.port }}
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
