{{- if .Values.attestationApi.enabled }}
{{- $nri := .Values.nriImagePolicy -}}
{{- $attestationNodePort := int .Values.attestationApi.service.nodePort -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "c8s.attestationApiName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-api
{{ include "c8s.serviceAccountImagePullSecrets" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "c8s.attestationApiName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-api
data:
  config.toml: |
{{ include "c8s.attestationApiConfig" (dict "root" .) | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "c8s.attestationApiName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-api
spec:
  {{- if $nri.enabled }}
  type: NodePort
  externalTrafficPolicy: Local
  {{- end }}
  selector:
    app.kubernetes.io/name: c8s-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: attestation-api
  # Local: pods always hit their same-node attestation-api replica.
  # /attest generates evidence for the LOCAL TEE, so a cross-node hop
  # would produce evidence against the wrong node.
  internalTrafficPolicy: Local
  ports:
    - name: http
      port: {{ .Values.attestationApi.port }}
      targetPort: http
      {{- if $nri.enabled }}
      nodePort: {{ $attestationNodePort }}
      {{- end }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "c8s.attestationApiName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: c8s-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: attestation-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c8s-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: attestation-api
      annotations:
        checksum/config: {{ include "c8s.attestationApiConfig" (dict "root" .) | sha256sum }}
    spec:
      {{- if eq .Values.attestationApi.cvmMode "node" }}
      # node-CVM base mode (chart-deployed DS, no --node-baked-host-services):
      # consumers dial http://$(HOST_IP):{{ .Values.attestationApi.port }} — the
      # unnumbered {{ .Values.attestationApi.port }} port, NOT the Service's
      # nodePort — so each pod attests via its own node's quote. Neither
      # ClusterIP nor NodePort exposes {{ .Values.attestationApi.port }} on the
      # node IP; only hostNetwork does. Not needed in earlier cvmModes: kata
      # dials 127.0.0.1 (in-guest attestation-api) and baremetal dials the
      # ClusterIP DNS name — those don't touch $(HOST_IP). Under
      # --node-baked-host-services the host image already runs the attestation-api
      # as a host service and this DaemonSet isn't rendered.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      serviceAccountName: {{ include "c8s.attestationApiName" . }}
      tolerations:
        - operator: Exists
      containers:
        - name: attestation-api
          image: {{ include "c8s.attestationApiImage" . }}
          imagePullPolicy: {{ .Values.attestationApi.image.pullPolicy }}
          args: [--config, /etc/attestation-api/config.toml]
          ports:
            - name: http
              containerPort: {{ .Values.attestationApi.port }}
          securityContext:
            {{- if has .Values.attestationApi.cvmMode (list "pod" "node" "gke" "aks") }}
            # All modes need privileged. A hostPath device mount does NOT add a
            # device-cgroup rule, so open(/dev/sev-guest|/dev/tdx-guest|/dev/tpm0)
            # is EPERM from an unprivileged container regardless of SYS_RAWIO
            # (cgroup v2 eBPF device controller; K8s has no securityContext field
            # for a single device rule). TODO: drop privileged by routing SNP/TDX
            # attest through the TSM configfs report interface
            # (/sys/kernel/config/tsm/report), which is a filesystem and not
            # device-cgroup gated.
            privileged: true
            readOnlyRootFilesystem: true
            # Seccomp is independent of privileged: even a privileged container
            # keeps a syscall filter, and the attestation-api makes only normal
            # syscalls. RuntimeDefault narrows the kernel surface (this container
            # is the widest on the node) and matches every other component.
            # runAsNonRoot/cap-drop are moot while privileged, so this is the one
            # substantive hardening available until the configfs path lands.
            seccompProfile:
              type: RuntimeDefault
            {{- else }}
{{ fail (printf "attestationApi.cvmMode must be one of pod, node, gke, aks (got %q)" .Values.attestationApi.cvmMode) }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/attestation-api
              readOnly: true
            {{- if .Values.attestationApi.teeDevices.sevGuest }}
            - name: sev-guest
              mountPath: /dev/sev-guest
            {{- end }}
            {{- if .Values.attestationApi.teeDevices.tdxGuest }}
            # Intel TDX quote generation. On a bare-metal TDX host,
            # /dev/tdx-guest DOES NOT EXIST — that's a guest-side device
            # only present inside a TDX VM. The host path is the kernel
            # ConfigFS TSM interface at /sys/kernel/config/tsm/report,
            # populated by CONFIG_TSM_REPORTS. Mount /sys/kernel/config so
            # attestation-api (built with `tdx_quote_method = "auto"`, or
            # explicit "configfs") can read report attributes to request
            # TDX quotes through QGS. When attestation-api runs INSIDE a
            # kata-guest-base image (Phase 7), the guest kernel exposes
            # /dev/tdx-guest natively — the in-guest binary sees it
            # through its own devfs, no hostPath needed there.
            - name: tdx-tsm-configfs
              mountPath: /sys/kernel/config
            {{- end }}
            {{- if .Values.attestationApi.teeDevices.tpm }}
            - name: tpm
              mountPath: /dev/tpm0
            - name: tpmrm
              mountPath: /dev/tpmrm0
            {{- end }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 2
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
          resources:
{{ toYaml .Values.attestationApi.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "c8s.attestationApiName" . }}
        # hostPath.type=CharDevice forces a hard failure on nodes that
        # lack the device, instead of silently mounting an empty file —
        # attestation evidence would then be silently bogus. Toggle each
        # device individually based on the host hardware shape.
        {{- if .Values.attestationApi.teeDevices.sevGuest }}
        - name: sev-guest
          hostPath:
            path: /dev/sev-guest
            type: CharDevice
        {{- end }}
        {{- if .Values.attestationApi.teeDevices.tdxGuest }}
        # See volumeMount comment above: on host mode we mount
        # /sys/kernel/config for the TSM ConfigFS report interface, NOT
        # /dev/tdx-guest (which is guest-side only). Directory type keeps
        # the same "hard fail on missing" semantics as CharDevice — a host
        # without CONFIG_TSM_REPORTS won't have this path and the pod will
        # fail cleanly instead of silently generating bogus evidence.
        - name: tdx-tsm-configfs
          hostPath:
            path: /sys/kernel/config
            type: Directory
        {{- end }}
        {{- if .Values.attestationApi.teeDevices.tpm }}
        - name: tpm
          hostPath:
            path: /dev/tpm0
            type: CharDevice
        - name: tpmrm
          hostPath:
            path: /dev/tpmrm0
            type: CharDevice
        {{- end }}
{{- end }}
