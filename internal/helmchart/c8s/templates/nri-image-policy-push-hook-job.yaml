{{- if .Values.nriImagePolicy.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nri-image-policy.fullname" . }}-push
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nri-image-policy.labels" . | nindent 4 }}
    app.kubernetes.io/component: cds-digest-push
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  backoffLimit: {{ .Values.nriImagePolicy.push.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.nriImagePolicy.push.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "nri-image-policy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cds-digest-push
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      {{- with .Values.cds.node.selector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cds.node.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nriImagePolicy.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: push
          image: {{ include "nri-image-policy.image" . }}
          imagePullPolicy: {{ .Values.nriImagePolicy.image.pullPolicy }}
          env:
            - name: SOCKET
              value: {{ printf "%s/%s" .Values.nriImagePolicy.hostPaths.runtimeDir .Values.nriImagePolicy.healthSocketName | quote }}
            - name: PAYLOAD
              value: |-
                {"version":"1","digests":{ {{ $d := required "cds.image.digest is required" .Values.cds.image.digest }}{{ $d | quote }}: {{ printf "%s@%s" .Values.cds.image.repository $d | quote }} }}
            - name: MAX_TIME
              value: {{ .Values.nriImagePolicy.push.curlMaxTime | quote }}
            - name: RETRIES
              value: {{ .Values.nriImagePolicy.push.retries | quote }}
            - name: RETRY_DELAY
              value: {{ .Values.nriImagePolicy.push.retryDelay | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              i=0
              while [ "$i" -lt "$RETRIES" ]; do
                if curl --unix-socket "$SOCKET" \
                        --fail --silent --show-error \
                        --max-time "$MAX_TIME" \
                        -X PUT http://localhost/whitelist \
                        -H 'Content-Type: application/json' \
                        --data "$PAYLOAD"; then
                  echo "push succeeded"
                  exit 0
                fi
                i=$((i + 1))
                echo "push attempt $i failed; sleeping $RETRY_DELAY s"
                sleep "$RETRY_DELAY"
              done
              echo "push failed after $RETRIES attempts" >&2
              exit 1
          volumeMounts:
            - name: nri-socket
              mountPath: {{ .Values.nriImagePolicy.hostPaths.runtimeDir | quote }}
          resources:
            {{- toYaml .Values.nriImagePolicy.push.resources | nindent 12 }}
      volumes:
        - name: nri-socket
          hostPath:
            path: {{ .Values.nriImagePolicy.hostPaths.runtimeDir | quote }}
            type: Directory
{{- end }}
