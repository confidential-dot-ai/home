{{- if .Values.ratlsMesh.enabled }}
{{- if .Values.ratlsMesh.prometheusRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "ratls-mesh.fullname" . }}-alerts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ratls-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: alerting
spec:
  groups:
    - name: ratls-mesh.rules
      rules:
        - alert: RATLSMeshResolverStale
          expr: |
            (time() - ratls_mesh_resolver_last_event_timestamp_seconds) > 300
            and ratls_mesh_resolver_last_event_timestamp_seconds > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh resolver watch stream stale on {{`{{ $labels.instance }}`}}"
            description: >-
              The K8s pod informer has not received any event for over
              5 minutes. This is a watch-stream liveness signal — the
              gauge advances on every event including pending-phase
              pods that don't mutate the cache, so absence over 5m
              means the watch itself is wedged, not that the cache is
              merely quiet.

        - alert: RATLSMeshNoMeasurementPinning
          expr: ratls_mesh_measurement_pinning == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh on {{`{{ $labels.instance }}`}} has no measurement pinning"
            description: >-
              --measurements is not set. Any TEE attestation will be accepted.

        - alert: RATLSMeshConnectionLimitRejections
          expr: rate(ratls_mesh_connection_limit_rejected_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh on {{`{{ $labels.instance }}`}} is rejecting connections"
            description: >-
              Global connection limit reached. Investigate potential DoS.

        - alert: RATLSMeshCertModeMismatch
          expr: ratls_mesh_cert_mode_mismatch == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh cert mode mismatch on {{`{{ $labels.instance }}`}}"
            description: >-
              CDS certificate upgrade may be stuck. Check CDS.

        - alert: RATLSMeshAttestationFailures
          expr: rate(ratls_mesh_attestation_failures_total[5m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "RA-TLS attestation failures on {{`{{ $labels.instance }}`}}"
            description: >-
              Peer attestation verification is failing. A non-TEE node may be connecting.

        - alert: RATLSMeshCertPipelineUnhealthy
          expr: ratls_mesh_cert_pipeline_healthy == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh cert pipeline unhealthy on {{`{{ $labels.instance }}`}}"
            description: >-
              CDS unreachable for over 10 minutes. Certificate renewal will fail.

        - alert: RATLSMeshAcceptLoopDegraded
          expr: ratls_mesh_accept_consecutive_errors > 5
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "RA-TLS mesh accept loop degraded on {{`{{ $labels.instance }}`}}"
            description: >-
              Accept loop has hit consecutive errors. Listener may be failing.

        - alert: RATLSMeshHighTLSHandshakeFailures
          expr: rate(ratls_mesh_tls_dial_failures_total[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh high TLS handshake failure rate on {{`{{ $labels.instance }}`}}"
            description: >-
              Sustained RA-TLS handshake failures. Possible measurement mismatch or misconfigured peer.

        - alert: RATLSMeshLocalCIDRRouteCheckUnavailable
          expr: ratls_mesh_resolver_local_cidrs == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh local CIDR route check unavailable on {{`{{ $labels.instance }}`}}"
            description: >-
              ValidateLocalDest has no host-discovered pod-network CIDRs.
              Inbound pod delivery is using Kubernetes Pod.Status.HostIP
              ownership until the resolver refresh discovers at least one local
              pod-network interface. Check CNI bridge/interface state and
              ratls-mesh logs if this is unexpected for the cluster CNI.

        - alert: RATLSMeshIptablesSyncWedged
          expr: |
            ratls_mesh_iptables_metrics_file_updated_at_seconds > 0
            and (time() - ratls_mesh_iptables_metrics_file_updated_at_seconds) > 90
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh iptables-sync stale on {{`{{ $labels.instance }}`}}"
            description: >-
              The iptables-sync sidecar's in-process counters
              (jump-position, ipset overflow) cannot signal a wedge after
              they stop being published; this alert catches that case via
              the freshness gauge. Pod-IP ipsets may be stale and new pod
              IPs may not be intercepted. Threshold is 3 × the default
              --resync-period (30s). Check container logs and
              kube_pod_container_status_restarts_total for the
              iptables-sync container.

        - alert: RATLSMeshOutboundDirectDial
          expr: rate(ratls_mesh_outbound_dest_rejected_total{reason="host_addr"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh observed direct dials to :15001 on {{`{{ $labels.instance }}`}}"
            description: >-
              Something reached the host-network outbound listener with
              the node IP or loopback as the original destination — only
              possible by dialing :15001 outside the iptables REDIRECT
              path. There is no legitimate cause. This is split from
              reason="unknown_pod" so the informer-skew baseline does
              not drown the security signal.

        - alert: RATLSMeshIptablesIPSetOverflow
          expr: rate(ratls_mesh_iptables_ipset_overflow_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh iptables ipset overflow on {{`{{ $labels.instance }}`}}"
            description: >-
              Pod count exceeded --ipset-maxelem; the reconcile rejected
              the restore and the live ipset is stale. New pod IPs will
              not be intercepted until the operator bumps
              iptablesSync.ipsetMaxElem and the DaemonSet rolls.

        - alert: RATLSMeshJumpPositionViolations
          expr: rate(ratls_mesh_iptables_jump_position_violations_total[5m]) > (1/60)
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh jump-position contention on {{`{{ $labels.instance }}`}}"
            description: >-
              The watchdog has been reasserting our PREROUTING/OUTPUT
              jump at position 1 more than once per minute for 10
              minutes — typically kube-proxy reinserting KUBE-SERVICES
              ahead of us. Tune iptablesSync.watchdogPeriod downward if
              necessary. Distinct from
              ratls_mesh_iptables_jump_position_check_errors_total
              which signals environmental noise (xtables.lock).

        - alert: RATLSMeshCWInboundDrops
          expr: rate(ratls_mesh_iptables_cw_inbound_drops_total[5m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh dropping non-mesh traffic to cw pods on {{`{{ $labels.instance }}`}}"
            description: >-
              The cw guard chain is dropping packets: something is dialing
              confidential-workload pods outside the mesh — a Service VIP
              selecting cw pods, a dial from an excluded source namespace,
              or a direct cross-node pod-IP dial. The workload is protected;
              investigate the client.

        - alert: RATLSMeshHighMemory
          expr: |
            container_memory_working_set_bytes{namespace="{{ .Release.Namespace }}", container="ratls-mesh"}
            / container_spec_memory_limit_bytes{namespace="{{ .Release.Namespace }}", container="ratls-mesh"}
            > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "RA-TLS mesh memory usage > 85% on {{`{{ $labels.instance }}`}}"
            description: >-
              Container memory above 85% of limit. Risk of OOMKill.
{{- end }}
{{- end }}
