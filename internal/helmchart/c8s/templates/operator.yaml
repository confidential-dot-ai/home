{{- if hasKey .Values.operator "replicas" }}
{{- fail "operator.replicas is unsupported; the operator must run as a singleton because webhook TLS is pod-local" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "c8s.operatorName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: operator
spec:
  # The webhook serving CA is minted inside this pod and patched into one
  # MutatingWebhookConfiguration. Running multiple replicas can race CA bundles
  # and break admission TLS for requests routed to the wrong pod.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: c8s-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c8s-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: operator
      {{- with .Values.operator.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "c8s.operatorName" . }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: operator
          image: {{ include "c8s.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: [ALL]
          args:
            - operator
            - --leader-election-namespace={{ .Release.Namespace }}
            - --status-mirror-enabled={{ .Values.statusMirror.enabled }}
            {{- if .Values.webhook.enabled }}
            - --operator-image={{ include "c8s.image" . }}
            - --assam-url={{ include "c8s.assamURL" . }}
            - --webhook-config-name={{ include "c8s.fullname" . }}-pod-injector
            - --webhook-service-name={{ include "c8s.operatorName" . }}
            - --webhook-service-namespace={{ .Release.Namespace }}
            {{- end }}
            {{- if .Values.attestationService.enabled }}
            - --attestation-service-url={{ include "c8s.attestationServiceURL" . }}
            {{- if .Values.webhook.enabled }}
            - --attestation-service-api-key-secret-name={{ include "c8s.workloadAPIKeySecretName" . }}
            - --attestation-service-api-key-secret-key={{ .Values.webhook.apiKeySecret.key }}
            {{- end }}
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - --cert-fs-group={{ .Values.webhook.certVolume.fsGroup }}
            - --cert-key-mode={{ .Values.webhook.certVolume.keyMode }}
            - --init-run-as-user={{ .Values.webhook.initContainer.runAsUser }}
            - --init-run-as-group={{ .Values.webhook.initContainer.runAsGroup }}
            - --init-run-as-non-root={{ .Values.webhook.initContainer.runAsNonRoot }}
            {{- end }}
            {{- range .Values.operator.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            periodSeconds: 30
          resources:
{{ toYaml .Values.operator.resources | indent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem: true forces any transient files
            # (controller-runtime cache tempfiles, etc.) to land in
            # this emptyDir rather than the immutable image.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "c8s.operatorName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: operator
spec:
  selector:
    app.kubernetes.io/name: c8s-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: operator
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
    {{- if .Values.webhook.enabled }}
    # Webhook service port. The API server dials this Service:port; the
    # MutatingWebhookConfiguration's clientConfig.service.port matches.
    # controller-runtime's webhook server listens on 9443 by default.
    - name: webhook
      port: {{ .Values.webhook.service.port }}
      targetPort: 9443
    {{- end }}
