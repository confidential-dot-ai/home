{{/*
One pull-mode installer DaemonSet on every node. Each plugin polls the CDS it
can reach (node-local NodePort), so operator `c8s allowlist add` writes reach
admission. CDS itself is pinned separately (cds.node.selector, in cds.yaml).
The name keeps the historical `-worker` suffix to preserve DaemonSet identity
across upgrade; there is no longer a `-cds` counterpart.
*/}}
{{- if .Values.nriImagePolicy.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nri-image-policy.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nri-image-policy.labels" . | nindent 4 }}
    app.kubernetes.io/component: nri-installer-worker
spec:
  selector:
    matchLabels:
      {{- include "nri-image-policy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nri-installer-worker
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        {{- include "nri-image-policy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nri-installer-worker
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      hostPID: true
      {{- with .Values.nriImagePolicy.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- include "c8s.imagePullSecrets" (dict "root" . "local" .Values.nriImagePolicy.imagePullSecrets) | nindent 6 }}
      tolerations:
        - operator: "Exists"
          effect: "NoExecute"
        - operator: "Exists"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
                  {{- range .Values.nriImagePolicy.nodeAffinity.excludeLabels }}
                  - key: {{ .key }}
                    operator: NotIn
                    values:
                      {{- toYaml .values | nindent 22 }}
                  {{- end }}
      initContainers:
        {{- if eq .Values.nriImagePolicy.distro "rke2" }}
        - name: containerd-prep
          image: {{ include "c8s-common.image" .Values.nriImagePolicy.containerdPrep.image }}
          imagePullPolicy: {{ .Values.nriImagePolicy.containerdPrep.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: HOST_CONTAINERD_DIR
              value: {{ include "nri-image-policy.containerdConfigDir" . | quote }}
            # The literal RKE2 base-config include, written verbatim into a
            # freshly created config template. Escaped so Helm emits it as-is.
            - name: BASE_DIRECTIVE
              value: '{{ "{{ template \"base\" . }}" }}'
          command: ["/bin/sh", "-c"]
          args:
            - |
{{ .Files.Get "files/scripts/containerd-prep.sh" | indent 14 }}
          volumeMounts:
            - name: host-containerd-config
              mountPath: /host{{ include "nri-image-policy.containerdConfigDir" . }}
          resources:
            {{- toYaml .Values.nriImagePolicy.resources | nindent 12 }}
        {{- end }}
        - name: install
          image: {{ include "nri-image-policy.image" . }}
          imagePullPolicy: {{ .Values.nriImagePolicy.image.pullPolicy }}
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
{{ include "nri-image-policy.installScript" (dict "root" . "bootConfig" (include "nri-image-policy.bootConfig" (dict "root" .))) | indent 14 }}
          volumeMounts:
            {{- include "nri-image-policy.hostVolumeMounts" . | nindent 12 }}
          resources:
            {{- toYaml .Values.nriImagePolicy.resources | nindent 12 }}
      containers:
        - name: pause
          image: {{ include "nri-image-policy.image" . }}
          imagePullPolicy: {{ .Values.nriImagePolicy.image.pullPolicy }}
          command: ["/bin/sh", "-c", "sleep infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        {{- include "nri-image-policy.hostVolumes" . | nindent 8 }}
{{- end }}
