apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "c8s.attestationServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-service
{{ include "c8s.serviceAccountImagePullSecrets" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "c8s.attestationServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-service
data:
  config.toml: |
{{ include "c8s.attestationServiceConfig" (dict "root" .) | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "c8s.attestationServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-service
spec:
  selector:
    app.kubernetes.io/name: c8s-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: attestation-service
  # Local: pods always hit their same-node attestation-service replica.
  # /attest generates evidence for the LOCAL TEE, so a cross-node hop
  # would produce evidence against the wrong node.
  internalTrafficPolicy: Local
  ports:
    - name: http
      port: {{ .Values.attestationService.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "c8s.attestationServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-service
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: c8s-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: attestation-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c8s-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: attestation-service
      annotations:
        checksum/config: {{ include "c8s.attestationServiceConfig" (dict "root" .) | sha256sum }}
    spec:
      serviceAccountName: {{ include "c8s.attestationServiceName" . }}
      tolerations:
        - operator: Exists
      containers:
        - name: attestation-service
          image: {{ include "c8s.attestationServiceImage" . }}
          imagePullPolicy: {{ .Values.attestationService.image.pullPolicy }}
          args: [--config, /etc/attestation-service/config.toml]
          ports:
            - name: http
              containerPort: {{ .Values.attestationService.port }}
          securityContext:
            {{- if .Values.attestationService.privileged }}
            privileged: true
            readOnlyRootFilesystem: true
            {{- else }}
{{ toYaml .Values.attestationService.securityContext | indent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/attestation-service
              readOnly: true
            {{- if .Values.attestationService.teeDevices.sevGuest }}
            - name: sev-guest
              mountPath: /dev/sev-guest
            {{- end }}
            {{- if .Values.attestationService.teeDevices.tdxGuest }}
            - name: tdx-guest
              mountPath: /dev/tdx-guest
            {{- end }}
            {{- if .Values.attestationService.teeDevices.tpm }}
            - name: tpm
              mountPath: /dev/tpm0
            - name: tpmrm
              mountPath: /dev/tpmrm0
            {{- end }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 2
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
          resources:
{{ toYaml .Values.attestationService.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "c8s.attestationServiceName" . }}
        # hostPath.type=CharDevice forces a hard failure on nodes that
        # lack the device, instead of silently mounting an empty file —
        # attestation evidence would then be silently bogus. Toggle each
        # device individually based on the host hardware shape.
        {{- if .Values.attestationService.teeDevices.sevGuest }}
        - name: sev-guest
          hostPath:
            path: /dev/sev-guest
            type: CharDevice
        {{- end }}
        {{- if .Values.attestationService.teeDevices.tdxGuest }}
        - name: tdx-guest
          hostPath:
            path: /dev/tdx-guest
            type: CharDevice
        {{- end }}
        {{- if .Values.attestationService.teeDevices.tpm }}
        - name: tpm
          hostPath:
            path: /dev/tpm0
            type: CharDevice
        - name: tpmrm
          hostPath:
            path: /dev/tpmrm0
            type: CharDevice
        {{- end }}
