{{/*
  Validate handoff wiring. With handoff.enabled=true the cds pod self-provisions
  its handoff signer EAR in process and registers /handoff, but every request is
  rejected unless the joining replica's launch digest is in cds.measurements
  (cds is its own EAR issuer, so the requester EAR is validated against cds and
  its measurement checked against the same flat allowlist). The guard catches
  the case where the operator turned handoff on but forgot to pin
  cds.measurements.
*/}}
{{- if .Values.cds.handoff.enabled -}}
  {{- if not .Values.cds.measurements -}}
    {{- /* Structured marker (kind=...) lets tests discriminate this fail without substring-matching the prose. */ -}}
    {{- fail "VALIDATION_ERROR kind=cds_handoff_measurements: cds.handoff.enabled requires cds.measurements to be set (the joining replica's launch digest). See docs/operator.md." -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "c8s.cdsName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cds
{{ include "c8s.serviceAccountImagePullSecrets" . }}
---
{{- if .Values.nriImagePolicy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "c8s.cdsName" . }}-allowlist-seed
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cds
data:
  allowlist-seed.json: {{ include "c8s.allowlistSeedJSON" . | trim | quote }}
---
{{- end }}
{{- if .Values.cds.operatorKeys }}
{{- if not (contains "BEGIN PUBLIC KEY" .Values.cds.operatorKeys) }}
{{- fail "cds.operatorKeys must be the PEM content of the operator public-key bundle, not a file path — use `c8s install --operator-keys <file>`, `c8s render-values --operator-keys <file>`, or helm --set-file cds.operatorKeys=<file>" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "c8s.cdsName" . }}-operator-keys
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cds
data:
  # PEM bundle of operator EC public keys that authorize allowlist writes.
  # Public key material — not a secret.
  keys.pem: {{ .Values.cds.operatorKeys | quote }}
---
{{- end }}
{{- if .Values.cds.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "c8s.cdsName" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cds
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.cds.persistence.size }}
  {{- if .Values.cds.persistence.storageClassName }}
  storageClassName: {{ .Values.cds.persistence.storageClassName | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "c8s.cdsName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cds
  annotations:
    confidential.ai/trust-root-mode: "inMemory"
spec:
  {{/* Singleton: the mesh CA and EAR signing key live in process memory, so a
       second replica would mint a divergent trust root. Active/active needs
       the /handoff path (cds.handoff.enabled), not extra replicas here. */}}
  replicas: 1
  # Recreate, not surge: the RWO data PVC and singleton
  # trust root both forbid two concurrent CDS pods. Dependents ride out the
  # brief CDS gap via get-cert's in-process retry.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: c8s-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: cds
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c8s-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: cds
      annotations:
        confidential.ai/trust-root-mode: "inMemory"
    spec:
      {{- if .Values.kata.enabled }}
      # Run the trust root inside a confidential VM. Its mesh CA and EAR signing
      # keys live only in SEV-SNP-encrypted guest memory, and peers verify cds's
      # RA-TLS serving cert against the guest launch measurement. Pinned directly
      # (not via the confidential.ai/cw webhook path) because get-cert would dial
      # cds — cds fetching a leaf from itself is a bootstrap cycle. See
      # docs/install-flows.md ("Why CDS doesn't use cw for its runtimeClass").
      runtimeClassName: {{ include "c8s.controlPlaneKataRuntimeClass" . }}
      {{- end }}
      serviceAccountName: {{ include "c8s.cdsName" . }}
      automountServiceAccountToken: false
      {{- /* CDS is a singleton trust root reached over a node-local NodePort
             and (with persistence) an RWO volume, so pin it to a known node.
             When image policy is on, this is also the node whose push-mode
             plugin and push-hook seed the CDS digest, so co-location keeps the
             policy from denying CDS on a worker node. */}}
      {{- with .Values.cds.node.selector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cds.node.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
      {{- if .Values.kata.enabled }}
        # In a kata-qemu-snp guest with shared_fs="none", the kubelet fsGroup
        # chown lands on a host emptyDir the guest never mounts, so the agent
        # creates a fresh root-owned /data inside the guest and UID 65532 cannot
        # write allowlist.db. Run as in-guest root — safe, since the SNP VM is the
        # trust boundary and cds is its sole workload.
        runAsUser: 0
        runAsNonRoot: false
      {{- else }}
{{ toYaml .Values.podSecurityContext | indent 8 }}
      {{- end }}
      containers:
        - name: cds
          image: {{ include "c8s.cdsImage" . }}
          imagePullPolicy: {{ .Values.cds.image.pullPolicy }}
          args:
            - --port={{ .Values.cds.port }}
            - --log-level={{ .Values.cds.logLevel }}
            # c8s.attestationApiURL resolves to the in-guest loopback endpoint
            # under kata.enabled (CDS runs inside the CVM where the baked
            # attestation-service listens) and to the host Service otherwise.
            - --attestation-api-url={{ include "c8s.attestationApiURL" . }}
            - --allowlist-db={{ .Values.cds.allowlistDB }}
            {{- if .Values.nriImagePolicy.enabled }}
            - --allowlist-seed=/etc/cds/allowlist-seed.json
            {{- end }}
            - --ear-issuer={{ .Values.cds.earIssuer }}
            {{- if .Values.cds.expectedIssuer }}
            - --expected-issuer={{ .Values.cds.expectedIssuer }}
            {{- end }}
            - --jwt-clock-skew={{ .Values.cds.jwtClockSkew }}
            - --ca-common-name={{ .Values.cds.ca.commonName }}
            - --ca-cert-validity={{ .Values.cds.ca.certValidity }}
            - --min-ca-validity={{ .Values.cds.ca.minValidity }}
            - --cert-ttl={{ .Values.cds.certTTL }}
            - --max-ttl={{ .Values.cds.maxTTL }}
            - --challenge-ttl={{ .Values.cds.challengeTTL }}
            - --request-timeout={{ .Values.cds.requestTimeout }}
            - --max-request-size={{ .Values.cds.maxRequestSize }}
            - --readiness-interval={{ .Values.cds.readinessInterval }}
            - --san-validation={{ .Values.cds.sanValidation }}
            {{- /* Always allow in-cluster Service SANs so the mesh's own
                   get-cert/ratls-mesh CSRs validate; operators append public
                   hostnames via cds.dnsSanPatterns without restating this. */}}
            - --dns-san-pattern={{ include "c8s.cdsDnsSanPattern" . }}
            {{- range .Values.cds.dnsSanPatterns }}
            - --dns-san-pattern={{ . }}
            {{- end }}
            {{- if .Values.cds.cnPattern }}
            - --allowed-cn-pattern={{ .Values.cds.cnPattern }}
            {{- end }}
            {{- with .Values.cds.measurements }}
            - --measurements={{ join "," . }}
            {{- end }}
            {{- if .Values.cds.operatorKeys }}
            - --operator-keys=/etc/cds-operator-keys/keys.pem
            {{- end }}
            {{- if .Values.cds.handoff.enabled }}
            - --handoff-measurements={{ join "," .Values.cds.measurements }}
            {{- end }}
            - --token-signer-rotation-interval={{ .Values.cds.tokenSignerRotationInterval }}
            - --token-signer-overlap={{ .Values.cds.tokenSignerOverlap }}
            - --token-signer-rotation-jitter={{ .Values.cds.tokenSignerRotationJitter }}
            - --rate-limit={{ .Values.cds.rateLimit }}
            - --rate-burst={{ .Values.cds.rateBurst }}
            - --rate-limiter-max-entries={{ .Values.cds.rateLimiterMaxEntries }}
            - --rate-limiter-evict-interval={{ .Values.cds.rateLimiterEvictInterval }}
            - --rate-limiter-idle-timeout={{ .Values.cds.rateLimiterIdleTimeout }}
            - --ratls-platform={{ .Values.cds.ratlsPlatform }}
            - --ratls-cert-ttl={{ .Values.cds.ratlsCertTTL }}
          ports:
            - name: https
              containerPort: {{ .Values.cds.port }}
          {{- if .Values.kata.enabled }}
          # In-guest cds serves mutual RA-TLS: the kubelet prober presents no
          # attested client cert, so an httpGet handshake is rejected. The port
          # only opens once cds has provisioned its RA-TLS serving cert (which
          # needs a healthy in-guest attestation-service), so an open socket is
          # the correct "attested and serving" signal.
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 3
          livenessProbe:
            tcpSocket:
              port: https
            periodSeconds: 30
          {{- else }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            periodSeconds: 30
          {{- end }}
          resources:
{{ toYaml .Values.cds.resources | indent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.nriImagePolicy.enabled }}
            - name: allowlist-seed
              mountPath: /etc/cds
              readOnly: true
            {{- end }}
            {{- if .Values.cds.operatorKeys }}
            - name: operator-keys
              mountPath: /etc/cds-operator-keys
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          {{- if .Values.kata.enabled }}
            runAsUser: 0
            runAsNonRoot: false
          {{- else }}
            runAsNonRoot: true
            runAsUser: 65532
          {{- end }}
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          {{- if .Values.cds.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "c8s.cdsName" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.nriImagePolicy.enabled }}
        - name: allowlist-seed
          configMap:
            name: {{ include "c8s.cdsName" . }}-allowlist-seed
        {{- end }}
        {{- if .Values.cds.operatorKeys }}
        - name: operator-keys
          configMap:
            name: {{ include "c8s.cdsName" . }}-operator-keys
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "c8s.cdsName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cds
spec:
  {{- if .Values.kata.enabled }}
  # Headless under kata so cluster DNS returns the cds pod IP, not a Service
  # ClusterIP. The in-guest ratls-mesh's outbound proxy reads the workload's
  # SO_ORIGINAL_DST and dials <that-ip>:15006 (the peer mesh's inbound
  # listener); a Service ClusterIP has no port-15006 endpoint, so the dial
  # times out (see ratls_mesh_tls_dial_failures_total). A pod IP routes
  # straight to the peer VM, where PREROUTING redirects port 15006 to the
  # local mesh inbound. NodePort is unused under kata anyway — install --kata
  # disables nriImagePolicy, the only consumer of cds NodePort.
  type: ClusterIP
  clusterIP: None
  {{- else }}
  type: {{ .Values.cds.service.type }}
  {{- end }}
  selector:
    app.kubernetes.io/name: c8s-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cds
  ports:
    - name: http
      port: {{ .Values.cds.port }}
      targetPort: https
      {{- if and (not .Values.kata.enabled) (eq .Values.cds.service.type "NodePort") .Values.cds.service.nodePort }}
      nodePort: {{ .Values.cds.service.nodePort }}
      {{- end }}
