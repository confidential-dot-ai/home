{{- if .Values.teeProxy.enabled }}
{{- /* The shared helper flips to the in-guest loopback attestation-api under
  kata.enabled — the host DaemonSet is not deployed in that shape, so a
  hardcoded Service URL would dial nothing. */ -}}
{{- $attestationURL := default (include "c8s.attestationApiURL" .) .Values.teeProxy.attestationURL -}}
{{- $certProvision := .Values.teeProxy.certProvisioning.enabled -}}
{{- $tlsDir := .Values.teeProxy.tls.mountPath -}}
{{- $useTLSDir := or .Values.teeProxy.tls.enabled $certProvision -}}
{{- $tlsMode := or $useTLSDir (ne .Values.teeProxy.domain "") -}}
{{- $probePort := ternary .Values.teeProxy.ports.https .Values.teeProxy.ports.http $tlsMode -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tee-proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tee-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  replicas: {{ .Values.teeProxy.replicas }}
  strategy:
    {{- toYaml .Values.teeProxy.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "tee-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tee-proxy.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.kata.enabled }}
      # Chart-managed mesh component: the webhook excludes the release
      # namespace, so the chart pins the RuntimeClass directly (same pattern as
      # cds.yaml). kata-qemu-snp specifically: the get-cert containers dial the
      # in-guest attestation-api on loopback under kata (c8s.attestationApiURL),
      # which only exists inside an SNP guest — and tee-proxy terminates tenant
      # TLS, so its plaintext must stay inside the TEE boundary.
      runtimeClassName: kata-qemu-snp
      {{- end }}
      {{- with .Values.teeProxy.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        sysctls:
          - name: net.ipv4.ip_unprivileged_port_start
            value: "0"
      {{- if gt (int .Values.teeProxy.replicas) 1 }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "tee-proxy.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- include "c8s.imagePullSecrets" (dict "root" $ "local" .Values.teeProxy.imagePullSecrets) | nindent 6 }}
      {{- if $certProvision }}
      initContainers:
        {{- include "c8s.getCertContainers" (dict
          "root" .
          "san" (printf "%s.%s.svc" (include "tee-proxy.fullname" .) .Release.Namespace)
          "certOut" (printf "%s/localhost+2.pem" $tlsDir)
          "keyOut" (printf "%s/localhost+2-key.pem" $tlsDir)
          "volume" "tls-certs"
          "mountPath" $tlsDir
          "renewInterval" .Values.teeProxy.certProvisioning.renewInterval
          "keyMode" "0640"
          "runAsUser" 65534
          "runAsGroup" 65534
          "runAsNonRoot" true
          "reloadNginx" "false"
        ) | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy
          image: {{ include "tee-proxy.image" . }}
          imagePullPolicy: {{ .Values.teeProxy.image.pullPolicy }}
          args:
            - --host
            - {{ .Values.teeProxy.domain | quote }}
            - --upstream
            - "http://{{ .Values.teeProxy.upstream }}"
            - --header-name
            - {{ .Values.teeProxy.headerName | quote }}
            {{- if $attestationURL }}
            - --attestation-url
            - {{ $attestationURL | quote }}
            {{- end }}
            {{- if $useTLSDir }}
            - --tls-dir
            - {{ $tlsDir | quote }}
            {{- end }}
          ports:
            - name: https
              containerPort: {{ .Values.teeProxy.ports.https }}
              {{- if .Values.teeProxy.hostPort.enabled }}
              hostPort: {{ .Values.teeProxy.hostPort.https | default .Values.teeProxy.ports.https }}
              {{- end }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.teeProxy.ports.http }}
              {{- if .Values.teeProxy.hostPort.enabled }}
              hostPort: {{ .Values.teeProxy.hostPort.http | default .Values.teeProxy.ports.http }}
              {{- end }}
              protocol: TCP
          workingDir: /tmp
          env:
            - name: AUTOCERT_DIR
              value: /app/certs
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: autocert-cache
              mountPath: /app/certs
            {{- if $certProvision }}
            - name: tls-certs
              mountPath: {{ $tlsDir }}
              readOnly: true
            {{- else if .Values.teeProxy.tls.enabled }}
            - name: static-tls
              mountPath: {{ .Values.teeProxy.tls.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            requests:
              {{- toYaml .Values.teeProxy.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.teeProxy.resources.limits | nindent 14 }}
          {{- /* httpGet, not tcpSocket: a TCP probe to the TLS port logs a
                 spurious "TLS handshake error: EOF". */}}
          readinessProbe:
            httpGet:
              path: /.well-known/health
              port: {{ $probePort }}
              scheme: {{ ternary "HTTPS" "HTTP" $tlsMode }}
            initialDelaySeconds: {{ .Values.teeProxy.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.teeProxy.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /.well-known/health
              port: {{ $probePort }}
              scheme: {{ ternary "HTTPS" "HTTP" $tlsMode }}
            initialDelaySeconds: {{ .Values.teeProxy.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.teeProxy.probes.liveness.periodSeconds }}
      volumes:
        - name: autocert-cache
          persistentVolumeClaim:
            claimName: {{ include "tee-proxy.fullname" . }}-certs
        {{- if $certProvision }}
        - name: tls-certs
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- else if .Values.teeProxy.tls.enabled }}
        - name: static-tls
          secret:
            secretName: {{ required "teeProxy.tls.secretName must be set when teeProxy.tls.enabled=true" .Values.teeProxy.tls.secretName }}
            items:
              - key: {{ .Values.teeProxy.tls.certKey }}
                path: localhost+2.pem
              - key: {{ .Values.teeProxy.tls.keyKey }}
                path: localhost+2-key.pem
        {{- end }}
      nodeSelector:
        kubernetes.io/os: linux
        {{- with .Values.teeProxy.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.teeProxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
