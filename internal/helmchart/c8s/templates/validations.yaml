{{- $tlsLB := .Values.tlsLb -}}
{{- $nri := .Values.nriImagePolicy -}}
{{- $nriCDSURL := tpl (default "" $nri.cds.url) . -}}
{{- $attestationNodePort := int .Values.attestationApi.service.nodePort -}}
{{- /*
  Helm silently ignores values keys the chart no longer reads, so a values
  file carried over from a release that still had tee-proxy would drop its
  settings (hostPort opt-out, upstream) without a trace. Fail loud instead.
*/ -}}
{{- if hasKey .Values "teeProxy" -}}
{{- fail "VALIDATION_ERROR kind=removed_component: teeProxy.* values are set, but the tee-proxy component was removed; tls-lb dials the workload directly. Migrate teeProxy.hostPort to tlsLb.hostPort and teeProxy.upstream to tlsLb.upstream.address, then drop the teeProxy block." -}}
{{- end -}}
{{- /*
  Hardware-TEE mutual exclusion. A single cluster picks one CPU TEE at install
  time (--hardware-platform sev-snp or tdx). teeDevices.sevGuest and
  teeDevices.tdxGuest select which /dev/{sev,tdx}-guest node is mounted on the
  attestation-api DaemonSet AND which shim/RuntimeClass helpers resolve to.
  Setting both would mount both device files (harmless) but leave the runtime-
  class helper (c8s.controlPlaneKataRuntimeClass) picking one arbitrarily,
  producing a config that "works on paper" but attests through only one path.
  Install CLI's --hardware-platform flag makes them mutually exclusive by
  construction; this guard catches raw -f overrides that bypass the CLI.
  aks (tpm) is orthogonal: it's the vTPM path and does not interact with these
  two flags.
*/ -}}
{{- if and .Values.attestationApi.teeDevices.sevGuest .Values.attestationApi.teeDevices.tdxGuest -}}
{{- fail "VALIDATION_ERROR kind=tee_mutually_exclusive: attestationApi.teeDevices.sevGuest=true and .tdxGuest=true both set. A cluster picks one CPU TEE at install time (--hardware-platform sev-snp OR tdx). Use `c8s install --hardware-platform=<sev-snp|tdx>` or set exactly one of the two flags via -f." -}}
{{- end -}}
{{- if and .Values.kata.enabled (ne .Values.webhook.failurePolicy "Fail") -}}
{{- fail (printf "kata.enabled=true requires webhook.failurePolicy=Fail (got %q): kata is enforcing — the ValidatingAdmissionPolicy rejects pods that reach validation without a kata RuntimeClass, so the mutating webhook that injects that class must also fail closed — otherwise an operator-down event silently bypasses enforcement" .Values.webhook.failurePolicy) -}}
{{- end -}}
{{- if and .Values.kata.enabled (lt (int .Values.kata.gpu.guestImage.pcieRootPort) 1) -}}
{{- fail (printf "VALIDATION_ERROR kind=gpu_pcie_root_port: kata.gpu.guestImage.pcieRootPort must be >= 1 (got %v). VFIO cold-plug attaches each passed-through GPU behind a pcie-root-port, so 0 disables passthrough: a GPU pod boots as a confidential VM with NO device and the only symptom is a missing /dev/nvidia* in-guest. Size it to the node's GPU count (default 8 = a full HGX board)." .Values.kata.gpu.guestImage.pcieRootPort) -}}
{{- end -}}
{{- /*
  kata.enabled is enforcing: every workload runs as a kata CVM, where these
  host-side components are replaced by their in-guest counterparts baked into
  kata-guest-base: ratls routing runs in-VM, attestation is served by the
  in-guest agent on loopback :8400 (see c8s.attestationApiURL), and image
  admission is the in-guest policy-monitor fed from CDS's served allowlist.
  Deploying the host versions alongside is at best dead weight and at worst a
  second, unattested enforcement path — require them off explicitly.
*/ -}}
{{- if .Values.kata.enabled -}}
{{- $hostSide := list -}}
{{- if .Values.ratlsMesh.enabled -}}{{- $hostSide = append $hostSide "ratlsMesh.enabled" -}}{{- end -}}
{{- if .Values.attestationApi.enabled -}}{{- $hostSide = append $hostSide "attestationApi.enabled" -}}{{- end -}}
{{- if .Values.nriImagePolicy.enabled -}}{{- $hostSide = append $hostSide "nriImagePolicy.enabled" -}}{{- end -}}
{{- with $hostSide -}}
{{- fail (printf "VALIDATION_ERROR kind=enforce_host_components: kata.enabled=true requires %s =false. kata is enforcing — every workload runs as a kata CVM, where these host-side components are replaced by their in-guest counterparts in the kata-guest-base image (in-VM ratls routing, in-guest attestation-api on loopback, in-guest policy-monitor image admission). `c8s install --cvm-mode=pod` sets them for you." (join ", " .)) -}}
{{- end -}}
{{- end -}}
{{- if and .Values.nriImagePolicy.enabled (not .Values.cds.image.digest) -}}
{{- /* Structured marker (kind=...) lets tests discriminate this fail without substring-matching the prose. */ -}}
{{- fail "VALIDATION_ERROR kind=cds_image_digest: nriImagePolicy.enabled requires cds.image.digest to be set. The CDS digest is pinned in every plugin's always_allow floor so image policy admits CDS on its own node. A floating tag cannot be admitted by digest. Pass --resolve-digests to c8s install, or set cds.image.digest via -f." -}}
{{- end -}}
{{- /*
  In fail-closed mode with deriveComponents off, every enabled c8s component
  that is digest-pinned must also be listed in bootstrapAllowlist.digests —
  otherwise the NRI plugin would deny that component's pod on its own node.
  cds.image is exempt: it is always added to the floor via the seed self-entry,
  independent of derivation. This guard only applies in fail-closed mode (the
  default); audit mode admits everything and never blocks.
*/ -}}
{{- if and .Values.nriImagePolicy.enabled (eq .Values.nriImagePolicy.policy.mode "fail-closed") (not .Values.nriImagePolicy.bootstrapAllowlist.deriveComponents) -}}
{{- $floor := .Values.nriImagePolicy.bootstrapAllowlist.digests -}}
{{- range $c := (include "c8s.components" . | fromJsonArray) -}}
{{- $img := get $c "image" -}}
{{- if and (get $c "enabled") (not (get $c "cdsExempt")) (get $img "digest") (not (hasKey $floor (get $img "digest"))) -}}
{{- fail (printf "VALIDATION_ERROR kind=uncovered_component_digest: nriImagePolicy.policy.mode=fail-closed with deriveComponents=false, but %s is digest-pinned (%s) and that digest is not in nriImagePolicy.bootstrapAllowlist.digests. The plugin would deny it on its own node. Add the digest to bootstrapAllowlist.digests, set deriveComponents=true, or use c8s install --resolve-digests." (get $c "name") (get $img "digest")) -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- if and $nri.enabled (not (hasPrefix "https://" $nriCDSURL)) -}}
{{- fail (printf "nriImagePolicy.cds.url must start with https:// when nriImagePolicy.enabled=true (got %q): the host plugin must fetch the allowlist over RA-TLS" $nriCDSURL) -}}
{{- end -}}
{{- if and $nri.enabled (or (lt $attestationNodePort 30000) (gt $attestationNodePort 32767)) -}}
{{- fail (printf "attestationApi.service.nodePort must be within the Kubernetes NodePort range 30000-32767 when nriImagePolicy.enabled=true (got %d)" $attestationNodePort) -}}
{{- end -}}
{{- /*
  Catch-all upstream check. No upstream is a legal state: tls-lb installs and
  serves with no catch-all until a backend is wired (install-then-attach). When
  an upstream IS set, it must be either:
   - an operator-managed headless Service (c8s-<id>.<ns>.svc.cluster.local:<port>,
     which `c8s install --upstream` derives): the app-layer hop is plaintext
     http, the node mesh intercepts the pod-IP hop and wraps it in attested mTLS.
     The shape match below is ADVISORY — it can't prove the Service is headless
     (a ClusterIP Service of the same name would be a VIP the mesh skips), so the
     real boundary is ratlsMesh.cwInboundEnforcement, which drops VIP/FORWARD-path
     hops to cw pods at runtime. This guard only catches accidental plaintext.
     An https protocol on this shape can only fail at runtime, so reject it.
   - a manual address that terminates and verifies TLS itself (app-TLS): must
     be https with tls.verify=true. A silently plaintext manual address would
     leave the hop unprotected. There is no plaintext-to-unattested escape hatch.
*/ -}}
{{- if and $tlsLB.enabled $tlsLB.upstream.address -}}
{{- /* c8s-<id> is a DNS-1035 label, <ns> a DNS-1123 label — the exact
  webhook.WorkloadServiceFQDN form the operator provisions and the mesh wraps. */ -}}
{{- if regexMatch "^c8s-[a-z]([-a-z0-9]*[a-z0-9])?\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?\\.svc\\.cluster\\.local:[0-9]+$" $tlsLB.upstream.address -}}
{{- if eq $tlsLB.upstream.protocol "https" -}}
{{- fail "VALIDATION_ERROR kind=workload_https_upstream: a c8s-<id> headless-Service upstream is plaintext http at the app layer (the mesh wraps the hop in attested mTLS), but tlsLb.upstream.protocol=https; use protocol http for a mesh-wrapped upstream" -}}
{{- end -}}
{{- else -}}
{{- include "tls-lb.requireSecuredBackend" (dict "protocol" $tlsLB.upstream.protocol "tls" $tlsLB.upstream.tls "address" $tlsLB.upstream.address "label" "tlsLb.upstream" "kind" "tlslb_unsecured_upstream" "suggest" "To reach a confidential workload adopt it with --workload-ref <id>=<ns>/<kind>/<name>:<port> and pass --upstream <id> (the mesh wraps that plaintext hop in attested mTLS); ") -}}
{{- end -}}
{{- end -}}
