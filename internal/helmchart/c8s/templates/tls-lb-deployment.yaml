{{- if .Values.tlsLb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tls-lb.fullname" . }}
  labels:
    {{- include "tls-lb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.tlsLb.nginx.replicas }}
  strategy:
    {{- toYaml .Values.tlsLb.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "tls-lb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tls-lb.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/tls-lb-configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.kata.enabled }}
      # Chart-managed mesh component: the webhook excludes the release
      # namespace, so the chart pins the RuntimeClass directly (same pattern as
      # cds.yaml). kata-qemu-snp specifically: the get-cert init containers dial
      # the in-guest attestation-api on loopback under kata
      # (c8s.attestationApiURL), which only exists inside an SNP guest — and
      # tls-lb terminates client TLS with mesh-issued keys, so its plaintext
      # must stay inside the TEE boundary.
      runtimeClassName: kata-qemu-snp
      {{- end }}
      {{- include "c8s.imagePullSecrets" (dict "root" $ "local" .Values.tlsLb.imagePullSecrets) | nindent 6 }}
      shareProcessNamespace: true
      initContainers:
        {{- include "tls-lb.getCertContainers" . | nindent 8 }}
      containers:
        - name: nginx
          image: {{ include "c8s-common.image" .Values.tlsLb.nginx.image }}
          imagePullPolicy: {{ .Values.tlsLb.nginx.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.tlsLb.nginx.httpsPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: {{ .Values.tlsLb.nginx.runAsNonRoot }}
            runAsUser: {{ include "c8s.int" .Values.tlsLb.nginx.runAsUser }}
            runAsGroup: {{ include "c8s.int" .Values.tlsLb.nginx.runAsGroup }}
            capabilities:
              drop:
                - ALL
          {{- if .Values.kata.enabled }}
          # Under kata the RA-TLS mesh moves into the guest, so the pod's
          # serving port is fronted by the in-guest inbound proxy, which expects
          # mutual attested TLS. The kubelet prober presents no attested client
          # cert, so an httpGet handshake is rejected ("tls: certificate
          # required"); a TCP accept is the correct "attested and serving"
          # signal. Same pattern and rationale as cds.yaml. In the base shape
          # the host-side mesh excludes kubelet's UID, so it reaches nginx
          # directly and the richer httpGet /healthz check below applies.
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- else }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- end }}
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tlsLb.tlsMountPath }}
              readOnly: true
            {{- if .Values.tlsLb.publicTLS.secretName }}
            - name: public-tls
              mountPath: {{ .Values.tlsLb.publicTLS.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.tlsLb.discovery.enabled }}
            - name: discovery
              mountPath: {{ .Values.tlsLb.discovery.mountPath }}
              readOnly: true
            {{- end }}
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /tmp
          {{- with .Values.tlsLb.nginx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tls-certs
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- if .Values.tlsLb.publicTLS.secretName }}
        - name: public-tls
          secret:
            secretName: {{ .Values.tlsLb.publicTLS.secretName }}
            items:
              - key: {{ .Values.tlsLb.publicTLS.certKey }}
                path: {{ .Values.tlsLb.publicTLS.certKey }}
              - key: {{ .Values.tlsLb.publicTLS.keyKey }}
                path: {{ .Values.tlsLb.publicTLS.keyKey }}
        {{- end }}
        {{- if .Values.tlsLb.discovery.enabled }}
        - name: discovery
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- end }}
        # medium: Memory is load-bearing under kata-qemu-snp with
        # shared_fs="none": a default (disk-backed) emptyDir gets provisioned
        # through kata-agent's CDH secure-storage path inside the guest and
        # fails CreateContainer ("[CDH] [ERROR]: Secure Mount failed").
        # tmpfs-backed emptyDirs are mounted directly by the guest kernel.
        - name: nginx-cache
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: nginx-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: nginx-config
          configMap:
            name: {{ include "tls-lb.fullname" . }}-nginx
      securityContext:
        runAsNonRoot: {{ .Values.tlsLb.nginx.runAsNonRoot }}
        fsGroup: {{ include "c8s.int" .Values.tlsLb.nginx.runAsGroup }}
        seccompProfile:
          type: RuntimeDefault
{{- end }}
