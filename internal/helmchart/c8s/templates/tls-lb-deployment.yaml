{{- if .Values.tlsLb.enabled }}
{{- if not (kindIs "bool" .Values.tlsLb.hostPort.enabled) -}}
{{- /* A string "false" is truthy and would both bind the node port and force
Recreate, silently defeating the operator's opt-out. */ -}}
{{- fail (printf "tlsLb.hostPort.enabled must be a boolean; do not set it via --set-string, got: %v" .Values.tlsLb.hostPort.enabled) -}}
{{- end -}}
{{- $defaultMeshCAPath := printf "%s/ca.pem" .Values.tlsLb.tlsMountPath -}}
{{- $upstreamTrustedCAPath := default $defaultMeshCAPath .Values.tlsLb.upstream.tls.trustedCAPath -}}
{{- $attestUsesHTTPSUpstream := and .Values.tlsLb.attest.enabled (eq .Values.tlsLb.upstream.protocol "https") -}}
{{- $upstreamAddress := .Values.tlsLb.upstream.address -}}
{{- $attestUpstreamServerName := default (include "tls-lb.serverNameFromAddress" $upstreamAddress) .Values.tlsLb.upstream.tls.serverName -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tls-lb.fullname" . }}
  labels:
    {{- include "tls-lb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.tlsLb.nginx.replicas }}
  strategy:
    {{- if .Values.tlsLb.strategy }}
    {{- toYaml .Values.tlsLb.strategy | nindent 4 }}
    {{- else if .Values.tlsLb.hostPort.enabled }}
    {{- /* Two pods on a node would collide on the host port; on a single-node
    cluster a surge pod could never schedule, deadlocking the roll. */}}
    type: Recreate
    {{- else }}
    {{- /* Surge so the new (cert-holding) pod is Ready before the old one is
    retired: the front door keeps serving across a roll. */}}
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  selector:
    matchLabels:
      {{- include "tls-lb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tls-lb.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/tls-lb-configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.kata.enabled }}
      # Chart-managed mesh component: the webhook excludes the release
      # namespace, so the chart pins the RuntimeClass directly (same pattern as
      # cds.yaml). kata-qemu-snp specifically: the get-cert init containers dial
      # the in-guest attestation-api on loopback under kata
      # (c8s.attestationApiURL), which only exists inside an SNP guest — and
      # tls-lb terminates client TLS with mesh-issued keys, so its plaintext
      # must stay inside the TEE boundary.
      runtimeClassName: {{ include "c8s.controlPlaneKataRuntimeClass" . }}
      {{- end }}
      {{- include "c8s.imagePullSecrets" (dict "root" $ "local" .Values.tlsLb.imagePullSecrets) | nindent 6 }}
      shareProcessNamespace: true
      initContainers:
        {{- include "tls-lb.getCertContainers" . | nindent 8 }}
      containers:
        - name: nginx
          image: {{ include "c8s-common.image" .Values.tlsLb.nginx.image }}
          imagePullPolicy: {{ .Values.tlsLb.nginx.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.tlsLb.nginx.httpsPort }}
              {{- if .Values.tlsLb.hostPort.enabled }}
              hostPort: {{ .Values.tlsLb.hostPort.https | default 443 }}
              {{- end }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: {{ .Values.tlsLb.nginx.runAsNonRoot }}
            runAsUser: {{ include "c8s.int" .Values.tlsLb.nginx.runAsUser }}
            runAsGroup: {{ include "c8s.int" .Values.tlsLb.nginx.runAsGroup }}
            capabilities:
              drop:
                - ALL
          {{- if .Values.kata.enabled }}
          # Under kata the RA-TLS mesh moves into the guest, so the pod's
          # serving port is fronted by the in-guest inbound proxy, which expects
          # mutual attested TLS. The kubelet prober presents no attested client
          # cert, so an httpGet handshake is rejected ("tls: certificate
          # required"); a TCP accept is the correct "attested and serving"
          # signal. Same pattern and rationale as cds.yaml. In the base shape
          # the host-side mesh excludes kubelet's UID, so it reaches nginx
          # directly and the richer httpGet /healthz check below applies.
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- else }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- end }}
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tlsLb.tlsMountPath }}
              readOnly: true
            {{- if .Values.tlsLb.publicTLS.secretName }}
            - name: public-tls
              mountPath: {{ .Values.tlsLb.publicTLS.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.tlsLb.discovery.enabled }}
            - name: discovery
              mountPath: {{ .Values.tlsLb.discovery.mountPath }}
              readOnly: true
            {{- end }}
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /tmp
          {{- with .Values.tlsLb.nginx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.tlsLb.attest.enabled }}
        - name: cds-attest
          image: {{ include "c8s.image" . }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.image.pullPolicy }}
          args:
            - cds-attest
            - --host=127.0.0.1
            - --port={{ .Values.tlsLb.attest.port }}
            - --platform={{ .Values.tlsLb.attest.platform }}
            - --generation={{ .Values.tlsLb.attest.generation }}
            - --attestation-api-url={{ default (include "c8s.attestationApiURL" .) .Values.tlsLb.attest.attestationApiURL }}
            # Bind the *exact* leaf nginx presents on the wire (ssl_certificate =
            # publicCertPath), so the tls-cert attestation binding (GET
            # .../attestation?pq=false) commits report_data to the SPKI a direct-TLS
            # client (e.g. TEErminator Flow B) actually sees. With the default
            # (publicTLS unset) this is the mesh leaf at tlsMountPath/cert.pem; with a
            # publicTLS secret it is that cert (mounted below). Re-read per request, so
            # get-cert renewals are picked up.
            - --serving-cert-file={{ include "tls-lb.publicCertPath" . }}
            # The identity-bound PQ v2 flow must use the TEE-held mesh
            # credential, never the optional publicTLS Secret: report_data
            # commits the hybrid session key to this leaf and the sidecar
            # proves possession with its matching private key.
            - --mesh-identity-cert-file={{ .Values.tlsLb.tlsMountPath }}/cert.pem
            - --mesh-identity-key-file={{ .Values.tlsLb.tlsMountPath }}/key.pem
            - --mesh-identity-ca-file={{ .Values.tlsLb.tlsMountPath }}/ca.pem
            # --cds-cert-file is intentionally NOT set: nginx serves the same cert
            # statically at /.well-known/c8s/cds-cert.pem from the shared cert volume
            # and hot-reloads it on get-cert renewal (SIGHUP), whereas cds-attest
            # would read it once at startup and embed a stale copy in every bundle.
            # Legacy v1 does not bind cds_cert_pem to attestation. The v2 PQ
            # response re-reads and embeds the exact mesh leaf + issuing CA
            # committed by report_data and its proof-of-possession signature.
            # Terminate over-encryption here and forward to the same workload
            # backend nginx proxies to. An http upstream is plaintext at the
            # app layer; pointed at a headless Service (an adopted workload),
            # the node mesh wraps the pod-IP hop in attested mTLS. An https
            # upstream terminates TLS itself and gets the mTLS args below.
            - --upstream={{ .Values.tlsLb.upstream.protocol }}://{{ $upstreamAddress }}
            {{- if $attestUsesHTTPSUpstream }}
            - --upstream-ca={{ $upstreamTrustedCAPath }}
            {{- if .Values.tlsLb.upstream.tls.useCDSClientCert }}
            - --upstream-cert={{ .Values.tlsLb.tlsMountPath }}/cert.pem
            - --upstream-key={{ .Values.tlsLb.tlsMountPath }}/key.pem
            {{- end }}
            - --upstream-server-name={{ $attestUpstreamServerName }}
            {{- end }}
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tlsLb.tlsMountPath }}
              readOnly: true
            {{- if .Values.tlsLb.publicTLS.secretName }}
            # cds-attest reads the same public leaf nginx serves (for the tls-cert
            # binding's --serving-cert-file).
            - name: public-tls
              mountPath: {{ .Values.tlsLb.publicTLS.mountPath }}
              readOnly: true
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          {{- with .Values.tlsLb.attest.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        - name: tls-certs
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- if .Values.tlsLb.publicTLS.secretName }}
        - name: public-tls
          secret:
            secretName: {{ .Values.tlsLb.publicTLS.secretName }}
            items:
              - key: {{ .Values.tlsLb.publicTLS.certKey }}
                path: {{ .Values.tlsLb.publicTLS.certKey }}
              - key: {{ .Values.tlsLb.publicTLS.keyKey }}
                path: {{ .Values.tlsLb.publicTLS.keyKey }}
        {{- end }}
        {{- if .Values.tlsLb.discovery.enabled }}
        - name: discovery
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- end }}
        # medium: Memory is load-bearing under kata-qemu-snp with
        # shared_fs="none": a default (disk-backed) emptyDir gets provisioned
        # through kata-agent's CDH secure-storage path inside the guest and
        # fails CreateContainer ("[CDH] [ERROR]: Secure Mount failed").
        # tmpfs-backed emptyDirs are mounted directly by the guest kernel.
        - name: nginx-cache
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: nginx-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: nginx-config
          configMap:
            name: {{ include "tls-lb.fullname" . }}-nginx
      securityContext:
        runAsNonRoot: {{ .Values.tlsLb.nginx.runAsNonRoot }}
        fsGroup: {{ include "c8s.int" .Values.tlsLb.nginx.runAsGroup }}
        seccompProfile:
          type: RuntimeDefault
{{- end }}
