{{- if .Values.tlsLb.enabled }}
{{- $sans := include "tls-lb.sanList" . | fromJsonArray -}}
{{- range $s := $sans -}}{{- include "tls-lb.validateSan" $s -}}{{- end -}}
{{- $serverNames := join " " $sans -}}
{{- include "tls-lb.validateProtocol" (required "protocol must be http or https" .Values.tlsLb.upstream.protocol) -}}
{{- $defaultMeshCAPath := printf "%s/ca.pem" .Values.tlsLb.tlsMountPath -}}
{{- $upstreamTrustedCAPath := default $defaultMeshCAPath .Values.tlsLb.upstream.tls.trustedCAPath -}}
{{- $upstreamAddress := .Values.tlsLb.upstream.address | trim -}}
{{- /*
  No upstream is a legal state: tls-lb serves its cert and explicit routes with
  no catch-all until one is wired (an install-then-attach-inference flow). The
  address-format check, the secured-backend guard (validations.yaml), and the
  location / block all render only when an upstream is set.
*/ -}}
{{- $upstreamServerName := "" -}}
{{- if $upstreamAddress -}}
{{- if not (regexMatch `^[^[:space:]{};/#]+$` $upstreamAddress) -}}
{{- fail (printf "tlsLb.upstream.address must be a host:port address without scheme, whitespace, semicolons, braces, slashes, or '#', got: %s" $upstreamAddress) -}}
{{- end -}}
{{- $upstreamServerName = default (include "tls-lb.serverNameFromAddress" $upstreamAddress) .Values.tlsLb.upstream.tls.serverName -}}
{{- include "tls-lb.validateProxyTLS" (dict "protocol" .Values.tlsLb.upstream.protocol "tls" .Values.tlsLb.upstream.tls "serverName" $upstreamServerName "trustedCAPath" $upstreamTrustedCAPath "label" "tlsLb.upstream") -}}
{{- end -}}
{{- include "tls-lb.validateCORS" .Values.tlsLb.cors -}}
{{- range $i, $route := .Values.tlsLb.routes -}}
{{- include "tls-lb.validateRouteCORS" (dict "cors" $route.cors "label" (printf "tlsLb.routes[%d]" $i)) -}}
{{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tls-lb.fullname" . }}-nginx
  labels:
    {{- include "tls-lb.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';
        access_log /var/log/nginx/access.log main;

        sendfile on;
        keepalive_timeout 65;
{{- if default false .Values.tlsLb.cors.enabled }}
        {{- include "tls-lb.corsMap" . | nindent 8 }}
{{- end }}

        # The catch-all upstream is dialed via a variable (see location /), so
        # nginx re-resolves it here at request time per record TTL. A static
        # upstream block would pin the pod IPs a headless-Service name (an
        # adopted workload) resolved to at startup and 502 after pod churn.
        resolver {{ .Values.tlsLb.nginx.resolver }};

        {{- range $i, $route := .Values.tlsLb.routes }}
        {{- if hasKey $route "upstream" }}
        {{- fail (printf "tlsLb.routes[%d].upstream is not supported; set backend.address and backend.protocol instead" $i) }}
        {{- end }}
        {{- $backend := required (printf "tlsLb.routes[%d].backend is required" $i) $route.backend }}
        {{- $backendAddress := required (printf "tlsLb.routes[%d].backend.address is required" $i) $backend.address }}
        {{- if not (regexMatch `^[^[:space:]{};/#]+$` $backendAddress) }}
        {{- fail (printf "tlsLb.routes[%d].backend.address must be a host:port address without scheme, whitespace, semicolons, braces, slashes, or '#', got: %s" $i $backendAddress) }}
        {{- end }}
        upstream route_{{ $i }} {
            server {{ $backendAddress }};
        }

        {{- end }}
        server {
            listen {{ .Values.tlsLb.nginx.httpsPort }} ssl;
            server_name {{ $serverNames }};

            ssl_certificate     {{ include "tls-lb.publicCertPath" . }};
            ssl_certificate_key {{ include "tls-lb.publicKeyPath" . }};

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
            ssl_prefer_server_ciphers on;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 1d;

            # Headroom for upstream responses with large headers.
            proxy_buffer_size 16k;
            proxy_buffers 4 16k;

            {{- range $i, $route := .Values.tlsLb.routes }}
            {{- $path := required (printf "tlsLb.routes[%d].path is required" $i) $route.path }}
            {{- $match := default "prefix" $route.match }}
            {{- if not (or (eq $match "exact") (eq $match "prefix")) }}
            {{- fail (printf "tlsLb.routes[%d].match must be 'exact' or 'prefix', got: %s" $i $match) }}
            {{- end }}
            {{- if not (regexMatch `^/[A-Za-z0-9._~!$&()*+,=:@%/-]*$` $path) }}
            {{- fail (printf "tlsLb.routes[%d].path must start with '/' and contain only URI path characters safe for nginx locations, got: %s" $i $path) }}
            {{- end }}
            {{- $backend := required (printf "tlsLb.routes[%d].backend is required" $i) $route.backend }}
            {{- $backendAddress := required (printf "tlsLb.routes[%d].backend.address is required" $i) $backend.address }}
            {{- $backendProtocol := default "http" $backend.protocol }}
            {{- if not (or (eq $backendProtocol "http") (eq $backendProtocol "https")) }}
            {{- fail (printf "tlsLb.routes[%d].backend.protocol must be 'http' or 'https', got: %s" $i $backendProtocol) }}
            {{- end }}
            {{- if not (regexMatch `^[^[:space:]{};/#]+$` $backendAddress) }}
            {{- fail (printf "tlsLb.routes[%d].backend.address must be a host:port address without scheme, whitespace, semicolons, braces, slashes, or '#', got: %s" $i $backendAddress) }}
            {{- end }}
            {{- $backendTLS := default dict $backend.tls }}
            {{- $backendTrustedCAPath := default $defaultMeshCAPath $backendTLS.trustedCAPath }}
            {{- $backendServerName := default (include "tls-lb.serverNameFromAddress" $backendAddress) $backendTLS.serverName }}
            {{- include "tls-lb.validateProxyTLS" (dict "protocol" $backendProtocol "tls" $backendTLS "serverName" $backendServerName "trustedCAPath" $backendTrustedCAPath "label" (printf "tlsLb.routes[%d].backend" $i)) }}
            {{- if and (ne $backendProtocol "https") (or (default false $backendTLS.verify) (default false $backendTLS.useCDSClientCert)) }}
            {{- fail (printf "tlsLb.routes[%d].backend.tls.verify and useCDSClientCert require backend.protocol: https" $i) }}
            {{- end }}
            {{- include "tls-lb.requireSecuredBackend" (dict "protocol" $backendProtocol "tls" $backendTLS "address" $backendAddress "label" (printf "tlsLb.routes[%d].backend" $i) "kind" "tlslb_unsecured_route" "suggest" "") }}
            {{- /* Route inherits the global CORS block; route.cors.enabled (if set) toggles it on/off for this route only. */}}
            {{- $routeCors := deepCopy $.Values.tlsLb.cors }}
            {{- if and (hasKey $route "cors") (hasKey (default dict $route.cors) "enabled") }}
            {{- $_ := set $routeCors "enabled" $route.cors.enabled }}
            {{- end }}
            # Route: {{ $path }} -> {{ $backendProtocol }}://{{ $backendAddress }}
            {{- if eq $match "exact" }}
            location = {{ $path }} {
            {{- else }}
            location {{ $path }} {
            {{- end }}
                {{- if default false $routeCors.enabled }}
                {{- include "tls-lb.corsLocationDirectives" $routeCors | nindent 16 }}
                {{- end }}
                {{- if eq $backendProtocol "https" }}
                {{- include "tls-lb.proxySSLDirectives" (dict "protocol" $backendProtocol "tls" $backendTLS "serverName" $backendServerName "trustedCAPath" $backendTrustedCAPath "tlsMountPath" $.Values.tlsLb.tlsMountPath) | nindent 16 }}
                {{- end }}
                proxy_pass {{ $backendProtocol }}://route_{{ $i }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            {{- end }}
            {{- if .Values.tlsLb.discovery.enabled }}
            location = {{ .Values.tlsLb.discovery.path }} {
                {{- if default false .Values.tlsLb.cors.enabled }}
                {{- include "tls-lb.corsLocationDirectives" .Values.tlsLb.cors | nindent 16 }}
                {{- end }}
                access_log off;
                default_type application/json;
                add_header Cache-Control "no-store" always;
                alias {{ include "tls-lb.discoveryFilePath" . }};
            }

            location = {{ .Values.tlsLb.discovery.cdsCertPath }} {
                {{- if default false .Values.tlsLb.cors.enabled }}
                {{- include "tls-lb.corsLocationDirectives" .Values.tlsLb.cors | nindent 16 }}
                {{- end }}
                access_log off;
                default_type application/x-pem-file;
                add_header Cache-Control "no-store" always;
                alias {{ .Values.tlsLb.tlsMountPath }}/cert.pem;
            }

            {{- if .Values.tlsLb.meshCA.expose }}
            location = {{ .Values.tlsLb.discovery.meshCAPath }} {
                {{- if default false .Values.tlsLb.cors.enabled }}
                {{- include "tls-lb.corsLocationDirectives" .Values.tlsLb.cors | nindent 16 }}
                {{- end }}
                access_log off;
                default_type application/x-pem-file;
                add_header Cache-Control "no-store" always;
                alias {{ $defaultMeshCAPath }};
            }
            {{- end }}

            {{- end }}
            {{- if .Values.tlsLb.attest.enabled }}
            # c8s-verify/v1 attestation + over-encryption sidecar (loopback).
            # nginx serves the static cert(s) via discovery above; the dynamic
            # per-session attestation challenge and PQ handshake are proxied to
            # the in-pod `cds-attest` sidecar.
            location /.well-known/c8s/ {
                {{- if default false .Values.tlsLb.cors.enabled }}
                {{- include "tls-lb.corsLocationDirectives" .Values.tlsLb.cors | nindent 16 }}
                {{- end }}
                proxy_pass http://127.0.0.1:{{ .Values.tlsLb.attest.port }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            {{- end }}
            {{- if $upstreamAddress }}
            location / {
                {{- if default false .Values.tlsLb.cors.enabled }}
                {{- include "tls-lb.corsLocationDirectives" .Values.tlsLb.cors | nindent 16 }}
                {{- end }}
                {{- if eq .Values.tlsLb.upstream.protocol "https" }}
                {{- include "tls-lb.proxySSLDirectives" (dict "protocol" .Values.tlsLb.upstream.protocol "tls" .Values.tlsLb.upstream.tls "serverName" $upstreamServerName "trustedCAPath" $upstreamTrustedCAPath "tlsMountPath" .Values.tlsLb.tlsMountPath) | nindent 16 }}
                {{- end }}
                set $backend_addr {{ $upstreamAddress }};
                proxy_pass {{ .Values.tlsLb.upstream.protocol }}://$backend_addr;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
            {{- end }}

            location /healthz {
                access_log off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }
        }
    }
{{- end }}
