{{- $publicBundlePersistence := .Values.certIssuer.ca.publicBundlePersistence -}}
{{/*
  Validate handoff wiring. With handoff.enabled=true the cert-issuer pod
  starts its bootstrap loop and registers /handoff, but every request
  will 403 unless an active cert-issuer's resource-map authorises the
  joining replica's measurement. Today both replicas run the same image
  (same launch digest), so we derive the resourceMap entry from
  certIssuer.measurements rather than asking operators to set the same
  value twice. The validation guards the case where the operator turned
  handoff on but forgot to pin certIssuer.measurements.
*/}}
{{- if .Values.certIssuer.handoff.enabled -}}
  {{- if not .Values.certIssuer.measurements -}}
    {{- /* Structured marker (kind=...) lets tests discriminate this fail from other helm errors without substring-matching the prose. */ -}}
    {{- fail "VALIDATION_ERROR kind=handoff_measurements: certIssuer.handoff.enabled requires certIssuer.measurements to be set (cert-issuer's own launch digest); the chart auto-injects a cert-issuer/handoff entry into certIssuer.resourceMap for each measurement. See docs/operator.md." -}}
  {{- end -}}
{{- end -}}
{{/*
  Build the effective resourceMap by merging the operator-supplied value
  with auto-injected cert-issuer/handoff entries derived from
  certIssuer.measurements (single source of truth — operators never set
  the handoff measurement in two places).
*/}}
{{- $effectiveResourceMap := deepCopy (default (dict) .Values.certIssuer.resourceMap) -}}
{{- if .Values.certIssuer.handoff.enabled -}}
  {{- range .Values.certIssuer.measurements -}}
    {{- $measurement := . -}}
    {{- $existing := default (list) (index $effectiveResourceMap $measurement) -}}
    {{- if not (or (has "cert-issuer/handoff" $existing) (has "cert-issuer/*" $existing)) -}}
      {{- $_ := set $effectiveResourceMap $measurement (append $existing "cert-issuer/handoff") -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if $effectiveResourceMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "c8s.certIssuerResourceMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cert-issuer
data:
  resource-map.json: |
{{ toPrettyJson $effectiveResourceMap | indent 4 }}
---
{{- end }}
{{- if not $publicBundlePersistence.existingClaim }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "c8s.certIssuerPublicBundleClaimName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cert-issuer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $publicBundlePersistence.size | quote }}
  {{- if $publicBundlePersistence.storageClassName }}
  storageClassName: {{ $publicBundlePersistence.storageClassName | quote }}
  {{- end }}
---
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "c8s.certIssuerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cert-issuer
{{ include "c8s.serviceAccountImagePullSecrets" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "c8s.certIssuerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cert-issuer
  annotations:
    confidential.ai/trust-root-mode: "inMemory"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: c8s-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: cert-issuer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c8s-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: cert-issuer
      annotations:
        confidential.ai/trust-root-mode: "inMemory"
    spec:
      serviceAccountName: {{ include "c8s.certIssuerName" . }}
      automountServiceAccountToken: false
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: cert-issuer
          image: {{ include "c8s.certIssuerImage" . }}
          imagePullPolicy: {{ .Values.certIssuer.image.pullPolicy }}
          args:
            - --listen=:{{ .Values.certIssuer.port }}
            - --ca-common-name={{ .Values.certIssuer.ca.commonName }}
            - --ca-repo-dir={{ $publicBundlePersistence.mountPath }}
            - --jwks-url={{ include "c8s.certIssuerJWKSURL" . }}
            - --jwks-cache-ttl={{ .Values.certIssuer.jwksCacheTTL }}
            {{- with .Values.assam.measurements }}
            - --assam-measurements={{ join "," . }}
            {{- end }}
            - --expected-issuer={{ .Values.certIssuer.expectedIssuer }}
            - --max-ttl={{ .Values.certIssuer.ca.maxTTL }}
            - --min-ca-validity={{ .Values.certIssuer.ca.minValidity }}
            - --ca-cert-validity={{ .Values.certIssuer.ca.certValidity }}
            - --ca-rotation-interval={{ .Values.certIssuer.ca.rotationInterval }}
            - --rate-limit={{ .Values.certIssuer.rateLimit }}
            - --rate-burst={{ .Values.certIssuer.rateBurst }}
            - --log-level={{ .Values.certIssuer.logLevel }}
            - --san-validation={{ .Values.certIssuer.sanValidation }}
            {{- if $effectiveResourceMap }}
            - --resource-map=/etc/cert-issuer/resource-map.json
            {{- end }}
            {{- if .Values.certIssuer.dnsSanPattern }}
            - --dns-san-pattern={{ .Values.certIssuer.dnsSanPattern }}
            {{- end }}
            {{- if .Values.certIssuer.cnPattern }}
            - --allowed-cn-pattern={{ .Values.certIssuer.cnPattern }}
            {{- end }}
            {{- if .Values.certIssuer.handoff.enabled }}
            - --handoff-assam-url={{ include "c8s.assamURL" . }}
            - --handoff-attestation-service-url={{ include "c8s.attestationServiceURL" . }}
            {{- end }}
            - --ratls-platform={{ .Values.certIssuer.ratlsPlatform }}
            - --ratls-cert-ttl={{ .Values.certIssuer.ratlsCertTTL }}
            {{- if .Values.certIssuer.ratlsPlatform }}
            - --ratls-attestation-service-url={{ include "c8s.attestationServiceURL" . }}
            {{- end }}
          ports:
            - name: https
              containerPort: {{ .Values.certIssuer.port }}
          readinessProbe:
            httpGet:
              path: /ready
              port: https
              scheme: HTTPS
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /live
              port: https
              scheme: HTTPS
            periodSeconds: 30
          resources:
{{ toYaml .Values.certIssuer.resources | indent 12 }}
          volumeMounts:
            {{- if $effectiveResourceMap }}
            - name: resource-map
              mountPath: /etc/cert-issuer
              readOnly: true
            {{- end }}
            - name: public-bundle
              mountPath: {{ $publicBundlePersistence.mountPath }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
      volumes:
        {{- if $effectiveResourceMap }}
        - name: resource-map
          configMap:
            name: {{ include "c8s.certIssuerResourceMapName" . }}
        {{- end }}
        - name: public-bundle
          persistentVolumeClaim:
            claimName: {{ default (include "c8s.certIssuerPublicBundleClaimName" .) $publicBundlePersistence.existingClaim }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "c8s.certIssuerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cert-issuer
spec:
  selector:
    app.kubernetes.io/name: c8s-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cert-issuer
  ports:
    - name: http
      port: {{ .Values.certIssuer.port }}
      targetPort: http
