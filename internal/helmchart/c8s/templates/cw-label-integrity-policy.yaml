{{- if .Values.webhook.cwLabelPolicy.enabled }}
{{- /*
The confidential.ai/cw pod label is workload-membership identity: the
operator-managed headless Services select on it, and the injection webhook is
its only legitimate writer (stamped at CREATE alongside injection). The
webhook's CREATE-time guard (validateWorkloadLabel in
internal/webhook/pod_mutator.go) cannot defend it alone: the webhook runs on
CREATE only, and labels are mutable, so a post-create `kubectl label` would
add an un-injected pod to a confidential workload's Service endpoints. This
policy denies out-of-band writes in the API server itself: at CREATE the
label must match the opt-in annotation, a pod carrying the label must also
carry the injected c8s-cert sidecar (so the identity cannot be kept while the
sidecar is shed), and on UPDATE both keys are immutable. Scope (namespace
exclusions) lives on the binding, like kata enforcement.

ValidatingAdmissionPolicy is v1/GA from Kubernetes 1.30, the chart's
kubeVersion floor.
*/}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "c8s.fullname" . }}-cw-label-integrity
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cw-label-integrity
spec:
  # Fail closed: a CEL evaluation error denies the pod. The expressions are
  # has()-guarded so they should not error in practice.
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  variables:
    # Absent keys collapse to ''. A literal empty value is treated as absent;
    # it can never match a managed Service selector (cw ids are non-empty).
    - name: cwLabel
      expression: >-
        has(object.metadata.labels) && 'confidential.ai/cw' in object.metadata.labels ?
        object.metadata.labels['confidential.ai/cw'] : ''
    - name: cwAnnotation
      expression: >-
        has(object.metadata.annotations) && 'confidential.ai/cw' in object.metadata.annotations ?
        object.metadata.annotations['confidential.ai/cw'] : ''
    - name: oldCwLabel
      expression: >-
        oldObject == null ? '' :
        (has(oldObject.metadata.labels) && 'confidential.ai/cw' in oldObject.metadata.labels ?
        oldObject.metadata.labels['confidential.ai/cw'] : '')
    - name: oldCwAnnotation
      expression: >-
        oldObject == null ? '' :
        (has(oldObject.metadata.annotations) && 'confidential.ai/cw' in oldObject.metadata.annotations ?
        oldObject.metadata.annotations['confidential.ai/cw'] : '')
    # The injected mesh-cert sidecar: a native init container (restartPolicy
    # Always) named c8s-cert. The webhook stamps the cw label and injects this
    # sidecar together, so the label without it means the sidecar was shed or
    # the webhook bypassed. Structural check only (name + native-sidecar
    # restartPolicy); the webhook owns the exact image/args and rebuilds them on
    # CREATE (pod_mutator.go, replaceInitContainer).
    - name: hasCertSidecar
      expression: >-
        has(object.spec.initContainers) &&
        object.spec.initContainers.exists(c,
        c.name == 'c8s-cert' &&
        has(c.restartPolicy) && c.restartPolicy == 'Always')
  validations:
    - expression: >-
        variables.cwLabel == '' || variables.cwLabel == variables.cwAnnotation
      message: >-
        The confidential.ai/cw pod label must match the confidential.ai/cw
        annotation; it is stamped by the c8s injection webhook and selects the
        workload's headless Service endpoints.
      reason: Forbidden
    - expression: >-
        oldObject == null ||
        (variables.cwLabel == variables.oldCwLabel &&
        variables.cwAnnotation == variables.oldCwAnnotation)
      message: >-
        The confidential.ai/cw pod label and annotation are immutable after
        admission; recreate the pod to change its workload identity.
      reason: Forbidden
    - expression: >-
        variables.cwLabel == '' || variables.hasCertSidecar
      message: >-
        A confidential.ai/cw pod must carry the injected c8s-cert sidecar (a
        native init container with restartPolicy Always); the c8s injection
        webhook adds it alongside the label. A pod bearing the workload label
        without the sidecar has shed attestation-bound injection.
      reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "c8s.fullname" . }}-cw-label-integrity
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cw-label-integrity
spec:
  policyName: {{ include "c8s.fullname" . }}-cw-label-integrity
  validationActions: [Deny]
  matchResources:
    # Mirror the namespace exclusions of the pod webhook so injection scope
    # and enforcement scope stay identical (shared helper, see _helpers.tpl).
    namespaceSelector:
      matchExpressions:
        {{- include "c8s.webhookExcludedNamespaces" . | nindent 8 }}
{{- end }}
