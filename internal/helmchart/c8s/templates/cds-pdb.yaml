{{- if .Values.cds.podDisruptionBudget.enabled }}
{{/*
CDS holds the mesh CA and EAR signing key in process memory, so a voluntary
eviction (node drain, autoscaler) of the serving pod loses the trust root.
maxUnavailable: 0 blocks voluntary disruptions; the operator must delete the
pod deliberately. This bounds evictions only — it does not throttle a
RollingUpdate rollout (that obeys the Deployment's maxSurge/maxUnavailable), so
handoff.peerUrl adoption rolls freely. Set maxUnavailable: 1 to allow drains, or
enabled: false to remove the PDB.
*/}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "c8s.cdsName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: cds
spec:
  maxUnavailable: {{ include "c8s.int" .Values.cds.podDisruptionBudget.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: c8s-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: cds
{{- end }}
