apiVersion: v2
name: nri-image-policy
description: |
  Installs the NRI image-policy plugin onto every node via two
  installer DaemonSets (CDS-node in push mode, workers in pull mode)
  and pushes the deployment-specific CDS image digest to the CDS-node
  plugin via a post-install/post-upgrade hook Job.
type: application
version: 0.3.0
home: https://github.com/lunal-dev/c8s-charts
maintainers:
  - name: lunal
dependencies:
  - name: c8s-common
    version: 0.1.0
    repository: file://../c8s-common
