# nri-image-policy chart values.
#
# Transitional chart: installs the plugin onto every node via two installer
# DaemonSets (one for the CDS node in push mode, one for workers in pull mode),
# then pushes the deployment-specific CDS digest to the CDS-node plugin via a
# post-install/post-upgrade hook.
#
# Once node images bake the plugin directly, the operator disables this whole
# chart at the umbrella level (`nri-image-policy.enabled: false`) and a future
# chart handles digest delivery.

# Install image (ships the plugin binary plus curl/nsenter/awk/install/cmp for
# the privileged init container's host-side work).
image:
  repository: ghcr.io/lunal-dev/nri-image-policy
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

# RKE2-only containerd-prep initContainer. Runs privileged with the host
# containerd config directory mounted to wire up the drop-in import before the
# installer writes its NRI drop-in. Digest-pin this image because it runs as root
# on every selected node.
containerdPrep:
  image:
    repository: busybox
    tag: ""
    digest: "sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028"
    pullPolicy: IfNotPresent

imagePullSecrets: []

# Plugin name. Must match the name the binary registers with at the NRI socket
# and the entry written to containerd's default_validator.required_plugins.
pluginName: nri-image-policy

# Plugin filename inside hostPaths.pluginDir. The "10-" prefix sets sort order
# relative to other NRI plugins.
pluginFilename: 10-nri-image-policy

# CDS coordinates used by the split installer model.
cds:
  # CDS image to whitelist on the CDS-node plugin. Required. The push hook PUTs
  # a single-entry whitelist containing image.digest into the CDS-node plugin's
  # unix socket; image.reference is recorded for audit.
  image:
    digest: ""    # e.g. "sha256:abc...64hex"
    reference: "" # human image reference recorded alongside the digest
  # CDS service URL the worker installer writes into pull-mode boot config.
  # Workers poll this endpoint with ETag. Required.
  url: ""         # e.g. "http://c8s-cds.c8s-system.svc:8080"
  # CDS node identity. The CDS installer and push hook pin to this selector;
  # the worker installer NotIns against the same key/value. Must be exactly one
  # key/value pair, e.g. {role: cds-node}.
  node:
    selector: {}
    tolerations: []

# Push hook tuning. The hook uses the install image; image.digest is rendered
# into always_allow so the hook Pod can be admitted by the CDS-node plugin.
push:
  curlMaxTime: "10"
  retries: "30"
  retryDelay: "2"
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 32Mi

# Host paths the installer DaemonSets write to.
hostPaths:
  pluginDir: /opt/nri/plugins
  configDir: /etc/nri/conf.d
  cacheDir: /var/lib/nri-image-policy
  runtimeDir: /var/run/nri-image-policy

# Host Kubernetes distro. Selects the containerd config layout the installer
# targets:
#   k8s  - vanilla/kubeadm: patch /etc/containerd/config.toml in place.
#   rke2 - write a schema-versioned drop-in and run containerd-prep first.
distro: k8s

# Containerd configuration the installer targets. The config directory, socket,
# and restart command default from distro; set the fields below only for a
# distro the built-in values do not cover.
containerd:
  # Explicit override for the host containerd config directory. Empty derives
  # it from distro (k8s -> /etc/containerd, rke2 ->
  # /var/lib/rancher/rke2/agent/etc/containerd).
  configDir: ""
  # Host path to the containerd socket the plugin connects to. Empty derives it
  # from distro (k8s -> /run/containerd/containerd.sock,
  # rke2 -> /run/k3s/containerd/containerd.sock).
  socket: ""
  namespace: k8s.io
  # Host restart command. Empty derives it from distro (k8s ->
  # "systemctl restart containerd", rke2 -> "systemctl restart rke2-agent").
  restartCommand: ""

# Pull-mode polling cadence (worker boot config only).
refresh:
  interval: 30s

# Policy enforcement (same on both archetypes).
policy:
  mode: fail-closed       # fail-closed | audit
  enforceExisting: true
  denyMissingAnnotation: true
  exemptNamespaces:
    - kube-system
  # Kubernetes-style label selectors evaluated against pod labels at container
  # creation time. Empty disables label-based filtering.
  labelRules: []

# Extra always-allow entries beyond the chart's own install image (which is
# templated in automatically from image.digest). Rarely needed; most cluster
# bootstrap dependencies live in kube-system, which is exempt by default.
bootstrapWhitelist:
  digests: {}

# Logging.
logLevel: info

# Filename of the plugin's unix health/push socket inside hostPaths.runtimeDir.
healthSocketName: health.sock

# Pre-delete DaemonSet that reverts the containerd patch/drop-in and removes
# host artifacts on `helm uninstall`. Disable to leave host state in place for
# forensic inspection.
uninstall:
  enabled: true

# Init container resources for the installer DaemonSets. Not the plugin process,
# which runs outside Kubernetes and has no resource limits.
resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi

priorityClassName: system-node-critical

# Exclude nodes by label from BOTH installer DaemonSets and the uninstall hook.
nodeAffinity:
  excludeLabels: []
