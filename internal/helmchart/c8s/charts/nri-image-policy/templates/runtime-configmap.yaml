{{- $assamScheme := lower (default "http" .Values.assam.scheme) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nri-image-policy.fullname" . }}-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nri-image-policy.labels" . | nindent 4 }}
data:
  # The install-DaemonSet copies this file to {{ include "nri-image-policy.hostConfigPath" . }}.
  # The host plugin reads it at startup; it does not contain whitelist data.
  image-policy.yaml: |
    plugin:
      health_addr: {{ printf "unix://%s" (include "nri-image-policy.hostHealthSocket" .) | quote }}

    whitelist:
      url: {{ printf "%s://127.0.0.1:%d" $assamScheme (int .Values.assam.nodePort) | quote }}
      timeout: {{ .Values.refresh.interval | quote }}
{{ if eq $assamScheme "https" }}
      attestation_service_url: {{ tpl (default "" .Values.ratls.attestationServiceURL) . | quote }}
{{ if .Values.assam.measurements }}
      assam_measurements:
{{ range .Values.assam.measurements }}
        - {{ . | quote }}
{{ end }}
{{ else }}
      assam_measurements: []
{{ end }}
{{ end }}

    containerd:
      socket: {{ include "nri-image-policy.containerdSocket" . | quote }}
      namespace: {{ .Values.containerd.namespace | quote }}

    policy:
      mode: {{ .Values.policy.mode | quote }}
      enforce_existing: {{ .Values.policy.enforceExisting }}
      deny_missing_annotation: {{ .Values.policy.denyMissingAnnotation }}
      {{- if .Values.policy.exemptNamespaces }}
      exempt_namespaces:
        {{- range .Values.policy.exemptNamespaces }}
        - {{ . | quote }}
        {{- end }}
      {{- else }}
      exempt_namespaces: []
      {{- end }}
      {{- if .Values.policy.labelRules }}
      label_rules:
        {{- toYaml .Values.policy.labelRules | nindent 8 }}
      {{- else }}
      label_rules: []
      {{- end }}

    logging:
      level: {{ .Values.logLevel | quote }}
