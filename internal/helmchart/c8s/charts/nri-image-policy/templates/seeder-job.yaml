{{- $assamURL := default (printf "http://%s-assam.%s.svc:8080" .Release.Name .Release.Namespace) .Values.seeder.assamURL -}}
{{- $adminPasswordSecretName := default (printf "%s-assam-admin" .Release.Name) .Values.seeder.adminPasswordSecretName -}}
{{- $adminPasswordSecretKey := default "whitelistAdminPassword" .Values.seeder.adminPasswordSecretKey -}}
{{- if and .Values.seeder.enabled $assamURL }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nri-image-policy.fullname" . }}-seeder
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nri-image-policy.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "nri-image-policy.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: whitelist-seeder
          image: {{ include "c8s-common.image" .Values.seeder.image }}
          env:
            - name: WHITELIST_JSON
              value: {{ dict "version" "1.0" "digests" .Values.whitelist.digests | toJson | quote }}
            - name: WHITELIST_URL
              value: {{ $assamURL | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $adminPasswordSecretName }}
                  key: {{ $adminPasswordSecretKey }}
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for assam to be ready..."
              until curl -sf "$WHITELIST_URL/healthz" >/dev/null 2>&1; do sleep 2; done
              echo "Assam is ready"

              AUTH=$(echo -n "$ADMIN_PASSWORD" | base64 -w0)
              echo "$WHITELIST_JSON" | sed 's/}//g' | sed 's/^.*"digests":{//' | tr ',' '\n' | sed 's/"//g' | while IFS=: read -r algo hash image; do
                [ -z "$hash" ] && continue
                DIGEST="${algo}:${hash%%=*}"
                IMAGE="${hash#*=}"
                echo "Seeding $DIGEST -> $IMAGE"
                curl -sf -X POST "$WHITELIST_URL/whitelist" \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Basic $AUTH" \
                  -d "{\"digest\":\"$DIGEST\",\"image\":\"$IMAGE\"}" || echo "WARN: failed to seed $DIGEST"
              done
              echo "Whitelist seeded successfully"
{{- end }}
