{{- if .Values.uninstall.enabled }}
# Pre-delete hook DaemonSet. Runs on every node when `helm uninstall` fires
# to revert the containerd config patch, kill the host plugin, and remove
# the binary + configs + cache. Helm waits for the DS to be Ready (each
# pod's init must succeed) before proceeding to delete the rest of the
# release.
#
# Operators that don't want the cleanup (e.g. for forensics) can run
# `helm uninstall --no-hooks`. Operators that want a fresh install on the
# same nodes can run normal `helm uninstall` + `helm install` and the
# host state ends up clean.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nri-image-policy.fullname" . }}-uninstall
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nri-image-policy.labels" . | nindent 4 }}
    app.kubernetes.io/component: nri-uninstaller
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  selector:
    matchLabels:
      {{- include "nri-image-policy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nri-uninstaller
  template:
    metadata:
      labels:
        {{- include "nri-image-policy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nri-uninstaller
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      hostPID: true
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        - operator: "Exists"
          effect: "NoExecute"
        - operator: "Exists"
          effect: "NoSchedule"
      initContainers:
        - name: uninstall
          image: {{ include "nri-image-policy.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: HOST_PLUGIN_PATH
              value: {{ include "nri-image-policy.hostPluginPath" . | quote }}
            - name: HOST_BOOTSTRAP_PATH
              value: {{ include "nri-image-policy.hostBootstrapPath" . | quote }}
            - name: HOST_CONFIG_PATH
              value: {{ include "nri-image-policy.hostConfigPath" . | quote }}
            - name: HOST_CONTAINERD_CONFIG
              value: {{ .Values.containerd.configPath | quote }}
            - name: HOST_CACHE_DIR
              value: {{ .Values.hostPaths.cacheDir | quote }}
            - name: RESTART_COMMAND
              value: {{ .Values.containerd.restartCommand | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              echo "==> nri-image-policy uninstaller starting"

              CONFIG=/host${HOST_CONTAINERD_CONFIG}
              MARK_BEGIN='# BEGIN c8s-nri-image-policy (managed)'
              MARK_END='# END c8s-nri-image-policy (managed)'

              # 1. Strip the managed block from containerd config (idempotent).
              if [ -f "$CONFIG" ] && grep -qF "$MARK_BEGIN" "$CONFIG"; then
                awk -v b="$MARK_BEGIN" -v e="$MARK_END" '
                  $0==b { skip=1; next }
                  $0==e { skip=0; next }
                  !skip { print }
                ' "$CONFIG" > "$CONFIG.tmp"
                mv -f "$CONFIG.tmp" "$CONFIG"
                echo "containerd config block removed from ${HOST_CONTAINERD_CONFIG}"
                config_changed=1
              else
                echo "containerd config block already absent"
                config_changed=0
              fi

              # 2. Restart containerd if we changed config. After this, NRI
              #    no longer references plugin_path or default_validator;
              #    the host plugin process exits and is not re-launched.
              if [ "$config_changed" = "1" ]; then
                echo "restarting containerd: ${RESTART_COMMAND}"
                # shellcheck disable=SC2086
                nsenter -t 1 -m -u -i -n -p -- sh -c "${RESTART_COMMAND}"
              fi

              # 3. Remove host artifacts. Cache last so a partial-failure
              #    re-run still has the binary/config to retry against.
              rm -f "/host${HOST_PLUGIN_PATH}"
              rm -f "/host${HOST_BOOTSTRAP_PATH}"
              rm -f "/host${HOST_CONFIG_PATH}"
              rm -rf "/host${HOST_CACHE_DIR}"
              echo "host artifacts removed"

              echo "==> nri-image-policy uninstaller finished"
          volumeMounts:
            - name: host-plugin-dir
              mountPath: /host{{ .Values.hostPaths.pluginDir }}
            - name: host-config-dir
              mountPath: /host{{ .Values.hostPaths.configDir }}
            - name: host-containerd-config
              mountPath: /host{{ dir .Values.containerd.configPath }}
            - name: host-cache-dir
              mountPath: /host{{ .Values.hostPaths.cacheDir }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      containers:
        - name: pause
          image: {{ include "nri-image-policy.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c", "sleep infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
                  {{- range .Values.nodeAffinity.excludeLabels }}
                  - key: {{ .key }}
                    operator: NotIn
                    values:
                      {{- toYaml .values | nindent 22 }}
                  {{- end }}
      volumes:
        - name: host-plugin-dir
          hostPath:
            path: {{ .Values.hostPaths.pluginDir }}
            type: DirectoryOrCreate
        - name: host-config-dir
          hostPath:
            path: {{ .Values.hostPaths.configDir }}
            type: DirectoryOrCreate
        - name: host-containerd-config
          hostPath:
            path: {{ dir .Values.containerd.configPath }}
            type: Directory
        - name: host-cache-dir
          hostPath:
            path: {{ .Values.hostPaths.cacheDir }}
            type: DirectoryOrCreate
{{- end }}
