apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nri-image-policy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nri-image-policy.labels" . | nindent 4 }}
    app.kubernetes.io/component: nri-installer
spec:
  selector:
    matchLabels:
      {{- include "nri-image-policy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nri-installer
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        {{- include "nri-image-policy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nri-installer
      annotations:
        sidecar.istio.io/inject: "false"
        # Re-roll the install pod when either rendered config changes.
        checksum/runtime-config: {{ include (print $.Template.BasePath "/runtime-configmap.yaml") . | sha256sum }}
        checksum/bootstrap-config: {{ include (print $.Template.BasePath "/bootstrap-configmap.yaml") . | sha256sum }}
    spec:
      hostPID: true
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        - operator: "Exists"
          effect: "NoExecute"
        - operator: "Exists"
          effect: "NoSchedule"
      initContainers:
        {{- if eq .Values.distro "rke2" }}
        # RKE2 regenerates containerd's config from a template and does not
        # import the drop-in dir this installer writes into. This initContainer
        # adds the import (rendered config + RKE2 template) before `install`
        # runs. Not needed on vanilla k8s — `install` patches config.toml in
        # place there. See README "Node distro compatibility".
        - name: containerd-prep
          # Pure-shell prep — any minimal POSIX image works — but it runs
          # privileged with host root mounted, so digest-pin via
          # containerdPrep.image just like the install container above.
          image: {{ include "c8s-common.image" .Values.containerdPrep.image }}
          imagePullPolicy: {{ .Values.containerdPrep.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: HOST_CONTAINERD_DIR
              value: {{ include "nri-image-policy.containerdConfigDir" . | quote }}
            # The literal RKE2 base-config include, written verbatim into a
            # freshly created config template. Escaped so Helm emits it as-is.
            - name: BASE_DIRECTIVE
              value: '{{ "{{ template \"base\" . }}" }}'
          command: ["/bin/sh", "-c"]
          args:
            - |
{{ .Files.Get "files/scripts/containerd-prep.sh" | indent 14 }}
          volumeMounts:
            - name: host-containerd-config
              mountPath: /host{{ include "nri-image-policy.containerdConfigDir" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
        - name: install
          image: {{ include "nri-image-policy.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: HOST_PLUGIN_PATH
              value: {{ include "nri-image-policy.hostPluginPath" . | quote }}
            - name: HOST_BOOTSTRAP_PATH
              value: {{ include "nri-image-policy.hostBootstrapPath" . | quote }}
            - name: HOST_CONFIG_PATH
              value: {{ include "nri-image-policy.hostConfigPath" . | quote }}
            - name: HOST_CONTAINERD_DIR
              value: {{ include "nri-image-policy.containerdConfigDir" . | quote }}
            - name: CONTAINERD_CONFIG_MODE
              value: {{ include "nri-image-policy.containerdConfigMode" . | quote }}
            - name: HOST_HEALTH_SOCKET
              value: {{ include "nri-image-policy.hostHealthSocket" . | quote }}
            - name: PLUGIN_DIR
              value: {{ .Values.hostPaths.pluginDir | quote }}
            - name: CONFIG_DIR
              value: {{ .Values.hostPaths.configDir | quote }}
            - name: PLUGIN_NAME
              value: {{ .Values.pluginName | quote }}
            - name: RESTART_COMMAND
              value: {{ include "nri-image-policy.restartCommand" . | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
{{ .Files.Get "files/scripts/install.sh" | indent 14 }}
          volumeMounts:
            - name: host-plugin-dir
              mountPath: /host{{ .Values.hostPaths.pluginDir }}
            - name: host-config-dir
              mountPath: /host{{ .Values.hostPaths.configDir }}
            - name: host-containerd-config
              mountPath: /host{{ include "nri-image-policy.containerdConfigDir" . }}
            - name: host-cache-dir
              mountPath: /host{{ .Values.hostPaths.cacheDir }}
            - name: host-runtime-dir
              mountPath: /host{{ .Values.hostPaths.runtimeDir }}
            - name: rendered-configs
              mountPath: /configs
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      containers:
        # Long-running pause so the DaemonSet pod stays Ready and operators
        # can observe install state via `kubectl get pods`. The pod is NOT
        # the plugin's lifecycle owner — containerd owns the plugin
        # process and respawns it independently of this pod.
        - name: pause
          image: {{ include "nri-image-policy.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c", "sleep infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
                  {{- range .Values.nodeAffinity.excludeLabels }}
                  - key: {{ .key }}
                    operator: NotIn
                    values:
                      {{- toYaml .values | nindent 22 }}
                  {{- end }}
      volumes:
        - name: host-plugin-dir
          hostPath:
            path: {{ .Values.hostPaths.pluginDir }}
            type: DirectoryOrCreate
        - name: host-config-dir
          hostPath:
            path: {{ .Values.hostPaths.configDir }}
            type: DirectoryOrCreate
        - name: host-containerd-config
          hostPath:
            path: {{ include "nri-image-policy.containerdConfigDir" . }}
            type: Directory
        - name: host-cache-dir
          hostPath:
            path: {{ .Values.hostPaths.cacheDir }}
            type: DirectoryOrCreate
        - name: host-runtime-dir
          hostPath:
            path: {{ .Values.hostPaths.runtimeDir }}
            type: DirectoryOrCreate
        - name: rendered-configs
          projected:
            sources:
              - configMap:
                  name: {{ include "nri-image-policy.fullname" . }}-runtime
                  items:
                    - key: image-policy.yaml
                      path: image-policy.yaml
              - configMap:
                  name: {{ include "nri-image-policy.fullname" . }}-bootstrap
                  items:
                    - key: bootstrap.yaml
                      path: bootstrap.yaml
