{{- $meshCAConfigMapName := default (printf "%s-cert-issuer-mesh-ca" .Release.Name) .Values.meshCA.configMapName -}}
{{- $defaultMeshCAPath := printf "%s/%s" .Values.meshCA.mountPath .Values.meshCA.key -}}
{{- $configuredTrustedCAPath := .Values.upstream.tls.trustedCAPath -}}
{{- $upstreamTLSVerify := and (eq .Values.upstream.protocol "https") .Values.upstream.tls.verify -}}
{{- $upstreamUsesMeshCA := and $upstreamTLSVerify (or (not $configuredTrustedCAPath) (eq $configuredTrustedCAPath $defaultMeshCAPath)) -}}
{{- $discoveryExposesMeshCA := and .Values.discovery.enabled .Values.meshCA.expose -}}
{{- $mountMeshCA := or $discoveryExposesMeshCA $upstreamUsesMeshCA -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tls-lb.fullname" . }}
  labels:
    {{- include "tls-lb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      {{- include "tls-lb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tls-lb.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- include "tls-lb.c8s-annotations" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      shareProcessNamespace: true
      containers:
        - name: nginx
          image: {{ include "c8s-common.image" .Values.nginx.image }}
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.nginx.httpsPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: {{ .Values.nginx.runAsNonRoot }}
            runAsUser: {{ .Values.nginx.runAsUser }}
            runAsGroup: {{ .Values.nginx.runAsGroup }}
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tlsMountPath }}
              readOnly: true
            {{- if .Values.publicTLS.secretName }}
            - name: public-tls
              mountPath: {{ .Values.publicTLS.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.discovery.enabled }}
            - name: discovery
              mountPath: {{ .Values.discovery.mountPath }}
              readOnly: true
            {{- end }}
            {{- if $mountMeshCA }}
            - name: mesh-ca
              mountPath: {{ .Values.meshCA.mountPath }}
              readOnly: true
            {{- end }}
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /tmp
          {{- with .Values.nginx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tls-certs
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- if .Values.publicTLS.secretName }}
        - name: public-tls
          secret:
            secretName: {{ .Values.publicTLS.secretName }}
            items:
              - key: {{ .Values.publicTLS.certKey }}
                path: {{ .Values.publicTLS.certKey }}
              - key: {{ .Values.publicTLS.keyKey }}
                path: {{ .Values.publicTLS.keyKey }}
        {{- end }}
        {{- if .Values.discovery.enabled }}
        - name: discovery
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- end }}
        {{- if $mountMeshCA }}
        - name: mesh-ca
          configMap:
            name: {{ $meshCAConfigMapName }}
            optional: {{ .Values.meshCA.optional }}
            items:
              - key: {{ .Values.meshCA.key }}
                path: {{ .Values.meshCA.key }}
        {{- end }}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "tls-lb.fullname" . }}-nginx
      securityContext:
        runAsNonRoot: {{ .Values.nginx.runAsNonRoot }}
        fsGroup: {{ .Values.nginx.runAsGroup }}
        seccompProfile:
          type: RuntimeDefault
