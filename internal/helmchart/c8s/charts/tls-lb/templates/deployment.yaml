{{- $assamURL := default (printf "http://%s-assam.%s.svc:8080" .Release.Name .Release.Namespace) .Values.assamURL -}}
{{- $attestationServiceURL := default (printf "http://%s-attestation-service.%s.svc:8400" .Release.Name .Release.Namespace) .Values.attestationServiceURL -}}
{{- $discoveryFilePath := printf "%s/%s" .Values.discovery.mountPath .Values.discovery.fileName -}}
{{- $meshCAConfigMapName := default (printf "%s-cert-issuer-mesh-ca" .Release.Name) .Values.meshCA.configMapName -}}
{{- $defaultMeshCAPath := printf "%s/%s" .Values.meshCA.mountPath .Values.meshCA.key -}}
{{- $configuredTrustedCAPath := .Values.upstream.tls.trustedCAPath -}}
{{- $upstreamTLSVerify := and (eq .Values.upstream.protocol "https") .Values.upstream.tls.verify -}}
{{- $upstreamUsesMeshCA := and $upstreamTLSVerify (or (not $configuredTrustedCAPath) (eq $configuredTrustedCAPath $defaultMeshCAPath)) -}}
{{- $discoveryExposesMeshCA := and .Values.discovery.enabled .Values.meshCA.expose -}}
{{- $mountMeshCA := or $discoveryExposesMeshCA $upstreamUsesMeshCA -}}
{{- $publicCertPath := printf "%s/cert.pem" .Values.tlsMountPath -}}
{{- $publicKeyPath := printf "%s/key.pem" .Values.tlsMountPath -}}
{{- $publicTLSMode := "cds" -}}
{{- if .Values.publicTLS.secretName -}}
{{- $publicCertPath = printf "%s/%s" .Values.publicTLS.mountPath .Values.publicTLS.certKey -}}
{{- $publicKeyPath = printf "%s/%s" .Values.publicTLS.mountPath .Values.publicTLS.keyKey -}}
{{- $publicTLSMode = "webpki" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tls-lb.fullname" . }}
  labels:
    {{- include "tls-lb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      {{- include "tls-lb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tls-lb.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      shareProcessNamespace: true
      initContainers:
        # One-shot init: fetch the first cert synchronously so nginx has
        # something to load when it starts.
        - name: get-cert-init
          image: {{ include "c8s-common.image" .Values.initContainer.image }}
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          securityContext:
            runAsUser: 101
            allowPrivilegeEscalation: false
          args:
            - --assam-url={{ $assamURL }}
            - --attestation-service-url={{ $attestationServiceURL }}
            {{- if .Values.initContainer.attestationServiceApiKey }}
            - --attestation-service-api-key={{ .Values.initContainer.attestationServiceApiKey }}
            {{- end }}
            - --san={{ required "san is required - set it to the domain name for the TLS certificate" .Values.san }}
            - --out={{ .Values.tlsMountPath }}/cert.pem
            - --key-out={{ .Values.tlsMountPath }}/key.pem
            {{- if .Values.discovery.enabled }}
            - --discovery-out={{ $discoveryFilePath }}
            - --discovery-cds-cert-url={{ .Values.discovery.cdsCertPath }}
            - --discovery-public-tls-mode={{ $publicTLSMode }}
            {{- if .Values.meshCA.expose }}
            - --discovery-mesh-ca-url={{ .Values.discovery.meshCAPath }}
            {{- end }}
            {{- end }}
            {{- if .Values.initContainer.verbose }}
            - --verbose
            {{- end }}
          {{- if not .Values.initContainer.attestationServiceApiKey }}
          env:
            - name: C8S_ATTESTATION_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-attestation-service-api-key
                  key: apiKey
          {{- end }}
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tlsMountPath }}
            {{- if .Values.discovery.enabled }}
            - name: discovery
              mountPath: {{ .Values.discovery.mountPath }}
            {{- end }}
        # Native sidecar: keeps running to renew the cert and SIGHUP nginx.
        - name: get-cert
          image: {{ include "c8s-common.image" .Values.initContainer.image }}
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          restartPolicy: Always
          securityContext:
            runAsUser: 101
            allowPrivilegeEscalation: false
          args:
            - --assam-url={{ $assamURL }}
            - --attestation-service-url={{ $attestationServiceURL }}
            {{- if .Values.initContainer.attestationServiceApiKey }}
            - --attestation-service-api-key={{ .Values.initContainer.attestationServiceApiKey }}
            {{- end }}
            - --san={{ required "san is required - set it to the domain name for the TLS certificate" .Values.san }}
            - --out={{ .Values.tlsMountPath }}/cert.pem
            - --key-out={{ .Values.tlsMountPath }}/key.pem
            {{- if .Values.publicTLS.secretName }}
            - --reload-watch={{ $publicCertPath }}
            - --reload-watch={{ $publicKeyPath }}
            {{- end }}
            {{- if .Values.discovery.enabled }}
            - --discovery-out={{ $discoveryFilePath }}
            - --discovery-cds-cert-url={{ .Values.discovery.cdsCertPath }}
            - --discovery-public-tls-mode={{ $publicTLSMode }}
            {{- if .Values.meshCA.expose }}
            - --discovery-mesh-ca-url={{ .Values.discovery.meshCAPath }}
            {{- end }}
            {{- end }}
            - --renew-interval={{ .Values.initContainer.renewInterval }}
            {{- if .Values.initContainer.verbose }}
            - --verbose
            {{- end }}
          {{- if not .Values.initContainer.attestationServiceApiKey }}
          env:
            - name: C8S_ATTESTATION_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-attestation-service-api-key
                  key: apiKey
          {{- end }}
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tlsMountPath }}
            {{- if .Values.publicTLS.secretName }}
            - name: public-tls
              mountPath: {{ .Values.publicTLS.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.discovery.enabled }}
            - name: discovery
              mountPath: {{ .Values.discovery.mountPath }}
            {{- end }}
      containers:
        - name: nginx
          image: {{ include "c8s-common.image" .Values.nginx.image }}
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.nginx.httpsPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tlsMountPath }}
              readOnly: true
            {{- if .Values.publicTLS.secretName }}
            - name: public-tls
              mountPath: {{ .Values.publicTLS.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.discovery.enabled }}
            - name: discovery
              mountPath: {{ .Values.discovery.mountPath }}
              readOnly: true
            {{- end }}
            {{- if $mountMeshCA }}
            - name: mesh-ca
              mountPath: {{ .Values.meshCA.mountPath }}
              readOnly: true
            {{- end }}
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /tmp
          {{- with .Values.nginx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tls-certs
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- if .Values.publicTLS.secretName }}
        - name: public-tls
          secret:
            secretName: {{ .Values.publicTLS.secretName }}
            items:
              - key: {{ .Values.publicTLS.certKey }}
                path: {{ .Values.publicTLS.certKey }}
              - key: {{ .Values.publicTLS.keyKey }}
                path: {{ .Values.publicTLS.keyKey }}
        {{- end }}
        {{- if .Values.discovery.enabled }}
        - name: discovery
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- end }}
        {{- if $mountMeshCA }}
        - name: mesh-ca
          configMap:
            name: {{ $meshCAConfigMapName }}
            optional: false
            items:
              - key: {{ .Values.meshCA.key }}
                path: {{ .Values.meshCA.key }}
        {{- end }}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "tls-lb.fullname" . }}-nginx
      securityContext:
        runAsNonRoot: true
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
