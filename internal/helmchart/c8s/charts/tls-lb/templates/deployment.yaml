{{- $san := include "tls-lb.san" . -}}
{{- $discoveryFilePath := printf "%s/%s" .Values.discovery.mountPath .Values.discovery.fileName -}}
{{- $meshCAConfigMapName := default (printf "%s-cert-issuer-mesh-ca" .Release.Name) .Values.meshCA.configMapName -}}
{{- $defaultMeshCAPath := printf "%s/%s" .Values.meshCA.mountPath .Values.meshCA.key -}}
{{- $configuredTrustedCAPath := .Values.upstream.tls.trustedCAPath -}}
{{- $upstreamTLSVerify := and (eq .Values.upstream.protocol "https") .Values.upstream.tls.verify -}}
{{- $upstreamUsesMeshCA := and $upstreamTLSVerify (or (not $configuredTrustedCAPath) (eq $configuredTrustedCAPath $defaultMeshCAPath)) -}}
{{- $discoveryExposesMeshCA := and .Values.discovery.enabled .Values.meshCA.expose -}}
{{- $mountMeshCA := or $discoveryExposesMeshCA $upstreamUsesMeshCA -}}
{{- $publicCertPath := printf "%s/cert.pem" .Values.tlsMountPath -}}
{{- $publicKeyPath := printf "%s/key.pem" .Values.tlsMountPath -}}
{{- $publicTLSMode := "cds" -}}
{{- if .Values.publicTLS.secretName -}}
{{- $publicCertPath = printf "%s/%s" .Values.publicTLS.mountPath .Values.publicTLS.certKey -}}
{{- $publicKeyPath = printf "%s/%s" .Values.publicTLS.mountPath .Values.publicTLS.keyKey -}}
{{- $publicTLSMode = "webpki" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tls-lb.fullname" . }}
  labels:
    {{- include "tls-lb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      {{- include "tls-lb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tls-lb.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        confidential.ai/cw: {{ $san | quote }}
        confidential.ai/c8s-cert-volume: "tls-certs"
        confidential.ai/c8s-cert-dir: {{ .Values.tlsMountPath | quote }}
        confidential.ai/c8s-cert-file: "cert.pem"
        confidential.ai/c8s-key-file: "key.pem"
        confidential.ai/c8s-renew-interval: {{ .Values.certProvisioning.renewInterval | quote }}
        confidential.ai/c8s-reload-nginx: "true"
        confidential.ai/c8s-get-cert-run-as-user: {{ .Values.nginx.runAsUser | quote }}
        confidential.ai/c8s-get-cert-run-as-group: {{ .Values.nginx.runAsGroup | quote }}
        confidential.ai/c8s-get-cert-run-as-non-root: {{ .Values.nginx.runAsNonRoot | quote }}
        {{- if .Values.certProvisioning.verbose }}
        confidential.ai/c8s-get-cert-verbose: "true"
        {{- end }}
        {{- if .Values.publicTLS.secretName }}
        confidential.ai/c8s-reload-watch-volume: "public-tls"
        confidential.ai/c8s-reload-watch-mount-path: {{ .Values.publicTLS.mountPath | quote }}
        confidential.ai/c8s-reload-watch-paths: {{ printf "%s,%s" $publicCertPath $publicKeyPath | quote }}
        {{- end }}
        {{- if .Values.discovery.enabled }}
        confidential.ai/c8s-discovery-volume: "discovery"
        confidential.ai/c8s-discovery-mount-path: {{ .Values.discovery.mountPath | quote }}
        confidential.ai/c8s-discovery-out: {{ $discoveryFilePath | quote }}
        confidential.ai/c8s-discovery-cds-cert-url: {{ .Values.discovery.cdsCertPath | quote }}
        confidential.ai/c8s-discovery-public-tls-mode: {{ $publicTLSMode | quote }}
        {{- if .Values.meshCA.expose }}
        confidential.ai/c8s-discovery-mesh-ca-url: {{ .Values.discovery.meshCAPath | quote }}
        {{- end }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      shareProcessNamespace: true
      containers:
        - name: nginx
          image: {{ include "c8s-common.image" .Values.nginx.image }}
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.nginx.httpsPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: {{ .Values.nginx.runAsNonRoot }}
            runAsUser: {{ .Values.nginx.runAsUser }}
            runAsGroup: {{ .Values.nginx.runAsGroup }}
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tlsMountPath }}
              readOnly: true
            {{- if .Values.publicTLS.secretName }}
            - name: public-tls
              mountPath: {{ .Values.publicTLS.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.discovery.enabled }}
            - name: discovery
              mountPath: {{ .Values.discovery.mountPath }}
              readOnly: true
            {{- end }}
            {{- if $mountMeshCA }}
            - name: mesh-ca
              mountPath: {{ .Values.meshCA.mountPath }}
              readOnly: true
            {{- end }}
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /tmp
          {{- with .Values.nginx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tls-certs
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- if .Values.publicTLS.secretName }}
        - name: public-tls
          secret:
            secretName: {{ .Values.publicTLS.secretName }}
            items:
              - key: {{ .Values.publicTLS.certKey }}
                path: {{ .Values.publicTLS.certKey }}
              - key: {{ .Values.publicTLS.keyKey }}
                path: {{ .Values.publicTLS.keyKey }}
        {{- end }}
        {{- if .Values.discovery.enabled }}
        - name: discovery
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- end }}
        {{- if $mountMeshCA }}
        - name: mesh-ca
          configMap:
            name: {{ $meshCAConfigMapName }}
            optional: {{ .Values.meshCA.optional }}
            items:
              - key: {{ .Values.meshCA.key }}
                path: {{ .Values.meshCA.key }}
        {{- end }}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "tls-lb.fullname" . }}-nginx
      securityContext:
        runAsNonRoot: {{ .Values.nginx.runAsNonRoot }}
        fsGroup: {{ .Values.nginx.runAsGroup }}
        seccompProfile:
          type: RuntimeDefault
