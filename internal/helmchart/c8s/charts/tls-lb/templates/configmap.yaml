{{- include "tls-lb.validateSan" (required "san is required - set it to the domain name for the TLS certificate" .Values.san) -}}
{{- include "tls-lb.validateProtocol" (required "protocol must be http or https" .Values.upstream.protocol) -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tls-lb.fullname" . }}-nginx
  labels:
    {{- include "tls-lb.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';
        access_log /var/log/nginx/access.log main;

        sendfile on;
        keepalive_timeout 65;

        upstream backend {
            server {{ .Values.upstream.address }};
        }

        server {
            listen {{ .Values.nginx.httpsPort }} ssl;
            server_name "{{ .Values.san }}";

            ssl_certificate     {{ .Values.tlsMountPath }}/cert.pem;
            ssl_certificate_key {{ .Values.tlsMountPath }}/key.pem;

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305;
            ssl_prefer_server_ciphers on;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 1d;

            # Large buffers for upstream responses that include TEE attestation headers (~8KB).
            proxy_buffer_size 16k;
            proxy_buffers 4 16k;

            location / {
                proxy_pass {{ .Values.upstream.protocol }}://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /healthz {
                access_log off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }
        }
    }
