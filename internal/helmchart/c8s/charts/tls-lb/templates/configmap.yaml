{{- $san := include "tls-lb.san" . -}}
{{- include "tls-lb.validateSan" $san -}}
{{- include "tls-lb.validateProtocol" (required "protocol must be http or https" .Values.upstream.protocol) -}}
{{- include "tls-lb.validateUpstreamAddress" .Values.upstream -}}
{{- $publicCertPath := printf "%s/cert.pem" .Values.tlsMountPath -}}
{{- $publicKeyPath := printf "%s/key.pem" .Values.tlsMountPath -}}
{{- if .Values.publicTLS.secretName -}}
{{- $publicCertPath = printf "%s/%s" .Values.publicTLS.mountPath .Values.publicTLS.certKey -}}
{{- $publicKeyPath = printf "%s/%s" .Values.publicTLS.mountPath .Values.publicTLS.keyKey -}}
{{- end -}}
{{- $discoveryFilePath := printf "%s/%s" .Values.discovery.mountPath .Values.discovery.fileName -}}
{{- $defaultMeshCAPath := printf "%s/%s" .Values.meshCA.mountPath .Values.meshCA.key -}}
{{- $upstreamTrustedCAPath := default $defaultMeshCAPath .Values.upstream.tls.trustedCAPath -}}
{{- $upstreamServerName := .Values.upstream.tls.serverName -}}
{{- if not $upstreamServerName -}}
{{- $upstreamServerName = regexReplaceAll `^\[([^\]]+)\](?::[0-9]+)?$` .Values.upstream.address "${1}" -}}
{{- $upstreamServerName = regexReplaceAll `^([^:]+)(?::[0-9]+)?$` $upstreamServerName "${1}" -}}
{{- end -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tls-lb.fullname" . }}-nginx
  labels:
    {{- include "tls-lb.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';
        access_log /var/log/nginx/access.log main;

        sendfile on;
        keepalive_timeout 65;

        upstream backend {
            server {{ .Values.upstream.address }};
        }

        server {
            listen {{ .Values.nginx.httpsPort }} ssl;
            server_name "{{ $san }}";

            ssl_certificate     {{ $publicCertPath }};
            ssl_certificate_key {{ $publicKeyPath }};

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
            ssl_prefer_server_ciphers on;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 1d;

            # Large buffers for upstream responses that include TEE attestation headers (~8KB).
            proxy_buffer_size 16k;
            proxy_buffers 4 16k;

            {{- range $i, $route := .Values.routes }}
            {{- $path := required (printf "tls-lb.routes[%d].path is required" $i) $route.path }}
            {{- $upstream := required (printf "tls-lb.routes[%d].upstream is required" $i) $route.upstream }}
            {{- $match := default "prefix" $route.match }}
            {{- if not (or (eq $match "exact") (eq $match "prefix")) }}
            {{- fail (printf "tls-lb.routes[%d].match must be 'exact' or 'prefix', got: %s" $i $match) }}
            {{- end }}
            {{- if not (regexMatch `^/[A-Za-z0-9._~!$&()*+,=:@%/-]*$` $path) }}
            {{- fail (printf "tls-lb.routes[%d].path must start with '/' and contain only URI path characters safe for nginx locations, got: %s" $i $path) }}
            {{- end }}
            {{- if not (regexMatch `^http://[^[:space:]{};]+$` $upstream) }}
            {{- fail (printf "tls-lb.routes[%d].upstream must be an http:// URL without whitespace, semicolons, or braces; route-specific HTTPS upstreams are not supported" $i) }}
            {{- end }}
            # Route: {{ $path }} -> {{ $upstream }}
            {{- if eq $match "exact" }}
            location = {{ $path }} {
            {{- else }}
            location {{ $path }} {
            {{- end }}
                proxy_pass {{ $upstream }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            {{- end }}
            {{- if .Values.discovery.enabled }}
            location = {{ .Values.discovery.path }} {
                access_log off;
                default_type application/json;
                add_header Cache-Control "no-store" always;
                alias {{ $discoveryFilePath }};
            }

            location = {{ .Values.discovery.cdsCertPath }} {
                access_log off;
                default_type application/x-pem-file;
                add_header Cache-Control "no-store" always;
                alias {{ .Values.tlsMountPath }}/cert.pem;
            }

            {{- if .Values.meshCA.expose }}
            location = {{ .Values.discovery.meshCAPath }} {
                access_log off;
                default_type application/x-pem-file;
                add_header Cache-Control "no-store" always;
                alias {{ $defaultMeshCAPath }};
            }
            {{- end }}

            {{- end }}
            location / {
                {{- if eq .Values.upstream.protocol "https" }}
                {{- if .Values.upstream.tls.useCDSClientCert }}
                proxy_ssl_certificate {{ .Values.tlsMountPath }}/cert.pem;
                proxy_ssl_certificate_key {{ .Values.tlsMountPath }}/key.pem;
                {{- end }}
                proxy_ssl_server_name on;
                proxy_ssl_name {{ $upstreamServerName }};
                {{- if .Values.upstream.tls.verify }}
                proxy_ssl_verify on;
                proxy_ssl_verify_depth {{ .Values.upstream.tls.verifyDepth }};
                proxy_ssl_trusted_certificate {{ $upstreamTrustedCAPath }};
                {{- else }}
                proxy_ssl_verify off;
                {{- end }}
                {{- end }}
                proxy_pass {{ .Values.upstream.protocol }}://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /healthz {
                access_log off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }
        }
    }
