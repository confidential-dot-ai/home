{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ratls-mesh.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ratls-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: service-mesh
spec:
  podSelector:
    matchLabels:
      {{- include "ratls-mesh.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow inbound RA-TLS connections only from other ratls-mesh nodes
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "ratls-mesh.name" . }}
      ports:
        - protocol: TCP
          port: {{ .Values.ports.inbound }}
    # Allow health/metrics from monitoring and system namespaces
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.ports.health }}
{{- end }}
