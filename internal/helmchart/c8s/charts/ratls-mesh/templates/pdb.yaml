apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ratls-mesh.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ratls-mesh.labels" . | nindent 4 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "ratls-mesh.selectorLabels" . | nindent 6 }}
