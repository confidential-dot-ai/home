image:
  repository: ghcr.io/lunal-dev/ratls-mesh
  # -- Image tag. Required: the chart does not pin a default; the consumer
  #    (HelmRelease values or cluster overlay) must set tag or digest.
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# TEE platform. The supported c8s chart shape is SEV-SNP.
platform: sev-snp

# Host path for iptables lock (k3s: /run/k3s/agent/xtables.lock)
xtablesLockPath: /run/xtables.lock

# Mesh ports
ports:
  outbound: 15001
  inbound: 15006
  health: 15021

# UID for the ratls-mesh process (iptables excludes this UID)
uid: 1337

# UIDs excluded from iptables redirect (comma-separated)
excludeUids: "0"

# Certificate settings
certMode: self-signed  # self-signed | assam
certTtl: "4h"
rotationTimeout: "30s"

# Assam integration (used when certMode=assam)
assam:
  caPollInterval: "5m"
  # SHA-384 hex launch measurements that Assam's RA-TLS peer cert must match.
  # Set from the parent chart's `assam.measurements`. Empty = accept any
  # (UNSAFE outside tests — bootstrap MITM defence depends on this list being
  # populated with the operator-pinned Assam launch digest).
  measurements: []

# Expected launch digests for measurement pinning (empty = accept any)
measurements: []

# Connection limits
maxConns: 10000
maxConnsPerSource: 0
idleTimeout: ""

# TLS session cache
sessionCacheSize: 64

# Logging
logLevel: info

# TPM device plugin
tpm:
  enabled: true
  resource: "lunal.dev/tpm"
  supplementalGroups:
    - 0
    - 111

# Node placement
nodeSelector: {}

# Resources
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

# Iptables cleanup sidecar resources
iptablesSync:
  resyncPeriod: 30s
  ipsetMaxElem: 262144
  resources:
    requests:
      cpu: 5m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

iptablesCleanup:
  resources:
    requests:
      cpu: 1m
      memory: 8Mi
    limits:
      cpu: 10m
      memory: 16Mi

# Probe timings
probes:
  startup:
    periodSeconds: 2
    failureThreshold: 60
  readiness:
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3

# --- Policies ---

networkPolicy:
  enabled: false
  monitoringNamespace: monitoring

# TCP-only egress policy for application namespaces
tcpEgressPolicy:
  enabled: false
  namespaces: []

# ValidatingAdmissionPolicy to prevent pods from running as mesh UID
uidAdmissionPolicy:
  enabled: true

# PrometheusRule for threat model alerting
prometheusRules:
  enabled: false

# Priority class for pod scheduling
priorityClassName: system-node-critical
