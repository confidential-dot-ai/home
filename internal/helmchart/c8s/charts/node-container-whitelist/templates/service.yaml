apiVersion: v1
kind: Service
metadata:
  name: {{ include "node-container-whitelist.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-container-whitelist.labels" . | nindent 4 }}
spec:
  type: {{ .Values.serviceType }}
  ports:
    - port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "node-container-whitelist.selectorLabels" . | nindent 4 }}
