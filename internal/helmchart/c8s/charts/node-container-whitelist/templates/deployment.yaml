{{- $whitelistURL := default (printf "http://%s-assam.%s.svc:8080" .Release.Name .Release.Namespace) .Values.whitelistURL -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "node-container-whitelist.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-container-whitelist.labels" . | nindent 4 }}
    app.kubernetes.io/component: whitelist
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "node-container-whitelist.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "node-container-whitelist.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- if .Values.tpm.enabled }}
        supplementalGroups: {{ .Values.tpm.supplementalGroups | toJson }}
        {{- end }}
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/os: linux
        {{- with .Values.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: whitelist-server
          image: {{ include "node-container-whitelist.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /tmp
          args:
            {{- if $whitelistURL }}
            - --whitelist-url
            - {{ $whitelistURL | quote }}
            {{- else }}
            - --kbs-url
            - {{ .Values.kbs.url | quote }}
            - --kbs-resource-path
            - {{ .Values.kbs.resourcePath | quote }}
            - --kbs-platform
            - {{ .Values.kbs.platform | quote }}
            {{- if .Values.attestationServiceURL }}
            - --attestation-service-url
            - {{ .Values.attestationServiceURL | quote }}
            - --attestation-service-platform
            - {{ .Values.attestationServicePlatform | quote }}
            {{- end }}
            {{- end }}
            - --port
            - {{ .Values.port | quote }}
            - --refresh-interval
            - "{{ .Values.refreshInterval }}s"
          ports:
            - containerPort: {{ .Values.port }}
              name: http
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              {{- toYaml .Values.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.resources.limits | nindent 14 }}
              {{- if .Values.tpm.enabled }}
              {{ .Values.tpm.resource }}: 1
              {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
      volumes:
        - name: tmp
          emptyDir: {}
