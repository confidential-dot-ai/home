image:
  repository: ghcr.io/lunal-dev/node-container-whitelist
  tag: ""  # Defaults to appVersion
  digest: ""  # e.g. "sha256:abc..." — overrides tag when set
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

replicas: 1

port: 8000
serviceType: ClusterIP

# Whitelist source URL (assam or compatible whitelist API).
# When set, uses simple HTTP GET — no attestation needed.
# When empty, falls back to KBS-based whitelist fetch.
whitelistURL: ""

# --- KBS mode (legacy, used when whitelistURL is empty) ---
kbs:
  url: "http://trustee-kbs.tee-attestation.svc.cluster.local:8080"
  resourcePath: "default/nri/whitelist"
  platform: "sev-snp"

attestationServiceURL: ""
attestationServicePlatform: "auto"

refreshInterval: 300

tpm:
  enabled: true
  resource: "lunal.dev/tpm"
  supplementalGroups:
    - 0
    - 111

nodeSelector: {}
tolerations: []

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

# Probe timings
probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 30
