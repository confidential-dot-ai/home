## Operator container image. The same image runs every c8s mode that
## doesn't need extra OS bins: controller manager and injected get-cert.
## `tag` and `digest` are consumer-supplied — the chart fails to render if
## neither is set. TEE measurements depend on the exact binary running,
## so floating tags break attestation semantics; prefer `digest`.
image:
  repository: ghcr.io/lunal-dev/c8s-operator
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

## Operator Deployment. The operator is intentionally singleton because the
## webhook path mints pod-local serving PKI and patches one shared
## MutatingWebhookConfiguration caBundle.
operator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  podAnnotations: {}
  extraArgs: []

## Common ServiceAccount settings for the chart-managed top-level c8s
## workloads: operator, attestation-service, Assam, and cert-issuer.
serviceAccount:
  imagePullSecrets: []

## CRD-backed status mirror for `kubectl get cwl` UX. Disable this when CRDs
## are intentionally not installed; pod injection does not depend on it.
statusMirror:
  enabled: true

## Mutating admission webhook that injects get-cert containers into pods
## annotated with confidential.ai/cw.
webhook:
  caBundle: ""
  service:
    port: 443
  failurePolicy: Fail
  extraExcluded: []
  certVolume:
    fsGroup: 65532
    keyMode: "0640"
  getCert:
    ## Must be shorter than Assam's certTTL. The default renews at 25% of
    ## the chart's 24h certificate TTL.
    renewInterval: 6h
    ## Defaults match distroless nonroot. Kata deployments that need UID 0
    ## inside the guest can set runAsUser/runAsGroup to 0 and runAsNonRoot=false.
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true

## Assam is the key broker / certificate broker that injected get-cert
## containers talk to.
##
## For the whitepaper production security model, Assam/CDS must run inside the
## attested trust boundary and its state/secrets must not rely only on
## Kubernetes control-plane secrecy.
assam:
  image:
    repository: ghcr.io/lunal-dev/assam
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  port: 8080
  service:
    type: NodePort
    nodePort: 30808
  whitelistDB: /data/whitelist.db
  ## Optional Assam resource map:
  ##   <measurement>: ["assam/whitelist-write"]
  ## Empty means whitelist mutation endpoints reject writes.
  resourceMap: {}
  earIssuer: assam
  certTTL: 24h
  challengeTTL: 60s
  readinessInterval: 10s
  tokenSignerRotationInterval: 720h
  tokenSignerOverlap: 25h
  tokenSignerRotationJitter: 0.1
  ## RA-TLS settings for the Assam serving cert (closes the bootstrap-channel
  ## MITM gap: ratls-mesh validates Assam's peer cert via the embedded SEV-SNP
  ## attestation report instead of trusting the cluster network).
  ## Empty platform disables TLS — UNSAFE outside tests.
  ratlsPlatform: snp
  ratlsCertTTL: 24h
  ## Cap on whitelist mutation request bodies (bytes). Whitelist payloads
  ## are tiny; the cap stops a malicious client from forcing the handler
  ## to buffer megabytes during the auth body-binding check.
  whitelistMaxBodyBytes: 65536
  ## Expected launch digests (SHA-384 hex) of the attested Assam binary.
  ## ratls-mesh and other RA-TLS-aware clients pass this list to the TLS
  ## handshake's measurement allowlist. Empty means the client accepts ANY
  ## measurement — suitable for dev only; chart-managed CVM-only deployments
  ## MUST populate this with the operator-pinned Assam launch digest.
  measurements: []
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Chart-managed cert-issuer. This completes the certificate path when paired
## with chart-managed Assam. The mesh CA key is generated inside the
## cert-issuer process and remains in memory only.
certIssuer:
  image:
    repository: ghcr.io/lunal-dev/cert-issuer
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  port: 8090
  jwksCacheTTL: 5m
  expectedIssuer: assam
  rateLimit: 10
  rateBurst: 20
  logLevel: info
  ## Assam forwards CSRs from its own pod, so cert-issuer cannot compare the
  ## CSR node IP SAN to the TCP source IP in the chart-managed path. DNS SAN
  ## and CN validation still run; set dnsSanPattern/cnPattern for those names.
  sanValidation: false
  dnsSanPattern: ""
  cnPattern: ""
  ## Optional cert-issuer resource map:
  ##   <measurement>: ["cert-issuer/sign-csr", "cert-issuer/handoff"]
  ## Empty means sign-csr accepts any valid EAR signed by Assam.
  resourceMap: {}
  ## RA-TLS settings for cert-issuer's serving cert. Without this Assam
  ## (and any other in-cluster client) talks to cert-issuer over plaintext
  ## HTTP and an on-path attacker can forge sign-csr responses.
  ratlsPlatform: snp
  ratlsCertTTL: 24h
  ## Expected SHA-384 hex launch measurements of the cert-issuer binary
  ## itself. Distributed to peers (Assam, future replicas) so their
  ## RA-TLS handshake against cert-issuer pins this identity.
  ## Empty = peers accept any measurement (UNSAFE outside dev).
  measurements: []
  ca:
    ## The mesh CA key is generated inside cert-issuer memory and is not
    ## rendered into a Kubernetes Secret or persistent volume.
    commonName: c8s Mesh CA
    maxTTL: 24h
    minValidity: 1h
    certValidity: 8760h
    ## Rotate the in-memory mesh CA inside cert-issuer on this interval.
    rotationInterval: 720h
    ## Persist only the public CA bundle across cert-issuer pod restarts.
    ## Private CA keys remain in process memory and are never written here.
    publicBundlePersistence:
      existingClaim: ""
      claimName: ""
      storageClassName: ""
      size: 16Mi
      mountPath: /var/lib/cert-issuer/public-bundle
  ## Attested CA handoff between cert-issuer replicas. When enabled,
  ## cert-issuer generates an ECDSA handoff signer key in process at startup
  ## and exchanges it for an Assam-issued EAR via /attest-key — no operator
  ## key file or Kubernetes Secret is involved. Required for any active/active
  ## cert-issuer deployment; without it, a cert-issuer pod restart triggers a
  ## full mesh re-bootstrap (see docs/THREAT_MODEL.md).
  ##
  ## handoff.enabled also requires a `cert-issuer/handoff` measurement entry
  ## in certIssuer.resourceMap (or the bootstrap will succeed but the handoff
  ## handler will reject every caller). The Assam launch-digest pin is
  ## inherited from the parent assam.measurements value.
  handoff:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## DaemonSet running github.com/lunal-dev/attestation-service.
attestationService:
  image:
    repository: ghcr.io/lunal-dev/attestation-service
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  port: 8400
  ## Per-device hostPath mounts. hostPath.type=CharDevice fails the pod if
  ## the device node doesn't exist on the host, so disable for nodes that
  ## lack the corresponding hardware.
  ##
  ## On Azure CVM nodes, SEV-SNP attestation goes through /dev/tpm0 (vTPM)
  ## rather than the native /dev/sev-guest ioctl, so `tpm: true` is the
  ## right default and `sevGuest`/`tdxGuest` should be left disabled
  ## unless you're on a bare-metal CVM with the direct device node.
  teeDevices:
    sevGuest: false
    tdxGuest: false
    tpm: true
  platforms:
    - snp
    - tdx
    - az-snp
    - az-tdx
    - gcp-snp
    - gcp-tdx
  privileged: false
  ## Default is least-privilege device access for bare-metal TEE devices.
  ## Some managed-cloud CVM environments gate vTPM access below the LSM/device
  ## capability layer and need `privileged: true`; set privileged=true for that
  ## path instead of overriding this map.
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
      add: [SYS_RAWIO]
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Vendored component charts from lunal-dev/c8s-charts. They are enabled by
## default so c8s can replace the previous per-component HelmReleases.
ratls-mesh:
  enabled: true
  image:
    repository: ghcr.io/lunal-dev/ratls-mesh
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  certMode: assam
  tpm:
    enabled: false
  networkPolicy:
    enabled: false
    monitoringNamespace: monitoring
  ## Mirror the parent `assam.measurements` here so the subchart's
  ## --assam-measurements flag is populated. Helm does not pass parent values
  ## into subchart values automatically; operators must keep these two in
  ## sync (chart_test fails if they diverge).
  assam:
    measurements: []

nri-image-policy:
  enabled: true
  image:
    repository: ghcr.io/lunal-dev/nri-image-policy
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  policy:
    mode: audit
    exemptNamespaces:
      - kube-system
tee-proxy:
  enabled: true
  upstream: vllm-router-service.vllm.svc.cluster.local
  image:
    repository: ghcr.io/lunal-dev/tee-proxy
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  attestationURL: ""
  tpm:
    enabled: false
  router:
    routes:
      - path: /whitelist
        upstream: "http://{{ .Release.Name }}-assam.{{ .Release.Namespace }}.svc:8080"
    image:
      repository: docker.io/library/nginx
      digest: "sha256:1eff5a5f3fcf8431a0abb7eddf5471fec24e5e1905a2581aeacdb07a4479b92b"

tls-lb:
  enabled: true
  nginx:
    image:
      repository: nginxinc/nginx-unprivileged
      digest: "sha256:4359d693e04e2384cafa10a0fcdca850767dcf541457470124542356a9852c3f"
  upstream:
    address: c8s-tee-proxy:80
    protocol: http

## Common pod-level security knobs.
podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532
