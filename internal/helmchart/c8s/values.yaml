## The c8s component image set: the single source the chart and `c8s install`
## both enumerate from, so adding a component is one edit here.
##   - valuePath:   dotted path to the component's image object (repository/
##                  tag/digest live there).
##   - enabledPath: dotted path to its deploy toggle ("" = always deployed); a
##                  disabled component is neither derived into the NRI whitelist
##                  nor coverage-checked.
##   - cdsExempt:   cds is always seeded via its self-entry (independent of
##                  deriveComponents), so the fail-closed coverage guard skips it.
## Consumed by the c8s.components helper (NRI whitelist derivation + render
## guard) and by `c8s install` (digest resolution, via `helm show values`).
c8sComponents:
  - valuePath: image
    enabledPath: ""
    cdsExempt: false
  - valuePath: cds.image
    enabledPath: ""
    cdsExempt: true
  - valuePath: attestationApi.image
    enabledPath: ""
    cdsExempt: false
  - valuePath: ratlsMesh.image
    enabledPath: ratlsMesh.enabled
    cdsExempt: false
  - valuePath: nriImagePolicy.image
    enabledPath: ""
    cdsExempt: false
  - valuePath: teeProxy.image
    enabledPath: teeProxy.enabled
    cdsExempt: false

## Operator container image. The same image runs every c8s mode that
## doesn't need extra OS bins: controller manager and injected get-cert.
## `tag` and `digest` are consumer-supplied — the chart fails to render if
## neither is set. TEE measurements depend on the exact binary running,
## so floating tags break attestation semantics; prefer `digest`.
image:
  repository: ghcr.io/lunal-dev/c8s-operator
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

## Operator Deployment. The operator is intentionally singleton because the
## webhook path mints pod-local serving PKI and patches one shared
## MutatingWebhookConfiguration caBundle.
operator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  podAnnotations: {}
  extraArgs: []

## Chart-wide image pull secrets, used by every component unless that component
## sets its own .imagePullSecrets. One entry here covers all c8s images.
imagePullSecrets: []

## Common ServiceAccount settings for the chart-managed top-level c8s
## workloads: operator, attestation-api, and CDS. Leave empty to inherit
## the chart-wide imagePullSecrets above; set to override for these workloads.
serviceAccount:
  imagePullSecrets: []

## CRD-backed status mirror for `kubectl get cwl` UX. Disable this when CRDs
## are intentionally not installed; pod injection does not depend on it.
statusMirror:
  enabled: true

## Mutating admission webhook that injects get-cert containers into pods
## annotated with confidential.ai/cw.
webhook:
  caBundle: ""
  service:
    port: 443
  failurePolicy: Fail
  extraExcluded: []
  certVolume:
    fsGroup: 65532
    keyMode: "0640"
  getCert:
    ## Must be shorter than CDS's certTTL. The default renews at 25% of
    ## the chart's 24h certificate TTL.
    renewInterval: 6h
    ## Defaults match distroless nonroot. Kata deployments that need UID 0
    ## inside the guest can set runAsUser/runAsGroup to 0 and runAsNonRoot=false.
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true

## Certificate Distribution Service (cds): the c8s trust root. One binary, one Service,
## one ServiceAccount, and one measurement allowlist serve EAR issuance,
## whitelist, JWKS, mesh-CA leaf signing, and handoff.
##
## The mesh CA key is generated inside the cds process and stays in memory
## only — it is never rendered into a Kubernetes Secret or volume. EAR signing
## and JWKS are in-process too, so there is no internal RA-TLS hop.
cds:
  image:
    repository: ghcr.io/lunal-dev/cds
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  port: 8443
  service:
    type: NodePort
    nodePort: 30808
  ## CDS is a singleton, in-memory trust root reached over a node-local
  ## NodePort and (with persistence) an RWO volume, so it must land on a
  ## known node. node.selector pins it; it must be exactly one label key/value
  ## pair. The default expects that node labelled `role=cds`; override to match
  ## your cluster. When image policy is enabled, the same selector also drives
  ## the cds-installer affinity, worker anti-affinity, and push-hook placement.
  ##
  ## tolerations let CDS land on a node dedicated to it. The default tolerates
  ## `dedicated=cds:NoSchedule`, the conventional dedicated-CDS-node taint (the
  ## counterpart of the role=cds label); override for a different taint, or set
  ## [] for an untainted node.
  node:
    selector:
      role: cds
    tolerations:
      - key: dedicated
        value: cds
        effect: NoSchedule
  logLevel: info
  whitelistDB: /data/whitelist.db
  earIssuer: cds
  expectedIssuer: ""
  jwtClockSkew: 30
  certTTL: 24h
  maxTTL: 24h
  challengeTTL: 60s
  requestTimeout: 5s
  maxRequestSize: 65536
  readinessInterval: 10s
  ## /sign-csr CSRs arrive without a matching TCP source IP under chart routing,
  ## so leave sanValidation off and pin DNS SAN / CN patterns instead.
  sanValidation: false
  ## Regex a CSR's DNS SANs must match in full. Empty uses the chart default
  ## (c8s.cdsDnsSanPattern: any in-cluster Service DNS <name>.<namespace>.svc),
  ## so CDS signs leaf certs for tls-lb and for workloads in any namespace that
  ## request their Service name. Override to pin specific namespaces, or to a
  ## public hostname (matching tlsLb.san) when tls-lb fronts a routed domain.
  dnsSanPattern: ""
  cnPattern: ""
  ## The single flat allowlist of SHA-384 hex launch digests, used two ways:
  ##   1. CDS admits these to call /attest, /sign-csr, and (when handoff is
  ##      enabled) /handoff. NOTE: /handoff hands over the mesh CA private key,
  ##      so every digest listed here can pull the CA — there is no separate,
  ##      narrower handoff allowlist.
  ##   2. The ratls-mesh daemonset and nri-image-policy plugin pin CDS's RA-TLS
  ##      serving cert against it when they dial CDS.
  ## Empty = no pinning (UNSAFE outside dev).
  measurements: []
  ## SHA-384 hex launch digests whose bearer EAR may mutate the whitelist via
  ## POST/DELETE /whitelist. Empty = whitelist writes are rejected.
  whitelistWriteMeasurements: []
  tokenSignerRotationInterval: 720h
  tokenSignerOverlap: 25h
  tokenSignerRotationJitter: 0.1
  rateLimit: 10
  rateBurst: 20
  rateLimiterMaxEntries: 10000
  rateLimiterEvictInterval: 1m
  rateLimiterIdleTimeout: 5m
  ## RA-TLS settings for the cds serving cert. Without this, clients talk to
  ## cds over plaintext HTTP and an on-path attacker can forge responses.
  ## Empty platform disables TLS — UNSAFE outside tests.
  ratlsPlatform: snp
  ratlsCertTTL: 24h
  ca:
    ## The mesh CA key is generated inside cds memory and is not rendered into
    ## a Kubernetes Secret or persistent volume.
    commonName: c8s Mesh CA
    certValidity: 8760h
    minValidity: 1h
  ## Attested CA handoff to a joining cds replica. When enabled, cds
  ## self-provisions its handoff signer EAR in process (no external dial) and
  ## registers /handoff, authorising peers whose launch digest is in
  ## cds.measurements. Required for any active/active cds deployment; without
  ## it, a cds pod restart triggers a full mesh re-bootstrap.
  handoff:
    enabled: false
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## DaemonSet running the attestation-api image from github.com/lunal-dev/attestation-rs.
attestationApi:
  image:
    repository: ghcr.io/lunal-dev/attestation-api
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  port: 8400
  service:
    ## NodePort used by host-process components such as nri-image-policy.
    ## Rendered only when nri-image-policy.enabled=true.
    nodePort: 30840
  ## Per-device hostPath mounts. hostPath.type=CharDevice fails the pod if
  ## the device node doesn't exist on the host, so disable for nodes that
  ## lack the corresponding hardware.
  ##
  ## On Azure CVM nodes, SEV-SNP attestation goes through /dev/tpm0 (vTPM)
  ## rather than the native /dev/sev-guest ioctl, so `tpm: true` is the
  ## right default and `sevGuest`/`tdxGuest` should be left disabled
  ## unless you're on a bare-metal CVM with the direct device node.
  teeDevices:
    sevGuest: false
    tdxGuest: false
    tpm: true
  platforms:
    - snp
    - tdx
    - az-snp
    - az-tdx
    - gcp-snp
    - gcp-tdx
  ## CVM platform shape.
  ##
  ## baremetal (default): direct TEE device node. The least-privilege
  ##   securityContext below (device mount + SYS_RAWIO) suffices.
  ## managed: managed-cloud CVM that gates TEE device access below the
  ##   LSM/device-capability layer (e.g. Azure SEV-SNP via the vTPM at
  ##   /dev/tpm0, which returns "Operation not permitted" even with the device
  ##   mounted and SYS_RAWIO granted). Renders privileged: true.
  cvmMode: baremetal
  ## Least-privilege device access, used only when cvmMode=baremetal.
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
      add: [SYS_RAWIO]
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Kata Containers runtime installation and enforcement.
##
## When kata.enabled is true the chart renders the upstream kata-deploy
## DaemonSet, which installs onto every selected node: the kata-containers
## runtime, the containerd-shim-kata-v2 shim, QEMU and Cloud Hypervisor
## (bundled in the kata-static payload — kata does not use a host QEMU), the
## guest kernel/images, and a containerd runtime drop-in. The chart also
## renders the kata-qemu / kata-clh / kata-qemu-snp RuntimeClass objects
## (kata-deploy's install binary does not create them).
##
## kata-deploy runs privileged with the host root filesystem mounted; the
## image is digest-pinned for that reason. See docs/kata.md for the design,
## threat model, and trade-offs.
kata:
  enabled: false
  image:
    repository: quay.io/kata-containers/kata-deploy
    ## kata-deploy 3.30.0, digest-pinned. kata-deploy is privileged with the
    ## host root mounted, so a repointed `:3.30.0` tag would be root on every
    ## node — content-address it. Matches the kata 3.30.0 pinned across
    ## bare-metal-infra-management and base-images. To bump: resolve the new
    ## digest with
    ##   curl -sS "https://quay.io/api/v1/repository/kata-containers/kata-deploy/tag/?specificTag=<ver>" | jq -r '.tags[0].manifest_digest'
    tag: ""
    digest: "sha256:b31cf13addbaf49af9e211bf6ab38335299015a754e2bc0341aa4ba47d8cb395"
    pullPolicy: IfNotPresent
  ## RKE2-only containerd-prep initContainer. Runs `privileged: true` with
  ## the host root mounted to fix up containerd config before kata-deploy.
  ## Pure POSIX shell, so any minimal busybox image works — but a repointed
  ## tag would be root on every node, exactly like kata-deploy. Content-
  ## address it. busybox:1.37 multi-arch manifest list digest, resolve a new
  ## one with
  ##   curl -sfI -H "Authorization: Bearer $(curl -s 'https://auth.docker.io/token?service=registry.docker.io&scope=repository:library/busybox:pull' | jq -r .token)" \
  ##     -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.index.v1+json" \
  ##     https://registry-1.docker.io/v2/library/busybox/manifests/<ver> | grep -i docker-content-digest
  containerdPrep:
    image:
      repository: busybox
      tag: ""
      digest: "sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028"
      pullPolicy: IfNotPresent
  ## Host Kubernetes distro. Selects the on-host containerd config directory
  ## kata-deploy binds and patches:
  ##   k8s  -> /etc/containerd                                (vanilla / kubeadm)
  ##   rke2 -> /var/lib/rancher/rke2/agent/etc/containerd     (RKE2)
  ## kata-deploy auto-detects which service to restart (containerd vs RKE2);
  ## only the config directory has to be told.
  distro: k8s
  ## Explicit override for the host containerd config directory. Empty means
  ## derive it from `distro`. Set this for a distro `distro` does not cover.
  containerdConfigDir: ""
  ## nodeSelector for the kata-deploy DaemonSet (merged with
  ## kubernetes.io/os=linux). Empty installs kata on every Linux node —
  ## the one-shot install posture. kata-deploy labels each node
  ## katacontainers.io/kata-runtime=true once install completes.
  nodeSelector: {}
  ## kata-deploy copies the full kata-static payload (runtime, QEMU + Cloud
  ## Hypervisor, guest kernel and images) onto the host during install — peak
  ## memory is large and payload-dependent, so no limits: a fixed cap
  ## OOM-kills the installer mid-copy. bare-metal-infra-management's
  ## kata-deploy DaemonSet runs unbounded for the same reason. Requests stay
  ## modest — kata-deploy idles near-zero once install completes.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  ## Kata enforcement. When enforce.enabled is true:
  ##  - the c8s operator's pod webhook injects a runtimeClassName into
  ##    workload pods that don't request one — kata-qemu, or kata-qemu-snp
  ##    for pods annotated confidential.ai/cw;
  ##  - a ValidatingAdmissionPolicy rejects workload pods that request a
  ##    non-kata runtimeClassName.
  ## Host-namespace pods (hostNetwork/hostPID/hostIPC) are exempt from both —
  ## a VM cannot share the host's namespaces. System namespaces and any
  ## namespace in webhook.extraExcluded are also exempt. Requires kata.enabled
  ## and Kubernetes 1.30+ (ValidatingAdmissionPolicy v1).
  enforce:
    enabled: false

## RA-TLS service mesh: transparent L4 proxy with hardware-attested mTLS.
##
## --- CRITICAL OPERATIONAL REQUIREMENT ---
## The ratls-mesh DaemonSet hardcodes hostNetwork: true and
## dnsPolicy: ClusterFirstWithHostNet (see templates/ratls-mesh-daemonset.yaml).
## Both are non-toggleable: iptables-sync must run in the host network namespace
## to intercept pre-DNAT pod traffic at the node level, and the paired
## dnsPolicy keeps in-cluster service DNS working from that netns. Removing
## either breaks the routing model — there is no values knob because there
## is no supported configuration without them. Confirm your cluster CNI and
## any node-level NetworkPolicy/firewall posture is compatible before
## deploying.
ratlsMesh:
  enabled: true

  image:
    repository: ghcr.io/lunal-dev/ratls-mesh
    # -- Image tag. Required: the chart does not pin a default; the consumer
    #    (HelmRelease values or cluster overlay) must set tag or digest.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  # -- RA-TLS TEE type embedded in and verified on mesh certs: sev-snp or tdx.
  #    This is the wire-level platform identifier, not the attestation-api
  #    detection vocab (az-snp and bare-metal snp both verify as sev-snp here);
  #    attestation-api still auto-detects how to gather the evidence.
  platform: sev-snp

  # Host path for iptables lock (k3s: /run/k3s/agent/xtables.lock)
  xtablesLockPath: /run/xtables.lock

  # Mesh ports
  ports:
    outbound: 15001
    inbound: 15006
    health: 15021

  # UID for the ratls-mesh process (iptables excludes this UID)
  uid: 1337

  # UIDs excluded from iptables redirect (comma-separated)
  excludeUids: "0"

  # Certificate settings
  certMode: cds  # self-signed | cds
  certTtl: "4h"
  rotationTimeout: "30s"

  # CDS integration (used when certMode=cds). The launch-measurement allowlist
  # for CDS's RA-TLS peer cert comes from the parent's cds.measurements, not
  # a per-component mirror.
  cds:
    caPollInterval: "5m"

  # Expected launch digests for measurement pinning (empty = accept any)
  measurements: []

  # Pod shutdown budget. The iptables-cleanup preStop hook fires last in the
  # native-sidecar reverse-init order, so its sleep upper bound must leave room
  # for the main proxy to drain first:
  #   preStopSleepSeconds ≤ terminationGracePeriod - drainTimeout
  # Durations use the Go single-unit form (Ns / Nm / Nh) and are parsed via
  # the ratls-mesh.durationSeconds helper for chart-bound arithmetic.
  terminationGracePeriod: "45s"
  drainTimeout: "30s"

  # Connection limits
  maxConns: 10000
  maxConnsPerSource: 0
  idleTimeout: ""

  # TLS session cache
  sessionCacheSize: 64

  # Logging
  logLevel: info

  # Node placement
  nodeSelector: {}

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi

  # Iptables sync sidecar resources
  iptablesSync:
    # Local source namespaces excluded from transparent mesh interception. The chart
    # also appends its release namespace so ratls does not intercept its own control plane.
    excludeSourceNamespaces:
      - kube-system
    resyncPeriod: 30s
    watchdogPeriod: 2s
    ipsetMaxElem: 262144
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

  iptablesCleanup:
    # Seconds the preStop hook sleeps after running iptables-cleanup, giving
    # kube-endpoints time to drop this node from Service backends so in-flight
    # traffic stops landing here before the rules are gone. Bump on clusters
    # with slow endpoint controllers; the upper bound is
    # terminationGracePeriodSeconds (45) minus the main proxy's drain (~30s).
    preStopSleepSeconds: 5
    resources:
      requests:
        cpu: 1m
        memory: 8Mi
      limits:
        cpu: 10m
        memory: 16Mi

  # Probe timings
  probes:
    startup:
      periodSeconds: 2
      failureThreshold: 60
    readiness:
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 3
      failureThreshold: 3

  # --- Policies ---

  # TCP-only egress policy for application namespaces
  tcpEgressPolicy:
    enabled: false
    namespaces: []

  # ValidatingAdmissionPolicy to prevent pods from running as mesh UID
  uidAdmissionPolicy:
    enabled: true

  # PrometheusRule for threat model alerting
  prometheusRules:
    enabled: false

  # Priority class for pod scheduling
  priorityClassName: system-node-critical

  networkPolicy:
    enabled: false
    monitoringNamespace: monitoring

nriImagePolicy:
  enabled: true
  ## Host Kubernetes distro for the nri-image-policy installer: k8s | rke2.
  ## Selects the containerd config layout it targets — see the subchart's
  ## values.yaml. `c8s install --distro` sets this.
  distro: k8s
  image:
    repository: ghcr.io/lunal-dev/nri-image-policy
    # -- Image tag. Required: the chart does not pin a default; the consumer
    #    (HelmRelease values or cluster overlay) must set tag or digest. The
    #    image must contain both the host plugin binary at
    #    /usr/local/bin/nri-image-policy and the install scripts the
    #    DaemonSet executes (install-host-plugin.sh, patch-containerd.sh).
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

  # RKE2-only containerd-prep initContainer. Runs privileged with the host
  # containerd config directory mounted to wire up the drop-in import before
  # the installer writes its NRI drop-in. Digest-pin this image because it runs
  # as root on every selected node.
  containerdPrep:
    image:
      repository: busybox
      tag: ""
      digest: "sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028"
      pullPolicy: IfNotPresent

  imagePullSecrets: []

  # Plugin name. Must match the name the binary registers with at the NRI
  # socket and the entry written to containerd's default_validator.required_plugins.
  pluginName: nri-image-policy
  # Plugin filename inside hostPaths.pluginDir. The "10-" prefix sets sort order
  # relative to other NRI plugins.
  pluginFilename: 10-nri-image-policy

  # CDS coordinates. The node selector that pins CDS lives at top-level
  # cds.node.selector; the image policy reuses it for cds-installer affinity
  # (In), worker-installer anti-affinity (NotIn), and the push-hook nodeSelector.
  # The CDS image admitted by the push-hook and the seed self-entry comes from
  # the top-level cds.image (digest required when image policy is on), so there
  # is no separate CDS image to pin here.
  cds:
    ## Host-process NRI pulls through the chart-managed CDS NodePort and
    ## verifies CDS RA-TLS instead of trusting cluster DNS or ClusterIP routing.
    url: "https://127.0.0.1:30808"
  policy:
    mode: audit  # audit | fail-closed
    enforceExisting: true
    denyMissingAnnotation: true
    exemptNamespaces:
      - kube-system
    # labelRules: Kubernetes-style label selectors evaluated against pod
    # labels at container creation time. With the host-process model there
    # is one plugin per node, so these rules apply globally on each node;
    # multi-tenant isolation needs node-level (not pod-label) partitioning
    # plus per-node values. Leaving empty disables label-based filtering.
    labelRules: []

  # Logging
  logLevel: info

  # Push hook tuning. The hook uses the install image; image.digest is rendered
  # into always_allow so the hook Pod can be admitted by the CDS-node plugin.
  push:
    curlMaxTime: "10"
    retries: "30"
    retryDelay: "2"
    backoffLimit: 3
    ttlSecondsAfterFinished: 300
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 32Mi

  # Host paths the installer DaemonSets write to.
  hostPaths:
    pluginDir: /opt/nri/plugins
    configDir: /etc/nri/conf.d
    cacheDir: /var/lib/nri-image-policy
    runtimeDir: /var/run/nri-image-policy

  # Containerd configuration the installer targets. The config directory,
  # socket, and restart command default from distro; set the fields below only
  # for a distro the built-in values do not cover.
  containerd:
    # Empty derives from distro (k8s -> /etc/containerd,
    # rke2 -> /var/lib/rancher/rke2/agent/etc/containerd).
    configDir: ""
    # Empty derives from distro (k8s -> /run/containerd/containerd.sock,
    # rke2 -> /run/k3s/containerd/containerd.sock).
    socket: ""
    namespace: k8s.io
    # Empty derives from distro (k8s -> "systemctl restart containerd",
    # rke2 -> "systemctl restart rke2-agent").
    restartCommand: ""

  refresh:
    # How often the worker plugin pulls the current whitelist from CDS.
    interval: 30s

  # --- Bootstrap allowlist (the authoritative floor) ---
  # The single source of truth for the image-digest floor. Used two ways:
  #   1. Rendered into every plugin's always_allow (both installer DaemonSets,
  #      via nri-image-policy.bootConfig), so the cluster can bring itself up
  #      before CDS is reachable.
  #   2. Rendered into CDS's --whitelist-seed (templates/cds.yaml), so CDS's
  #      served /whitelist is non-empty on the first worker pull.
  # `digests` is the floor: everything needed to reach a Ready CDS on the CDS
  # node and a working kubelet on every node — the c8s component images plus
  # kube-proxy, coredns, pause/sandbox, CNI — supplied via values or `-f`
  # (resolve digests with crane/skopeo). In production you pin the full set
  # here; deriveComponents below is a demo convenience for the c8s images only.
  #
  # Format: map of "sha256:<hex>" -> "<image reference>"
  bootstrapWhitelist:
    # deriveComponents: a demo convenience (off by default, like
    # `c8s install --resolve-digests`, which turns it on). When true, the c8s
    # component images this chart installs (operator, cds, attestation-api,
    # ratls-mesh, nri-image-policy, tee-proxy) are auto-added to the floor
    # whenever their image.digest is set, so a digest-pinned install self-allows
    # the c8s images without listing them in `digests`. It never covers the
    # non-c8s system images, so production installs pin the full floor in
    # `digests` instead. Entries in `digests` override a derived entry for the
    # same sha256.
    deriveComponents: false
    digests: {}
    # sha256:abc123...: "ghcr.io/lunal-dev/cds:v0.1.0"

  # --- Uninstall hook ---
  # Pre-delete DaemonSet that reverts the containerd config patch and removes
  # host artifacts. Helm waits for the DS to be Ready before continuing the
  # uninstall, so cleanup is observable. Disable to leave host artifacts in
  # place (rare; mostly forensic use).
  uninstall:
    enabled: true

  # Node affinity — exclude edge nodes by default
  nodeAffinity:
    excludeLabels: []

  # Resources for the install-DaemonSet pod itself (init container that
  # copies files and patches containerd, then sleeps idle). Not the host
  # plugin process, which runs outside K8s and has no resource limits.
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

  # Priority class for the install-DaemonSet pod.
  priorityClassName: system-node-critical

  # Health probe socket on the host. The host plugin listens on this unix
  # domain socket inside hostPaths.runtimeDir; the install-DaemonSet probes
  # it after install to verify the plugin came up. Unix socket avoids
  # hostNetwork and the port-conflict surface that comes with it.
  #
  # The plugin source must support binding to a unix socket via the
  # plugin.health_addr config field (rendered as "unix://<path>").
  healthSocketName: health.sock

teeProxy:
  enabled: true
  image:
    repository: ghcr.io/lunal-dev/tee-proxy
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  replicas: 1
  # Domain for autocert TLS
  domain: ""
  # -- Self-provision a CDS-issued serving cert via get-cert (like tls-lb),
  #    instead of a static secret. When enabled, chart-rendered c8s-init-cert /
  #    c8s-renew-cert containers write localhost+2.pem/-key.pem into tls.mountPath
  #    and tee-proxy serves HTTPS from there, hot-reloading on renewal. This is
  #    how tls-lb reaches tee-proxy over mutual attested TLS rather than plain
  #    HTTP. Mutually exclusive with tls.enabled (a static secret).
  certProvisioning:
    enabled: true
    # -- Renewal interval for the get-cert sidecar. Must be shorter than the
    #    CDS-issued cert TTL.
    renewInterval: "1h"
  # Static TLS certificate Secret. When enabled, tee-proxy starts HTTPS using
  # --tls-dir and expects cert/key files named localhost+2.pem and
  # localhost+2-key.pem inside mountPath. Leave off when certProvisioning is on.
  tls:
    enabled: false
    secretName: ""
    certKey: tls.crt
    keyKey: tls.key
    mountPath: /tls
  # Upstream service to proxy to
  upstream: vllm-router-service.vllm.svc.cluster.local
  # Attestation header name
  headerName: "Attestation-Report"
  # Remote attestation-api URL (required for new tee-proxy versions)
  attestationURL: ""
  # Listening ports
  ports:
    https: 443
    http: 80
  # Node placement
  nodeSelector: {}
  tolerations: []
  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi
  # Autocert PVC
  persistence:
    storageClass: ""
    size: 1Gi
  # Probe timings
  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 30
  # Priority class for pod scheduling
  priorityClassName: system-node-critical

tlsLb:
  enabled: true

  # -- Subject Alternative Name for the CDS certificate. Empty defaults to the
  # chart-managed Service DNS name: <release>-tls-lb.<namespace>.svc.
  san: ""

  # -- Upstream backend service to proxy traffic to. Defaults to the
  # chart-managed tee-proxy over mutual attested TLS: tee-proxy serves a
  # CDS-issued cert (teeProxy.certProvisioning) and tls-lb presents its own
  # CDS-issued client cert and verifies tee-proxy's against the mesh CA. Point
  # elsewhere (and set protocol/tls) for a different backend.
  upstream:
    # -- Host and port of the upstream service.
    address: c8s-tee-proxy:443
    # -- Protocol for the upstream connection (http or https).
    protocol: https
    tls:
      # -- Present the CDS-issued certificate to HTTPS upstreams.
      useCDSClientCert: true
      # -- Verify HTTPS upstream certificates with the mounted mesh CA bundle.
      verify: true
      # -- Maximum upstream server certificate chain depth nginx will verify when
      # upstream.tls.verify=true. Increase for private PKI chains with more
      # intermediates between the upstream leaf and trusted CA bundle.
      verifyDepth: 2
      # -- SNI/verification name for the HTTPS upstream. Must match the upstream
      # cert SAN. Empty defaults to the address host, except for the chart-managed
      # tee-proxy where it defaults to its CDS cert SAN <release>-tee-proxy.<ns>.svc.
      serverName: ""
      # -- Optional CA file path. Empty defaults to <meshCA.mountPath>/<meshCA.key>.
      # Custom paths must be provided by the image or another mount.
      trustedCAPath: ""

  # -- Additional path routes proxied before the default upstream backend.
  # Useful for preserving control-plane endpoints while the catch-all route
  # points at an inference backend.
  routes: []
    # - path: /whitelist
    #   match: exact  # exact | prefix (default)
    #   backend:
    #     address: cds.default.svc.cluster.local:8080
    #     protocol: http
    #     tls:
    #       useCDSClientCert: false
    #       verify: false
    #       verifyDepth: 2
    #       serverName: cds.default.svc.cluster.local
    #       trustedCAPath: ""
    #   cors:
    #     enabled: false  # opt this route out of the global CORS block

  # -- CORS headers added to every proxied location (the catch-all upstream and
  # each entry in `routes`) and to the discovery endpoints (`discovery.path`,
  # `discovery.cdsCertPath`, `discovery.meshCAPath`) so browser clients can
  # bootstrap the attested TLS handshake. The internal /healthz endpoint is
  # never affected. Upstream pass-through: if the upstream emits
  # Access-Control-Allow-Origin on a non-preflight response, tls-lb forwards
  # the upstream's CORS header set verbatim and suppresses its own — browsers
  # never see duplicate headers. If the upstream emits no CORS headers,
  # tls-lb injects the configured ones below. Preflight `OPTIONS` requests
  # are short-circuited at nginx with a 204 response using tls-lb's policy
  # (they never reach the upstream). Per-route opt-out: set
  # `routes[i].cors.enabled: false` to disable CORS on that route while
  # leaving the global block enabled. Only the `enabled` key is honored on a
  # per-route cors block.
  cors:
    enabled: false
    # -- Allowed Origin values. Use ["*"] to allow any origin (cannot be
    # combined with allowCredentials: true; browsers reject that pairing).
    # Otherwise list exact origins; the request Origin header is echoed back
    # only when it matches an entry in this list.
    allowOrigins: []
    # -- Methods advertised in Access-Control-Allow-Methods.
    allowMethods: ["GET", "POST", "OPTIONS"]
    # -- Headers advertised in Access-Control-Allow-Headers.
    allowHeaders: ["Authorization", "Content-Type"]
    # -- Headers advertised in Access-Control-Expose-Headers (omitted when empty).
    exposeHeaders: []
    # -- Sets Access-Control-Allow-Credentials: true when enabled.
    allowCredentials: false
    # -- Seconds browsers may cache the preflight response.
    maxAge: 600

  # -- Public TLS certificate presented to internet clients. When secretName is
  # empty, nginx falls back to the CDS-issued cert at tlsMountPath for backwards
  # compatibility.
  publicTLS:
    secretName: ""
    certKey: tls.crt
    keyKey: tls.key
    mountPath: "/public-tls"

  # -- Discovery/preflight metadata served by nginx. The chart-rendered
  # get-cert containers write it with the matching --discovery-* args.
  discovery:
    enabled: false
    path: "/v1/discovery"
    mountPath: "/discovery"
    fileName: "discovery.json"
    cdsCertPath: "/.well-known/cds-cert.pem"
    meshCAPath: "/.well-known/mesh-ca.pem"

  # -- Mesh CA bundle exposed for demo preflight clients. Defaults match the
  # chart-managed c8s CDS ConfigMap name.
  meshCA:
    # -- Serve and advertise the mesh CA PEM when discovery is enabled. The
    # ConfigMap must exist for nginx to serve the bundle; setting optional=true
    # below lets the pod start without it (the discovery URL will then return
    # 404 until the ConfigMap is created).
    expose: true
    # -- Name of an existing ConfigMap holding the mesh CA bundle. CDS does not
    # render this ConfigMap itself (the bundle lives in the in-memory CA + public
    # bundle on the CDS pod), so the operator must provide one when discovery is
    # enabled. Empty defaults to "<release>-cds-mesh-ca".
    configMapName: ""
    key: ca.pem
    mountPath: "/mesh-ca"
    # -- Tolerate a missing mesh CA ConfigMap at pod start. Defaults to true so
    # enabling discovery does not break pod creation; set to false to fail fast
    # in environments that pre-create the ConfigMap.
    optional: true

  imagePullSecrets: []

  certProvisioning:
    # -- Enable verbose (debug) logging for the chart-rendered get-cert containers.
    verbose: false
    # -- How often the c8s-renew-cert sidecar renews the TLS certificate and
    #    SIGHUPs nginx. Must be shorter than the cert TTL issued by CDS.
    renewInterval: "1h"

  nginx:
    image:
      repository: nginxinc/nginx-unprivileged
      digest: "sha256:4359d693e04e2384cafa10a0fcdca850767dcf541457470124542356a9852c3f"
      tag: ""
      pullPolicy: IfNotPresent
    # -- Number of nginx replicas.
    replicas: 1
    # -- HTTPS port nginx listens on. Unprivileged (>=1024) because nginx runs
    #    non-root with a dropped-capability securityContext and cannot bind a
    #    privileged port. The Service presents 443 and forwards to this port
    #    (targetPort references the named `https` port), so public 443 is
    #    unaffected; front it with a LoadBalancer for external ingress.
    httpsPort: 8443
    # -- UID/GID used by nginx and the get-cert containers so both can access
    #    the in-memory CDS key material on the shared tls-certs volume.
    runAsUser: 101
    runAsGroup: 101
    runAsNonRoot: true
    resources: {}

  service:
    # -- Service type. The default ClusterIP is auto-promoted to LoadBalancer
    # when loadBalancerIP or annotations is set (both are inert on a ClusterIP),
    # so setting an IP/annotation alone exposes the listener. Set explicitly to
    # override (e.g. NodePort, or LoadBalancer with no pre-allocated IP).
    type: ClusterIP
    port: 443
    # -- Optional annotations on the Service (e.g. cloud LB / static IP hints).
    # Setting these promotes the default ClusterIP to LoadBalancer.
    annotations: {}
    # -- Optional pre-allocated static load balancer IP. Cloud-provider specific.
    # Setting this promotes the default ClusterIP to LoadBalancer.
    loadBalancerIP: ""

  # -- Volume mount path for the CDS-issued TLS certificate and key shared
  # between get-cert and nginx.
  tlsMountPath: "/tls"

## Common pod-level security knobs.
podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532
