## The c8s component image set: the single source the chart and `c8s install`
## both enumerate from, so adding a component is one edit here.
##   - valuePath:     dotted path to the component's image object (repository/
##                    tag/digest live there).
##   - enabledPath:   dotted path to its deploy toggle ("" = always deployed); a
##                    disabled component is neither derived into the NRI allowlist
##                    nor coverage-checked.
##   - cdsExempt:     cds is always seeded via its self-entry (independent of
##                    deriveComponents), so the fail-closed coverage guard skips it.
##   - externalImage: true for images built outside the c8s repo (e.g.
##                    ghcr.io/openbao/openbao — its own version stream). `c8s
##                    install` does not force --image-tag over them and does not
##                    resolve their digest from the c8s CI tag. They still count
##                    for NRI allowlist derivation.
## Consumed by the c8s.components helper (NRI allowlist derivation + render
## guard) and by `c8s install` (digest resolution, via `helm show values`).
c8sComponents:
  - valuePath: image
    enabledPath: ""
    cdsExempt: false
  - valuePath: cds.image
    enabledPath: ""
    cdsExempt: true
  - valuePath: attestationApi.image
    enabledPath: attestationApi.enabled
    cdsExempt: false
  - valuePath: ratlsMesh.image
    enabledPath: ratlsMesh.enabled
    cdsExempt: false
  - valuePath: nriImagePolicy.image
    enabledPath: nriImagePolicy.enabled
    cdsExempt: false
  - valuePath: secretAgent.image
    enabledPath: secretBroker.enabled
    cdsExempt: false
    externalImage: true

## Operator container image. The same image runs every c8s mode that
## doesn't need extra OS bins: controller manager and injected get-cert.
## `tag` and `digest` are consumer-supplied — the chart fails to render if
## neither is set. TEE measurements depend on the exact binary running,
## so floating tags break attestation semantics; prefer `digest`.
image:
  repository: ghcr.io/confidential-dot-ai/c8s-operator
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

## Operator Deployment. The operator is intentionally singleton because the
## webhook path mints pod-local serving PKI and patches one shared
## MutatingWebhookConfiguration caBundle.
operator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  podAnnotations: {}
  extraArgs: []

## Chart-wide image pull secrets, used by every component unless that component
## sets its own .imagePullSecrets. One entry here covers all c8s images.
imagePullSecrets: []

## Name of a pre-existing registry-credential Secret
## (kubernetes.io/dockerconfigjson) in the release namespace, appended to
## every component's imagePullSecrets — both the chart-wide list above and any
## component-local override — so all pods pull from an authenticated registry
## (e.g. a private mirror of the c8s images) from first start, with no
## manually wired Secret references and no pod restart. Unlike
## the imagePullSecrets list, a component-local override does not shed it.
## The chart never creates or adopts the Secret itself: create it with
## kubectl/external-secrets and pass `c8s install --image-pull-secret <name>`,
## which fails fast when the Secret is missing.
imagePullSecret: ""

## Chart-wide get-cert behavior for the injected mesh-cert init containers.
certProvisioning:
  ## How long an init get-cert container retries CDS in-process before failing.
  ## During a full-stack roll CDS and the mesh are briefly unavailable; retrying
  ## here keeps a transient outage from crashing the init container into
  ## kubelet's minutes-long CrashLoopBackOff. Set comfortably above CDS's
  ## startup-to-serving time. It still fails closed once elapsed: the pod does
  ## not start without a real mesh cert.
  initialRetryTimeout: "2m"

## Common ServiceAccount settings for the chart-managed top-level c8s
## workloads: operator, attestation-api, and CDS. Leave empty to inherit
## the chart-wide imagePullSecrets above; set to override for these workloads.
serviceAccount:
  imagePullSecrets: []

## CRD-backed status mirror for `kubectl get cwl` UX. Disable this when CRDs
## are intentionally not installed; pod injection does not depend on it.
statusMirror:
  enabled: true

## Mutating admission webhook that injects get-cert containers into pods
## annotated with confidential.ai/cw.
webhook:
  caBundle: ""
  ## -- Extra annotations for the MutatingWebhookConfiguration. When
  ## attestationApi.cvmMode=aks (i.e. `c8s install --cvm-mode aks`) the chart
  ## also adds `admissions.enforcer/disabled: "true"` automatically, so AKS's
  ## Admissions Enforcer stops rewriting the webhook's namespaceSelector and
  ## conflicting with `helm upgrade` re-applies. A value set here for the same
  ## key takes precedence over that automatic default.
  annotations: {}
  service:
    port: 443
  failurePolicy: Fail
  extraExcluded: []
  ## ValidatingAdmissionPolicy guarding the confidential.ai/cw pod label
  ## (workload Service membership): at CREATE it must match the opt-in
  ## annotation, and both keys are immutable on UPDATE. Enforced in the API
  ## server, so it holds even when the injection webhook is down.
  cwLabelPolicy:
    enabled: true
  certVolume:
    fsGroup: 65532
    keyMode: "0640"
  getCert:
    ## Must be shorter than CDS's certTTL. The default renews at 25% of
    ## the chart's 24h certificate TTL.
    renewInterval: 6h
    ## Defaults match distroless nonroot. Kata deployments that need UID 0
    ## inside the guest can set runAsUser/runAsGroup to 0 and runAsNonRoot=false.
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true

## Certificate Distribution Service (cds): the c8s trust root. One binary, one Service,
## one ServiceAccount, and one measurement allowlist serve EAR issuance,
## allowlist, JWKS, mesh-CA leaf signing, and handoff.
##
## The mesh CA key is generated inside the cds process and stays in memory
## only — it is never rendered into a Kubernetes Secret or volume. EAR signing
## and JWKS are in-process too, so there is no internal RA-TLS hop.
cds:
  ## Pin `image.digest` for production deployments. The kata-guest-base
  ## bootstrap allowlist binds to the cds digest that was `:main` at the
  ## moment of the kata-guest-base build (floating tag); pinning the deployed
  ## cds by digest decouples the deployment from `:main`'s movement. Same
  ## pattern applies to every c8s image with a `.image.digest` field — see
  ## docs/pitfalls.md ("Bootstrap allowlist binds to floating :main digests").
  image:
    repository: ghcr.io/confidential-dot-ai/cds
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  port: 8443
  service:
    type: NodePort
    nodePort: 30808
  ## CDS is a singleton, in-memory trust root reached over a node-local
  ## NodePort and (with persistence) an RWO volume, so it must land on a
  ## known node. node.selector pins it there; the default expects a node
  ## labelled `role=cds`; override to match your cluster.
  ##
  ## Set selector: {} for a single-node / single-CVM cluster with no dedicated
  ## CDS node: CDS schedules on any node (`c8s install --single-node` sets this
  ## for you). The NRI installer is one pull-mode DaemonSet on every node
  ## regardless, so each plugin pulls from whichever node hosts CDS.
  ##
  ## tolerations let CDS land on a node dedicated to it. The default tolerates
  ## `dedicated=cds:NoSchedule`, the conventional dedicated-CDS-node taint (the
  ## counterpart of the role=cds label); override for a different taint, or set
  ## [] for an untainted node (e.g. a single-node cluster).
  node:
    selector:
      role: cds
    tolerations:
      - key: dedicated
        value: cds
        effect: NoSchedule
  ## CDS is a singleton in-memory trust root: any voluntary eviction (node
  ## drain, autoscaler) destroys the CA and EAR keys and forces every workload
  ## to re-bootstrap. The default PDB (maxUnavailable: 0) blocks voluntary
  ## disruptions so a drain cannot silently take CDS down — the operator must
  ## delete the pod deliberately (a planned re-bootstrap). Set maxUnavailable: 1
  ## to allow drains if you accept the re-bootstrap, or enabled: false to remove
  ## the PDB. See docs/THREAT_MODEL.md.
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 0
  logLevel: info
  allowlistDB: /data/allowlist.db
  earIssuer: cds
  expectedIssuer: ""
  jwtClockSkew: 30
  certTTL: 24h
  maxTTL: 24h
  challengeTTL: 60s
  requestTimeout: 5s
  # -- Max HTTP request body CDS accepts on /authenticate, /sign-csr, and
  # /attest. Sized for the largest evidence envelope we serve today: an Intel
  # TDX quote + full cc_eventlog is ~90 KB uncompressed (the eventlog alone
  # runs 40-85 KB on real TDX hosts; see kata-guest-base's
  # attestation-service.toml). The stock 64 KiB limit is fine for SEV-SNP
  # (evidence ~2 KiB) but rejects every TDX request with HTTP 422
  # `http: request body too large`.
  maxRequestSize: 262144
  readinessInterval: 10s
  ## /sign-csr CSRs arrive without a matching TCP source IP under chart routing,
  ## so leave sanValidation off and pin DNS SAN / CN patterns instead.
  sanValidation: false
  ## Extra full-match regexes a CSR's DNS SANs may match, on top of the chart's
  ## always-present in-cluster Service DNS pattern (c8s.cdsDnsSanPattern:
  ## <name>.<namespace>.svc). A SAN passes if it matches any allowed pattern.
  ##
  ## The mesh's own CSRs (tls-lb.<ns>.svc, ratls-mesh.<ns>.svc)
  ## always validate against the built-in Service pattern, so leave this empty
  ## for purely in-cluster deployments. When tls-lb fronts a routed domain, make
  ## that hostname the first tlsLb.san entry and add it here so CDS signs it onto
  ## the tls-lb leaf — appending here never shadows the in-cluster pattern. Only
  ## the first tlsLb.san is the mesh-cert identity; extra entries widen nginx
  ## server_name only and need no pattern here.
  dnsSanPatterns: []
  cnPattern: ""
  ## The single flat allowlist of SHA-384 hex launch digests, used two ways:
  ##   1. CDS admits these to call /attest, /sign-csr, and (when handoff is
  ##      enabled) /handoff. NOTE: /handoff hands over the mesh CA private key,
  ##      so every digest listed here can pull the CA — there is no separate,
  ##      narrower handoff allowlist.
  ##   2. The ratls-mesh daemonset and nri-image-policy plugin pin CDS's RA-TLS
  ##      serving cert against it when they dial CDS.
  ## Empty = no pinning (UNSAFE outside dev).
  measurements: []
  ## PEM bundle of operator EC public keys (public material, not a secret).
  ## When set, CDS accepts POST/PUT/DELETE /allowlist from a client presenting a
  ## short-lived token signed by one of the matching operator private keys (see
  ## `c8s allowlist` and the README "Operator allowlist credentials").
  ## Empty = allowlist writes are rejected (reads are still served). Prefer
  ## `c8s install --operator-keys <file>` over hand-editing this multi-line value.
  operatorKeys: ""
  tokenSignerRotationInterval: 720h
  tokenSignerOverlap: 25h
  tokenSignerRotationJitter: 0.1
  rateLimit: 10
  rateBurst: 20
  rateLimiterMaxEntries: 10000
  rateLimiterEvictInterval: 1m
  rateLimiterIdleTimeout: 5m
  ## RA-TLS settings for the cds serving cert. Without this, clients talk to
  ## cds over plaintext HTTP and an on-path attacker can forge responses.
  ## Empty platform disables TLS — UNSAFE outside tests.
  ratlsPlatform: snp
  ratlsCertTTL: 24h
  ca:
    ## The mesh CA key is generated inside cds memory and is not rendered into
    ## a Kubernetes Secret or persistent volume.
    commonName: c8s Mesh CA
    certValidity: 8760h
    minValidity: 1h
  ## Attested CA handoff to a joining cds replica. When enabled, cds
  ## self-provisions its handoff signer EAR in process (no external dial) and
  ## registers /handoff, authorising peers whose launch digest is in
  ## cds.measurements. Handoff also requires cds.operatorKeys: a canonical hash
  ## of that public-key set is bound into both replicas' REPORTDATA and must
  ## match before state is released. Required for any active/active cds
  ## deployment; without it, a cds pod restart triggers a full mesh re-bootstrap.
  handoff:
    enabled: false
    ## peerUrl: where a starting cds ADOPTS its mesh CA from over /handoff
    ## instead of generating a fresh one. Setting it also flips the rollout to
    ## RollingUpdate (maxUnavailable:0/maxSurge:1) so the new pod adopts from the
    ## still-serving old pod before it is retired — this is what closes the
    ## restart-rebootstrap window. cds fails closed if the peer is unreachable or
    ## denies the handoff (a partition never mints a divergent trust root).
    ##
    ## Two-phase install: install with handoff.enabled=true (+ pinned
    ## cds.measurements) but peerUrl empty (cold start, self generate); once a
    ## cds pod is serving, `helm upgrade --set cds.handoff.peerUrl=self` to
    ## enable adoption on every subsequent roll. The sentinel "self" expands to
    ## the cds Service URL (adopt from your own predecessor); any other value
    ## is an explicit distinct-peer https URL.
    ## Requires handoff.enabled=true (the serving pod must offer /handoff for
    ## the next roll) and cds.measurements; cannot combine with
    ## persistence.enabled (the surge pod cannot share the RWO data PVC).
    ## The encrypted handoff snapshot carries the complete served allowlist, so
    ## planned adoption rolls preserve operator-added entries despite emptyDir.
    peerUrl: ""
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## DaemonSet running the attestation-api image from github.com/confidential-dot-ai/attestation-rs.
attestationApi:
  ## Render the host-side attestation-api DaemonSet/Service. Disable on
  ## clusters where every workload pod runs as a kata-qemu-snp CVM — the
  ## in-guest attestation-service is baked into kata-guest-base on loopback,
  ## so the host DaemonSet is redundant (and crashloops on bare-metal nodes
  ## that don't attest as a TEE). c8s.attestationApiURL then resolves to the
  ## in-guest loopback endpoint for in-CVM consumers. Must be false under
  ## kata.enabled (`c8s install --cvm-mode=pod` sets it).
  enabled: true
  image:
    repository: ghcr.io/confidential-dot-ai/attestation-api
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  port: 8400
  service:
    ## NodePort used by host-process components such as nri-image-policy.
    ## Rendered only when nri-image-policy.enabled=true.
    nodePort: 30840
  ## Per-device hostPath mounts. hostPath.type=CharDevice fails the pod if
  ## the device node doesn't exist on the host, so disable for nodes that
  ## lack the corresponding hardware.
  ##
  ## Default is the native /dev/sev-guest ioctl, which covers bare-metal SNP
  ## and GKE SNP. Azure (AKS) attests through the vTPM at /dev/tpm0 instead, so
  ## an AKS install flips to tpm (the `c8s install --cvm-mode aks` path sets
  ## this automatically). tdxGuest is opt-in for TDX hosts via -f.
  teeDevices:
    sevGuest: true
    tdxGuest: false
    tpm: false
  platforms:
    - snp
    - tdx
    - az-snp
    - az-tdx
    - gcp-snp
    - gcp-tdx
  ## CVM platform shape — selects (via the install CLI) the TEE device:
  ##
  ## pod: per-pod confidential VMs via the Kata runtime — every workload pod is
  ##   a kata CVM; host-side attestation-api/nri/ratls-mesh are disabled and
  ##   served by the in-guest counterparts. Native TEE device.
  ## node (default): generalized node-as-CVM — our own nodes (self-managed
  ##   TDX/SNP) are themselves confidential VMs exposing a native TEE device
  ##   (/dev/sev-guest, or /dev/tdx-guest with --hardware-platform tdx); pods run
  ##   as ordinary processes attested via the node's own quote. Cloud-agnostic.
  ## gke: GKE managed confidential VM — also native /dev/sev-guest.
  ## aks: Azure confidential VM — SEV-SNP via the vTPM at /dev/tpm0.
  ##
  ## All modes render privileged: true. A hostPath device mount does not add a
  ## device-cgroup rule, so open() on the TEE device is EPERM from an unprivileged
  ## container regardless of SYS_RAWIO. TODO: drop privileged by routing SNP attest
  ## through the TSM configfs report interface (/sys/kernel/config/tsm/report).
  ##
  ## The install CLI requires --cvm-mode explicitly (no default there); this
  ## chart default serves GitOps/HelmRelease consumers that set values directly.
  cvmMode: node
  ## Unused while all modes render privileged: true (see cvmMode above). Retained
  ## for the planned least-privilege configfs path.
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
      add: [SYS_RAWIO]
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Kata Containers runtime installation and enforcement.
##
## When kata.enabled is true the chart renders the upstream kata-deploy
## DaemonSet, which installs onto every selected node: the kata-containers
## runtime, the containerd-shim-kata-v2 shim, QEMU and Cloud Hypervisor
## (bundled in the kata-static payload — kata does not use a host QEMU), the
## guest kernel/images, and a containerd runtime drop-in. The chart also
## renders the kata-qemu / kata-clh / kata-qemu-snp RuntimeClass objects
## (kata-deploy's install binary does not create them).
##
## kata-deploy runs privileged with the host root filesystem mounted; the
## image is digest-pinned for that reason. See docs/kata.md for the design,
## threat model, and trade-offs.
##
## kata.enabled is ENFORCING — there is no kata-without-enforcement shape:
##  - the c8s operator's pod webhook injects a runtimeClassName into
##    workload pods that don't request one — kata-qemu, or kata-qemu-snp
##    for pods annotated confidential.ai/cw;
##  - a ValidatingAdmissionPolicy rejects workload pods that request a
##    non-kata runtimeClassName.
## Host-namespace pods (hostNetwork/hostPID/hostIPC) are exempt from both —
## a VM cannot share the host's namespaces. System namespaces and any
## namespace in webhook.extraExcluded are also exempt. Enforcement requires
## Kubernetes 1.30+ (ValidatingAdmissionPolicy v1), and the host-side
## ratls-mesh, attestation-api, and nriImagePolicy must be disabled — their
## function runs inside the kata-guest-base image (the render fails
## otherwise; `c8s install --cvm-mode=pod` sets all of it).
kata:
  enabled: false
  image:
    repository: quay.io/kata-containers/kata-deploy
    ## kata-deploy 3.30.0, digest-pinned. kata-deploy is privileged with the
    ## host root mounted, so a repointed `:3.30.0` tag would be root on every
    ## node — content-address it. Matches the kata 3.30.0 pinned across
    ## bare-metal-infra-management and base-images. To bump: resolve the new
    ## digest with
    ##   curl -sS "https://quay.io/api/v1/repository/kata-containers/kata-deploy/tag/?specificTag=<ver>" | jq -r '.tags[0].manifest_digest'
    tag: ""
    digest: "sha256:b31cf13addbaf49af9e211bf6ab38335299015a754e2bc0341aa4ba47d8cb395"
    pullPolicy: IfNotPresent
  ## RKE2-only containerd-prep initContainer. Runs `privileged: true` with
  ## the host root mounted to fix up containerd config before kata-deploy.
  ## Pure POSIX shell, so any minimal busybox image works — but a repointed
  ## tag would be root on every node, exactly like kata-deploy. Content-
  ## address it. busybox:1.37 multi-arch manifest list digest, resolve a new
  ## one with
  ##   curl -sfI -H "Authorization: Bearer $(curl -s 'https://auth.docker.io/token?service=registry.docker.io&scope=repository:library/busybox:pull' | jq -r .token)" \
  ##     -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.index.v1+json" \
  ##     https://registry-1.docker.io/v2/library/busybox/manifests/<ver> | grep -i docker-content-digest
  containerdPrep:
    image:
      repository: busybox
      tag: ""
      digest: "sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028"
      pullPolicy: IfNotPresent
  ## Host Kubernetes distro. Selects the on-host containerd config directory
  ## kata-deploy binds and patches:
  ##   k8s  -> /etc/containerd                                (vanilla / kubeadm)
  ##   rke2 -> /var/lib/rancher/rke2/agent/etc/containerd     (RKE2)
  ## kata-deploy auto-detects which service to restart (containerd vs RKE2);
  ## only the config directory has to be told.
  distro: k8s
  ## Explicit override for the host containerd config directory. Empty means
  ## derive it from `distro`. Set this for a distro `distro` does not cover.
  containerdConfigDir: ""
  ## nodeSelector for the kata-deploy DaemonSet (merged with
  ## kubernetes.io/os=linux). Empty installs kata on every Linux node —
  ## the one-shot install posture. kata-deploy labels each node
  ## katacontainers.io/kata-runtime=true once install completes.
  nodeSelector: {}
  ## Node label marking a host SEV-SNP capable, rendered as
  ## scheduling.nodeSelector on the confidential SNP RuntimeClasses so a
  ## wrong-TEE node leaves pods Pending instead of crash-looping QEMU (see
  ## docs/pitfalls.md "kata-qemu-snp on a non-SNP host"). Scheduling aid, not
  ## a security boundary — attestation is. `c8s install --cvm-mode=pod` applies it to
  ## every kata-targeted node (declarative, no probe); -f/GitOps installs
  ## label out-of-band. Swept by `c8s uninstall` — keep in lockstep with
  ## snpCapabilityNodeLabel in cmd/c8s/uninstall.go. Set {} for unrestricted
  ## scheduling, or point at an existing capability label (e.g. NFD's
  ## feature.node.kubernetes.io/cpu-security.sev.snp.enabled: "true").
  snpNodeSelector:
    confidential.ai/sev-snp: "true"
  ## TDX twin of snpNodeSelector: rendered as scheduling.nodeSelector on the
  ## confidential TDX RuntimeClasses, applied by `c8s install --cvm-mode=pod
  ## --hardware-platform=tdx`, swept by `c8s uninstall` — keep in lockstep
  ## with tdxHostLabelKey in cmd/c8s/install.go. Same opt-out and
  ## repoint-at-NFD semantics as snpNodeSelector.
  tdxNodeSelector:
    confidential.ai/tdx: "true"
  ## kata-deploy copies the full kata-static payload (runtime, QEMU + Cloud
  ## Hypervisor, guest kernel and images) onto the host during install — peak
  ## memory is large and payload-dependent, so no limits: a fixed cap
  ## OOM-kills the installer mid-copy. bare-metal-infra-management's
  ## kata-deploy DaemonSet runs unbounded for the same reason. Requests stay
  ## modest — kata-deploy idles near-zero once install completes.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  ## In-guest image: the kata-image-puller DaemonSet fetches the published
  ## kata-guest-base artifact onto each node and points kata-runtime's
  ## configuration-qemu-snp.toml at it (the dm-verity guest rootfs + kernel).
  guestImage:
    ## Set false to skip the kata-image-puller DaemonSet — e.g. for local
    ## testing where the kata-guest-base artifact isn't published to a
    ## registry and you place it on the node + patch the kata config by hand.
    ## Default true: under --cvm-mode=pod the puller fetches the published artifact.
    enabled: true
    repository: ghcr.io/confidential-dot-ai
    ## Default tracks the same floating tag c8s itself falls back to for
    ## non-release builds (see cmd/c8s/install.go fallbackImageTag). Release
    ## installs SHOULD override this to a specific `<short-sha>` digest-stand-in
    ## per docs/pitfalls.md "The bootstrap allowlist binds to floating :main
    ## digests" — the puller has no `digest:` field yet (tracked there).
    tag: main
    ## Use the `<tag>-debug` guest image variant, published in lockstep with
    ## every locked tag (.github/workflows/kata-guest-base.yml). Same build,
    ## two deltas: the baked kata-agent OPA policy allows the host
    ## Exec/ReadStream/WriteStream RPCs (kubectl logs/exec work — container
    ## I/O becomes readable by the untrusted host), and the GPU guest
    ## tolerates a non-CC GPU instead of refusing to boot. The debug launch
    ## measurement differs from the locked one, so attestation pinned to the
    ## locked reference value rejects debug guests. Dev/debugging only;
    ## `c8s install --cvm-mode=pod --debug` sets this.
    debug: false
    ## Pull the kata-guest-base oras artifact over plain HTTP (no TLS). For a
    ## local / in-cluster registry mirror only. Never set for a real registry.
    insecure: false
    ## Optional Secret name (kubernetes.io/dockerconfigjson) in the release
    ## namespace whose `.dockerconfigjson` is projected to /root/.docker/config.json
    ## inside the puller pod so the host-side `oras pull` of kata-guest-base can
    ## authenticate against a registry that requires it (e.g. a private mirror;
    ## the stock ghcr.io/confidential-dot-ai artifact is public and needs none).
    ## Defaults to the chart-wide imagePullSecret: the in-pod oras pull ignores
    ## kubelet imagePullSecrets, but the credential shape is the same and the
    ## artifact usually lives in the same registry as the c8s images, so one
    ## `c8s install --image-pull-secret` covers both. Set this to use a
    ## different credential (must be type kubernetes.io/dockerconfigjson — the
    ## projection reads the `.dockerconfigjson` key). With both unset the pull
    ## is anonymous — the default, and correct for the public artifact. See
    ## docs/pitfalls.md "kata-guest-base puller credentials".
    ##
    ## NOTE: this is a HOST-SIDE operator credential — NOT in the TCB / SNP
    ## launch measurement. Rotating this Secret is a plain DS restart.
    pullerAuthSecret: ""
    ## puller image (oras + a shell). Pinned by digest — the puller writes
    ## into a privileged host path so a repointed tag would be code execution
    ## on the node. The `tag` is kept for human readability; the digest is
    ## what's actually used (see kata-image-puller.yaml). Bump in pairs:
    ##   oras manifest fetch ghcr.io/oras-project/oras:<new-tag>
    pullerImage:
      repository: ghcr.io/oras-project/oras
      tag: "v1.2.0"
      digest: "sha256:0087224dd0decc354b5b0689068fbbc40cd5dc3dbf65fcb3868dfbd363dc790b"
      pullPolicy: IfNotPresent
    ## Host directory the puller writes the guest image into. kata's
    ## configuration-qemu-snp.toml references a subpath of this dir.
    hostPath: /var/lib/c8s/kata-images
    ## puller resource budget. Pulling the guest image is bandwidth-bound,
    ## not CPU-bound; a tight CPU cap keeps it from starving the kata install.
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

  ## Confidential GPU (NVIDIA). Ships with every kata install — no
  ## gpu.enabled: `c8s install --cvm-mode=pod` renders the GPU shim + RuntimeClass,
  ## webhook injection for nvidia.com/* pods, the <tag>-nvidia guest-image
  ## puller, and the sandbox device plugin (its `enabled` below is the only
  ## opt-out). Host GPU provisioning (vfio-pci binding, GPU CC mode, BAR
  ## resize) is out of scope — see docs/kata-gpu.md.
  gpu:
    ## Confidential-GPU guest image: a second kata-image-puller pulls the
    ## `<tag>-nvidia` kata-guest-base variant (same registry/credentials as
    ## kata.guestImage; kata.guestImage.debug selects `<tag>-nvidia-debug`)
    ## and wires the platform's qemu-nvidia-gpu-* shim at it. What's in the
    ## artifact: docs/kata-gpu.md "The -nvidia artifact".
    guestImage:
      ## Host dir the GPU puller writes into — sibling of
      ## kata.guestImage.hostPath; both swept on `c8s uninstall`.
      hostPath: /var/lib/c8s/kata-images-nvidia
      ## PCIe root ports QEMU pre-allocates for VFIO cold-plug — one per
      ## passed-through GPU; the stock SNP-GPU config ships 0, i.e.
      ## passthrough disabled (the chart refuses to render 0). 8 = a full HGX
      ## board (8x H100/B200); an unused port costs only a little guest
      ## ACPI/QEMU overhead.
      pcieRootPort: 8
      ## In-guest memory floor (MiB): the NVIDIA driver's BAR-mapping path
      ## OOMs the stock 8 GiB guest; 64 GiB fits B200-class BAR working sets
      ## plus in-guest OCI extraction.
      defaultMemory: 65536
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    ## NVIDIA kata sandbox device plugin: advertises vfio-bound GPUs as
    ## per-model nvidia.com/<MODEL> resources and writes the CDI spec kata's
    ## cold-plug consumes (docs/kata-gpu.md). Privileged with host /dev, /sys
    ## and the CDI dir mounted, pulled from nvcr.io — hence digest-pinned.
    ## Disable for clusters that advertise GPU devices some other way.
    sandboxDevicePlugin:
      enabled: true
      image:
        repository: nvcr.io/nvidia/cloud-native/nvidia-sandbox-device-plugin
        ## v0.0.3, digest-pinned. Bump in pairs (tag is human-readable; digest
        ## is what's used).
        tag: "v0.0.3"
        digest: "sha256:a897db2f25b1b0ff6195726ba6c307d8567b2285f59cde5f8409683fd9bd12e5"
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

## RA-TLS service mesh: transparent L4 proxy with hardware-attested mTLS.
##
## --- CRITICAL OPERATIONAL REQUIREMENT ---
## The ratls-mesh DaemonSet hardcodes hostNetwork: true and
## dnsPolicy: ClusterFirstWithHostNet (see templates/ratls-mesh-daemonset.yaml).
## Both are non-toggleable: iptables-sync must run in the host network namespace
## to intercept pre-DNAT pod traffic at the node level, and the paired
## dnsPolicy keeps in-cluster service DNS working from that netns. Removing
## either breaks the routing model — there is no values knob because there
## is no supported configuration without them. Confirm your cluster CNI and
## any node-level NetworkPolicy/firewall posture is compatible before
## deploying.
ratlsMesh:
  ## Host-side mesh routing. Must be false under kata.enabled — the ratls
  ## routing runs in-VM via kata-guest-base in that shape
  ## (`c8s install --cvm-mode=pod` sets it).
  enabled: true

  image:
    repository: ghcr.io/confidential-dot-ai/ratls-mesh
    # -- Image tag. Required: the chart does not pin a default; the consumer
    #    (HelmRelease values or cluster overlay) must set tag or digest.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  # -- RA-TLS TEE type embedded in and verified on mesh certs: sev-snp or tdx.
  #    This is the wire-level platform identifier, not the attestation-api
  #    detection vocab (az-snp and bare-metal snp both verify as sev-snp here);
  #    attestation-api still auto-detects how to gather the evidence.
  platform: sev-snp

  # Host path for iptables lock (k3s: /run/k3s/agent/xtables.lock)
  xtablesLockPath: /run/xtables.lock

  # Mesh ports
  ports:
    outbound: 15001
    inbound: 15006
    health: 15021

  # UID for the ratls-mesh process (iptables excludes this UID)
  uid: 1337

  # UIDs excluded from iptables redirect (comma-separated)
  excludeUids: "0"

  # Always-on fail-closed inbound guard for confidential workloads: drop
  # FORWARD-path traffic to pods labeled confidential.ai/cw (Service-VIP DNAT,
  # excluded-namespace dials, cross-node direct-to-pod-IP), which the mesh
  # cannot intercept. passthrough is the reply allowlist: proto:source-port
  # entries RETURNed before the drop for dataplanes whose conntrack does not
  # mark a reply ESTABLISHED (e.g. GKE Dataplane V2 / Cilium breaks the DNS
  # reply, so without udp/tcp:53 get-cert can never resolve). Matching source
  # port admits only replies, never a cw pod's own service ports. Empty list =
  # strict drop-all.
  cwInboundEnforcement:
    passthrough:
      - protocol: udp
        sourcePort: 53
      - protocol: tcp
        sourcePort: 53

  # Certificate settings
  certMode: cds  # self-signed | cds
  certTtl: "4h"
  rotationTimeout: "30s"

  # CDS integration (used when certMode=cds). The launch-measurement allowlist
  # for CDS's RA-TLS peer cert comes from the parent's cds.measurements, not
  # a per-component mirror.
  cds:
    caPollInterval: "5m"

  # Expected launch digests for measurement pinning (empty = accept any)
  measurements: []

  # Pod shutdown budget. The iptables-cleanup preStop hook fires last in the
  # native-sidecar reverse-init order, so its sleep upper bound must leave room
  # for the main proxy to drain first:
  #   preStopSleepSeconds ≤ terminationGracePeriod - drainTimeout
  # Durations use the Go single-unit form (Ns / Nm / Nh) and are parsed via
  # the ratls-mesh.durationSeconds helper for chart-bound arithmetic.
  terminationGracePeriod: "45s"
  drainTimeout: "30s"

  # Connection limits
  maxConns: 10000
  maxConnsPerSource: 0
  idleTimeout: ""

  # TLS session cache
  sessionCacheSize: 64

  # Logging
  logLevel: info

  # Node placement
  nodeSelector: {}

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi

  # Iptables sync sidecar resources
  iptablesSync:
    # Local source namespaces excluded from transparent mesh interception.
    # The release namespace is intentionally NOT excluded: tls-lb's egress
    # to workload pod IPs must be intercepted to get attested mTLS, and
    # control-plane traffic dials Service VIPs the mesh never intercepts.
    # With cwInboundEnforcement, excluded sources are blocked from reaching
    # confidential-workload pods entirely, not left plaintext.
    excludeSourceNamespaces:
      - kube-system
    resyncPeriod: 30s
    watchdogPeriod: 2s
    ipsetMaxElem: 262144
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

  iptablesCleanup:
    # Seconds the preStop hook sleeps after running iptables-cleanup, giving
    # kube-endpoints time to drop this node from Service backends so in-flight
    # traffic stops landing here before the rules are gone. Bump on clusters
    # with slow endpoint controllers; the upper bound is
    # terminationGracePeriodSeconds (45) minus the main proxy's drain (~30s).
    preStopSleepSeconds: 5
    resources:
      requests:
        cpu: 1m
        memory: 8Mi
      limits:
        cpu: 10m
        memory: 16Mi

  # Probe timings
  probes:
    startup:
      periodSeconds: 2
      failureThreshold: 60
    readiness:
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 3
      failureThreshold: 3

  # --- Policies ---

  # TCP-only egress policy for application namespaces
  tcpEgressPolicy:
    enabled: false
    namespaces: []

  # ValidatingAdmissionPolicy to prevent pods from running as mesh UID
  uidAdmissionPolicy:
    enabled: true

  # PrometheusRule for threat model alerting
  prometheusRules:
    enabled: false

  # Priority class for pod scheduling
  priorityClassName: system-node-critical

  networkPolicy:
    enabled: false
    monitoringNamespace: monitoring

nriImagePolicy:
  ## Host-side NRI image admission. Its enabled state is bound to the cvmMode
  ## shape, not free: it MUST be false where another path already admits — under
  ## kata (the in-guest policy-monitor; enforce_host_components) and under
  ## cvmMode=node (the node image bakes a fail-closed plugin) — and MUST be true
  ## otherwise (gke/aks/bare, where host NRI is the only allowlist gate;
  ## require_host_image_policy). `c8s install` sets it from --cvm-mode. The
  ## bootstrapAllowlist below still feeds CDS's served seed whenever a consumer
  ## exists — host NRI, kata's in-guest monitor, or the node-baked plugin (see
  ## c8s.serveAllowlistSeed).
  enabled: true
  ## Host Kubernetes distro for the nri-image-policy installer: k8s | rke2.
  ## Selects the containerd config layout it targets — see the subchart's
  ## values.yaml. `c8s install` sets this to the distro detected from the
  ## cluster's kubelet versions (an install with -f values owns it instead).
  distro: k8s
  image:
    repository: ghcr.io/confidential-dot-ai/nri-image-policy
    # -- Image tag. Required: the chart does not pin a default; the consumer
    #    (HelmRelease values or cluster overlay) must set tag or digest. The
    #    image must contain both the host plugin binary at
    #    /usr/local/bin/nri-image-policy and the install scripts the
    #    DaemonSet executes (install-host-plugin.sh, patch-containerd.sh).
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

  # RKE2-only containerd-prep initContainer. Runs privileged with the host
  # containerd config directory mounted to wire up the drop-in import before
  # the installer writes its NRI drop-in. Digest-pin this image because it runs
  # as root on every selected node.
  containerdPrep:
    image:
      repository: busybox
      tag: ""
      digest: "sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028"
      pullPolicy: IfNotPresent

  imagePullSecrets: []

  # Plugin name. Must match the name the binary registers with at the NRI
  # socket and the entry written to containerd's default_validator.required_plugins.
  pluginName: nri-image-policy
  # Plugin filename inside hostPaths.pluginDir. The "10-" prefix sets sort order
  # relative to other NRI plugins.
  pluginFilename: 10-nri-image-policy

  # CDS coordinates. Every plugin pulls the allowlist from the node-local CDS
  # NodePort below. The CDS image the floor self-admits comes from the top-level
  # cds.image (digest required when image policy is on), so there is no separate
  # CDS image to pin here.
  cds:
    ## Host-process NRI pulls through the chart-managed CDS NodePort and
    ## verifies CDS RA-TLS instead of trusting cluster DNS or ClusterIP routing.
    url: "https://127.0.0.1:30808"
  policy:
    # Secure by default: match the plugin binary's own default and reject images
    # not on the allowlist. Set to `audit` only for bring-up — it logs would-be
    # denials to journald and admits everything, so you can populate the
    # allowlist and review the audit log before enforcing. Don't ship `audit` to
    # production: a permissive default that only docs tell you to harden leaks.
    mode: fail-closed  # fail-closed | audit
    enforceExisting: true
    denyMissingAnnotation: true
    exemptNamespaces:
      - kube-system
    # labelRules: Kubernetes-style label selectors evaluated against pod
    # labels at container creation time. With the host-process model there
    # is one plugin per node, so these rules apply globally on each node;
    # multi-tenant isolation needs node-level (not pod-label) partitioning
    # plus per-node values. Leaving empty disables label-based filtering.
    labelRules: []

  # Logging
  logLevel: info

  # Host paths the installer DaemonSet writes to.
  hostPaths:
    pluginDir: /opt/nri/plugins
    configDir: /etc/nri/conf.d
    cacheDir: /var/lib/nri-image-policy
    runtimeDir: /var/run/nri-image-policy

  # Containerd configuration the installer targets. The config directory,
  # socket, and restart command default from distro; set the fields below only
  # for a distro the built-in values do not cover.
  containerd:
    # Empty derives from distro (k8s -> /etc/containerd,
    # rke2 -> /var/lib/rancher/rke2/agent/etc/containerd).
    configDir: ""
    # Empty derives from distro (k8s -> /run/containerd/containerd.sock,
    # rke2 -> /run/k3s/containerd/containerd.sock).
    socket: ""
    namespace: k8s.io
    # Empty derives from distro (k8s -> "systemctl restart containerd",
    # rke2 -> restart whichever of rke2-server/rke2-agent is active on the
    # node, so server/control-plane and worker nodes are both handled).
    restartCommand: ""

  refresh:
    # How often the worker plugin pulls the current allowlist from CDS.
    interval: 30s

  # --- Bootstrap allowlist (the authoritative floor) ---
  # The single source of truth for the image-digest floor. Used two ways:
  #   1. Rendered into every plugin's always_allow (both installer DaemonSets,
  #      via nri-image-policy.bootConfig), so the cluster can bring itself up
  #      before CDS is reachable.
  #   2. Rendered into CDS's --allowlist-seed (templates/cds.yaml), so CDS's
  #      served /allowlist is non-empty on the first worker pull.
  # `digests` is the floor: everything needed to reach a Ready CDS on the CDS
  # node and a working kubelet on every node — the c8s component images plus
  # kube-proxy, coredns, pause/sandbox, CNI — supplied via values or `-f`
  # (resolve digests with crane/skopeo). In production you pin the full set
  # here; deriveComponents below is a demo convenience for the c8s images only.
  #
  # Format: map of "sha256:<hex>" -> "<image reference>"
  bootstrapAllowlist:
    # deriveComponents: a demo convenience (off by default, like
    # `c8s install --resolve-digests`, which turns it on). When true, the c8s
    # component images this chart installs (operator, cds, attestation-api,
    # ratls-mesh, nri-image-policy) are auto-added to the floor
    # whenever their image.digest is set, so a digest-pinned install self-allows
    # the c8s images without listing them in `digests`. It never covers the
    # non-c8s system images, so production installs pin the full floor in
    # `digests` instead. Entries in `digests` override a derived entry for the
    # same sha256.
    deriveComponents: false
    digests: {}
    # sha256:abc123...: "ghcr.io/confidential-dot-ai/cds:v0.1.0"

  # --- Uninstall hook ---
  # Pre-delete DaemonSet that reverts the containerd config patch and removes
  # host artifacts. Helm waits for the DS to be Ready before continuing the
  # uninstall, so cleanup is observable. Disable to leave host artifacts in
  # place (rare; mostly forensic use).
  uninstall:
    enabled: true

  # Node affinity — exclude edge nodes by default
  nodeAffinity:
    excludeLabels: []

  # Resources for the install-DaemonSet pod itself (init container that
  # copies files and patches containerd, then sleeps idle). Not the host
  # plugin process, which runs outside K8s and has no resource limits.
  # The install init enters all host namespaces (nsenter -t 1) and spawns a
  # transient systemd unit (systemd-run) to restart containerd; that init peak
  # OOM-kills under a 64Mi limit on confidential nodes, so the limit is
  # generous. The request tracks the idle footprint the pod holds for its whole
  # life after init, not that one-time peak.
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Priority class for the install-DaemonSet pod.
  priorityClassName: system-node-critical

  # Health probe socket on the host. The host plugin listens on this unix
  # domain socket inside hostPaths.runtimeDir; the install-DaemonSet probes
  # it after install to verify the plugin came up. Unix socket avoids
  # hostNetwork and the port-conflict surface that comes with it.
  #
  # The plugin source must support binding to a unix socket via the
  # plugin.health_addr config field (rendered as "unix://<path>").
  healthSocketName: health.sock

tlsLb:
  enabled: true

  ## Rollout strategy. Empty resolves by hostPort.enabled: Recreate when the
  ## node port is bound (two concurrent pods on a node would collide on the
  ## host port, and on a single-node cluster a surge pod could never schedule,
  ## deadlocking the roll; get-cert's in-process retry covers the brief
  ## restart gap), otherwise RollingUpdate with maxSurge=1/maxUnavailable=0 so
  ## the new (cert-holding) pod is Ready before the old one is retired. Any
  ## non-empty value here renders verbatim; in particular a surge strategy
  ## carried over from an older values file (the previous shipped default)
  ## deadlocks a single-node roll while hostPort is enabled, so leave this
  ## empty unless hostPort is off.
  strategy: {}

  # Host-network edge binding. When enabled, nginx's TLS listener is published
  # on the node's host port so external clients reach the front door directly
  # on the node IP (kubelet/CNI portmap DNATs the host port to the in-pod
  # unprivileged listener, so nginx needs no privileged bind). This grabs the
  # node's 443: on clusters whose ingress already owns it (notably RKE2, which
  # bundles rke2-ingress-nginx on hostPort 80/443) the tls-lb pod stays
  # Pending ("didn't have free ports for the requested pod ports"); set
  # enabled: false there (reach tls-lb through its Service or your own
  # ingress) or point https at a free host port. https is the host port to
  # bind; empty derives 443.
  #
  # Availability trade-off: with the port bound the strategy auto-resolves to
  # Recreate, so every tls-lb roll drops the node-IP front door for the pod
  # restart window (under kata, a full CVM boot). For gapless rolls set
  # enabled: false and expose tls-lb through its Service instead.
  hostPort:
    enabled: true
    https: ""

  # -- Public hostnames for the front door, as a list. Empty defaults to the
  # chart-managed Service DNS name: <release>-tls-lb.<namespace>.svc. Every entry
  # becomes an nginx server_name, so one tls-lb can answer on several hostnames
  # the serving cert (publicTLS) covers. The FIRST entry is the single identity
  # on the CDS-issued mesh cert — pin it in cds.dnsSanPatterns; the rest widen
  # only server_name and need no dnsSanPatterns entry.
  san: []

  # -- Upstream backend the front door proxies to. No default, and exactly two
  # safe shapes: an adopted confidential workload's headless Service
  # (c8s-<id>.<ns>.svc.cluster.local:<port>, which `c8s install --upstream <id>`
  # fills in here from the ref's :<port>) so the pod-IP hop is wrapped in the
  # node mesh's attested mTLS (this is how a confidential workload like vllm is
  # reached, over plaintext http the mesh secures); otherwise a manual address
  # must be https with tls.verify=true, an upstream that terminates and
  # authenticates TLS itself (app-TLS). A plaintext http or unverified-https
  # manual address fails the render (kind=tlslb_unsecured_upstream): the chart
  # cannot confirm it resolves to pod IPs the mesh intercepts and there is no
  # acknowledgment to override that.
  upstream:
    # -- Host and port of the upstream service. A c8s-<id>.<ns>.svc.cluster.local
    # headless-Service address (what `c8s install --upstream` derives) is
    # recognized as mesh-wrapped and may be plaintext http; any other address
    # must be https + verify. See validations.yaml.
    address: ""
    # -- Protocol for the upstream connection (http or https).
    protocol: http
    tls:
      # -- Present the CDS-issued certificate to HTTPS upstreams.
      useCDSClientCert: true
      # -- Verify the HTTPS upstream's certificate chain against trustedCAPath.
      verify: true
      # -- Maximum upstream server certificate chain depth nginx will verify when
      # upstream.tls.verify=true. Increase for private PKI chains with more
      # intermediates between the upstream leaf and trusted CA bundle.
      verifyDepth: 2
      # -- SNI/verification name for the HTTPS upstream. Must match the upstream
      # cert SAN. Empty defaults to the address host.
      serverName: ""
      # -- CA file nginx verifies the upstream against. Defaults to the get-cert
      # output at <tlsMountPath>/cert.pem, which CDS returns as leaf+CA chain, so
      # CDS-issued upstream certs verify out of the box. Set to
      # <meshCA.mountPath>/<meshCA.key> (and provide that ConfigMap) or another
      # path for a different upstream.
      trustedCAPath: /tls/cert.pem

  # -- Additional path routes proxied before the default upstream backend.
  # Useful for preserving control-plane endpoints while the catch-all route
  # points at an inference backend.
  routes: []
    # - path: /allowlist
    #   match: exact  # exact | prefix (default)
    #   backend:
    #     # A route backend must be https with tls.verify: true (app-TLS): the
    #     # chart cannot confirm a plaintext http or unverified-https address
    #     # resolves to pod IPs the node mesh wraps, so it fails the render
    #     # (kind=tlslb_unsecured_route). A confidential workload is reached via
    #     # tlsLb.upstream (the --upstream flow), not a route.
    #     address: cds.default.svc.cluster.local:8443
    #     protocol: https
    #     tls:
    #       useCDSClientCert: true
    #       verify: true
    #       verifyDepth: 2
    #       serverName: cds.default.svc.cluster.local
    #       trustedCAPath: ""
    #   cors:
    #     enabled: false  # opt this route out of the global CORS block

  # -- CORS headers added to every proxied location (the catch-all upstream and
  # each entry in `routes`) and to the discovery endpoints (`discovery.path`,
  # `discovery.cdsCertPath`, `discovery.meshCAPath`) so browser clients can
  # bootstrap the attested TLS handshake. The internal /healthz endpoint is
  # never affected. Upstream pass-through: if the upstream emits
  # Access-Control-Allow-Origin on a non-preflight response, tls-lb forwards
  # the upstream's CORS header set verbatim and suppresses its own — browsers
  # never see duplicate headers. If the upstream emits no CORS headers,
  # tls-lb injects the configured ones below. Preflight `OPTIONS` requests
  # are short-circuited at nginx with a 204 response using tls-lb's policy
  # (they never reach the upstream). Per-route opt-out: set
  # `routes[i].cors.enabled: false` to disable CORS on that route while
  # leaving the global block enabled. Only the `enabled` key is honored on a
  # per-route cors block.
  cors:
    enabled: false
    # -- Allowed Origin values. Use ["*"] to allow any origin (cannot be
    # combined with allowCredentials: true; browsers reject that pairing).
    # Otherwise list exact origins; the request Origin header is echoed back
    # only when it matches an entry in this list.
    allowOrigins: []
    # -- Methods advertised in Access-Control-Allow-Methods.
    allowMethods: ["GET", "POST", "OPTIONS"]
    # -- Headers advertised in Access-Control-Allow-Headers. X-C8s-Session is
    # sent by browser clients on the /tunnel request, so it must be allowed for
    # the over-encrypted channel to work cross-origin.
    allowHeaders: ["Authorization", "Content-Type", "X-C8s-Session"]
    # -- Headers advertised in Access-Control-Expose-Headers. Always emitted
    # by tls-lb (and merged in front of the upstream's value in pass-through
    # mode) so browsers can read these headers from JS regardless of what
    # the upstream advertises.
    exposeHeaders: []
    # -- Sets Access-Control-Allow-Credentials: true when enabled.
    allowCredentials: false
    # -- Seconds browsers may cache the preflight response.
    maxAge: 600

  # -- Public TLS certificate presented to internet clients. When secretName is
  # empty, nginx falls back to the CDS-issued cert at tlsMountPath for backwards
  # compatibility.
  publicTLS:
    secretName: ""
    certKey: tls.crt
    keyKey: tls.key
    mountPath: "/public-tls"

  # -- Discovery/preflight metadata (the issued cert + attestation evidence
  # with the VCEK chain) served by nginx at `path`. The chart-rendered get-cert
  # containers write it with the matching --discovery-* args. nginx serves it
  # over the public serving port with no client cert, so an unattested client
  # (`c8s verify <lb>`, c8s-verify-js) can fetch it — reach it on the public
  # LoadBalancer/host address, not the meshed in-cluster ClusterIP.
  discovery:
    enabled: true
    path: "/v1/discovery"
    mountPath: "/discovery"
    fileName: "discovery.json"
    cdsCertPath: "/.well-known/cds-cert.pem"
    meshCAPath: "/.well-known/mesh-ca.pem"

  # -- Mesh CA bundle exposed for demo preflight clients. Defaults match the
  # chart-managed c8s CDS ConfigMap name.
  meshCA:
    # -- Serve and advertise the mesh CA PEM at the discovery meshCAPath when
    # discovery is enabled. The bundle is written by the injected get-cert
    # (--ca-out) into the shared cert volume alongside the leaf, so no separate
    # ConfigMap or mount is required.
    expose: true

  imagePullSecrets: []

  certProvisioning:
    # -- Enable verbose (debug) logging for the chart-rendered c8s-cert sidecar.
    verbose: false
    # -- How often the c8s-cert sidecar renews the TLS certificate and SIGHUPs
    #    nginx. Must be shorter than the cert TTL issued by CDS.
    renewInterval: "1h"

  # -- Attestation + over-encryption sidecar (c8s-verify/v1). When enabled, an
  # in-pod `c8s cds-attest` container serves the *dynamic* browser-facing
  # endpoints (the per-session attestation challenge and the post-quantum
  # over-encryption handshake) and nginx reverse-proxies `/.well-known/c8s/` to
  # it on loopback. The static CDS/mesh-CA certs are still served by nginx via
  # `discovery`. The browser client is lunal-dev/c8s-verify-js (wire contract:
  # c8s-verify-js/PROTOCOL.md).
  #
  # On by default: the sidecar only publishes a signed quote of its own TEE, so
  # exposing it does not weaken the server. Trust is established on the CLIENT,
  # which must pin expected launch measurements (`c8s verify --measurements`,
  # c8s-verify-js config) — an unpinned verifier accepting any TEE is a client
  # misconfiguration, not a server exposure. `platform`/`generation` below default
  # to AMD; `c8s install` overrides them from --hardware-platform (tdx blanks the
  # AMD-only generation), so both TEEs advertise correctly out of the box.
  attest:
    enabled: true
    # -- Loopback port the sidecar listens on; nginx proxies `/.well-known/c8s/`
    # to 127.0.0.1 on this port.
    port: 8800
    # -- TEE platform and AMD processor generation advertised to the browser
    # WASM verifier.
    platform: snp
    generation: genoa
    # -- Attestation-api URL the sidecar binds session keys against. Empty
    # defaults to this chart's attestation-api.
    attestationApiURL: ""
    # -- Container resource requests/limits for the sidecar.
    resources: {}

  nginx:
    image:
      repository: nginxinc/nginx-unprivileged
      digest: "sha256:4359d693e04e2384cafa10a0fcdca850767dcf541457470124542356a9852c3f"
      tag: ""
      pullPolicy: IfNotPresent
    # -- Number of nginx replicas.
    replicas: 1
    # -- HTTPS port nginx listens on. Unprivileged (>=1024) because nginx runs
    #    non-root with a dropped-capability securityContext and cannot bind a
    #    privileged port. The Service presents 443 and forwards to this port
    #    (targetPort references the named `https` port), so public 443 is
    #    unaffected; front it with a LoadBalancer for external ingress.
    httpsPort: 8443
    # -- DNS server nginx queries to re-resolve the catch-all upstream address
    #    at request time (per record TTL). Headless-Service upstreams (an adopted
    #    workload) resolve to pod IPs that change on pod churn; without
    #    runtime re-resolution nginx would pin the IPs it saw at startup and
    #    502 until the next config reload. This name is resolved once at nginx
    #    startup through the pod's /etc/resolv.conf, and nginx exits (crash-
    #    loops) if it does not resolve. Empty derives from the distro values
    #    (kata.distro / nriImagePolicy.distro): rke2 ->
    #    rke2-coredns-rke2-coredns.kube-system, else kube-dns.kube-system.
    #    Set explicitly on clusters whose DNS Service is named differently.
    resolver: ""
    # -- UID/GID used by nginx and the get-cert containers so both can access
    #    the in-memory CDS key material on the shared tls-certs volume.
    runAsUser: 101
    runAsGroup: 101
    runAsNonRoot: true
    resources: {}

  service:
    # -- Service type. Set to LoadBalancer to expose the listener publicly
    # (e.g. on AKS/GKE), with annotations below for cloud-LB specifics.
    type: ClusterIP
    port: 443
    # -- Optional annotations on the Service. Use the provider's LB annotation to
    # pin a static IP (e.g. networking.gke.io/load-balancer-ip-addresses on GKE,
    # service.beta.kubernetes.io/azure-pip-name on AKS); the deprecated
    # spec.loadBalancerIP field is intentionally not exposed.
    annotations: {}

  # -- Volume mount path for the CDS-issued TLS certificate and key shared
  # between get-cert and nginx.
  tlsMountPath: "/tls"

## Common pod-level security knobs.
## secret-broker: the attestation-gated OpenBao/Vault proxy (whitepaper §5.6.4).
## It fronts a backing OpenBao/Vault, releasing KV secrets to attested workloads
## whose CDS-issued identity/measurement matches releasePolicy. Workloads opt in
## per-pod with confidential.ai/secrets-inject (+ confidential.ai/secret-<name>),
## which makes the operator inject the secretAgent below. Disabled by default.
secretBroker:
  enabled: false
  replicas: 1
  port: 8443
  imagePullSecrets: []
  service:
    type: ClusterIP
  ## Callers are verified by X.509 chain to the CDS mesh CA — CDS is the trust
  ## root, and it checked the caller's attestation at issuance. Identity is read
  ## from the CDS-vouched leaf (SAN + config-claims); there is no per-caller
  ## measurement pin at the broker.
  certProvisioning:
    ## Renewal interval for the broker's own get-cert mesh-identity sidecar.
    renewInterval: "1h"
  ## Deny-by-default release policy, mounted as policy.json. See the secret-broker
  ## docs (internal/cmds/secretbroker/README.md) for the rule schema. allow
  ## entries may carry a field scope (secret/data/api/db#password) — the broker
  ## then releases only that field, not the whole KV item.
  releasePolicy:
    rules: []
  openbao:
    ## Base URL of the backing OpenBao/Vault, e.g.
    ## https://c8s-openbao.c8s-system.svc:8200 (required when enabled).
    address: ""
    ## Require the store to present a valid TEE attestation (RA-TLS). Set false
    ## for an external/managed store, where the broker becomes the trust edge.
    attested: true
    measurements: []
    ## How the broker authenticates to OpenBao: "token" or "approle".
    authMethod: token
    roleId: ""
    ## A pre-existing Secret holding the broker's OpenBao credential. Mounted as a
    ## file (kept out of argv). For "token" the key holds the token; for "approle"
    ## it holds the secret_id. Empty leaves the broker unauthenticated (configure
    ## before use, or front an in-TCB OpenBao that trusts the broker's mesh cert).
    credentialSecret:
      name: ""
      key: token
  nodeSelector: {}
  tolerations: []
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

## The OpenBao/Vault Agent the webhook injects into secrets-enabled pods. It
## auto-auths to the broker with the pod's mesh cert and templates secrets into
## an in-memory file the app reads unchanged.
secretAgent:
  image:
    repository: ghcr.io/openbao/openbao
    ## openbao 2.5.5. Bump: crane digest ghcr.io/openbao/openbao:<version>.
    digest: "sha256:6150c4a6b62067db6141c8da7a6a6b5763f4f47c315343d0c848b40fecdfd452"
    tag: ""
    pullPolicy: IfNotPresent
  ## Agent binary in the image: "bao" for OpenBao, "vault" for HashiCorp Vault.
  command: bao

## Dev-mode KMS: an in-chart OpenBao dev server the secret-broker fronts,
## for demo/dev clusters (`c8s install --kms`). In-memory storage (data lost
## on pod restart), no seal, root token in a plain k8s Secret — NEVER
## production. Production runs an external (eventually attested) store and
## leaves this disabled. Requires secretBroker.enabled; conflicts with an
## explicit secretBroker.openbao.address (see validations.yaml).
## Runs the secretAgent.image (same openbao image/digest), so the derived
## NRI allowlist already covers it.
kms:
  enabled: false
  port: 8200
  ## Dev root token, rendered into the <release>-openbao-dev-cred Secret and
  ## wired to the broker when secretBroker.openbao.credentialSecret is unset.
  devRootToken: root
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

## LUKS integration — openbao-gated encrypted volumes. A workload pod attaches
## an encrypted block device by annotation
## (confidential.ai/luks-<name>: dev=/dev/vdX,mount=/data,secret=secret/data/…#field);
## the webhook injects a privileged init container that reads the passphrase
## the injected Vault Agent has already templated to /vault/secrets/<name>,
## luksOpens the device, and mounts the decrypted filesystem for the app.
##
## Requires secretBroker.enabled=true (the passphrase must flow through the
## broker) and secrets-inject=true on the pod.
##
## Image defaults to the c8s-operator image — it already ships `c8s luks-open`
## as one of its subcommands. Override if you want to run luks-open from a
## dedicated (e.g. cryptsetup-only) image.
luks:
  # Opt-in, like secretBroker/kms: enabling it arms the privileged c8s-luks-open
  # webhook injection (see the luks_plain_baremetal validation).
  enabled: false
  image:
    ## Empty repository = fall back to the operator image (.Values.image), which
    ## exposes `c8s luks-open`. Set here for a dedicated image.
    repository: ""
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

podSecurityContext:
  fsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532
