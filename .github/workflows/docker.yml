name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GO_VERSION: "1.26.3"
  ATTESTATION_RS_VERSION: "v0.1.0"

jobs:
  # job to download modules only once
  go-modules:
    name: Cache Go Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      - name: Download Go modules
        run: go mod download

  # Build Rust attestation binaries from lunal-dev/attestation-rs.
  # These get bundled into Docker images that need to perform hardware
  # attestation at runtime (talking to the TPM/vTPM via TSS2).
  attestation-binaries:
    name: Attestation binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache attestation binaries
        id: cache-attestation
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: attestation-rs/bin
          key: attestation-binaries-${{ env.ATTESTATION_RS_VERSION }}

      - name: Install system dependencies
        if: steps.cache-attestation.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtss2-dev pkg-config libssl-dev

      - name: Install Rust nightly
        if: steps.cache-attestation.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@nightly

      - name: Clone attestation-rs
        if: steps.cache-attestation.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.ATTESTATION_RS_VERSION }} https://github.com/lunal-dev/attestation-rs.git

      - name: Build attestation binaries
        if: steps.cache-attestation.outputs.cache-hit != 'true'
        run: cd attestation-rs/lunal-attestation && make build-release

      - name: Upload attestation binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: attestation-binaries
          path: |
            attestation-rs/bin/attest-sev-snp
            attestation-rs/bin/attest-tdx
          retention-days: 1

  images:
    name: Docker (${{ matrix.binary }})
    runs-on: ubuntu-latest
    needs: [attestation-binaries, go-modules]
    strategy:
      matrix:
        include:
          - binary: assam
            image: ghcr.io/lunal-dev/assam
            dockerfile: cmd/assam/Dockerfile
            needs-attestation: false
          - binary: c8s
            image: ghcr.io/lunal-dev/c8s-operator
            dockerfile: cmd/c8s/Dockerfile
            needs-attestation: false
          - binary: get-cert
            image: ghcr.io/lunal-dev/get-cert
            dockerfile: cmd/get-cert/Dockerfile
            needs-attestation: false
          - binary: ratls-mesh
            image: ghcr.io/lunal-dev/ratls-mesh
            dockerfile: cmd/ratls-mesh/Dockerfile
            needs-attestation: true
          - binary: cert-issuer
            image: ghcr.io/lunal-dev/cert-issuer
            dockerfile: cmd/cert-issuer/Dockerfile
            needs-attestation: false
          - binary: nri-image-policy
            image: ghcr.io/lunal-dev/nri-image-policy
            dockerfile: cmd/nri-image-policy/Dockerfile
            needs-attestation: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build Go binary
        run: make build-c8s

      - name: Download attestation binaries
        if: matrix.needs-attestation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: attestation-binaries
          path: build

      - name: Make attestation binaries executable
        if: matrix.needs-attestation
        run: chmod +x build/attest-*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          load: ${{ !(github.event_name == 'push') }}
          tags: ${{ steps.meta.outputs.json != '' && fromJSON(steps.meta.outputs.json).tags[0] || format('{0}:ci', matrix.image) }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable GHA caching for Docker layers
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image
        id: container-scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.meta.outputs.json != '' && fromJSON(steps.meta.outputs.json).tags[0] || format('{0}:ci', matrix.image) }}
          fail-build: false
      - name: Inspect action SARIF report
        run: cat ${{ steps.container-scan.outputs.sarif }}
