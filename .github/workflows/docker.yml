name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths: &docker-paths
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "cmd/**/Dockerfile"
      - "cmd/nri-image-policy/enable-nri.sh"
      - "internal/helmchart/c8s/**"
      - "Makefile"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths: *docker-paths

permissions:
  contents: read
  packages: write
  pull-requests: read   # dorny/paths-filter calls the PR files API on PR events

env:
  REGISTRY: ghcr.io
  GO_VERSION: "1.26.3"

jobs:
  # Per-image jobs run only when the component's own cmd/<X> or
  # internal/cmds/<X> changed (this applies to both PR events and
  # branch pushes). Shared code (pkg/**, root internal/** minus
  # cmds/helmchart, go.mod/sum, Makefile, this workflow) fans out to
  # every image. Tag pushes (v*) always fan out so semver release
  # tags land on every image.
  #
  # On branch pushes, unchanged components keep their existing
  # `latest` / `main` tag pointing at the previous build's manifest —
  # which is the correct state, since nothing changed for them.
  # Deploys pinned to `latest` or to a release tag work without any
  # CI-side tag aliasing.
  changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.docker-matrix.outputs.matrix }}
      has_images: ${{ steps.docker-matrix.outputs.has_images }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            shared-core:
              - '{pkg/**,internal/**}'
              - '!internal/cmds/**'
              - '!internal/helmchart/**'
              - '!**/*_test.go'
              - '!**/*.md'
              - '!**/testdata/**'
            shared-cmdsutil:
              # cmdsutil is shared across every component's main package
              - 'internal/cmds/cmdsutil/**'
              - '!**/*_test.go'
              - '!**/*.md'
              - '!**/testdata/**'
            shared-root:
              - '{go.mod,go.sum,go.work,go.work.sum,Makefile,.github/workflows/docker.yml}'
            c8s:
              # cmd/c8s is the multi-mode binary used by the operator image;
              # it imports every internal/cmds subcommand, including get-cert.
              - '{cmd/c8s/**,internal/cmds/**}'
            cds:
              - '{cmd/cds/**,internal/cmds/cds/**}'
            get-cert:
              - '{cmd/get-cert/**,internal/cmds/getcert/**}'
            ratls-mesh:
              - '{cmd/ratls-mesh/**,internal/cmds/ratlsmesh/**}'
            nri-image-policy:
              - '{cmd/nri-image-policy/**,internal/cmds/nriimagepolicy/**}'
      - name: Build Docker matrix
        id: docker-matrix
        env:
          SHARED: ${{ steps.filter.outputs['shared-core'] == 'true' || steps.filter.outputs['shared-cmdsutil'] == 'true' || steps.filter.outputs['shared-root'] == 'true' }}
          C8S: ${{ steps.filter.outputs.c8s }}
          CDS: ${{ steps.filter.outputs.cds }}
          GET_CERT: ${{ steps.filter.outputs['get-cert'] }}
          RATLS_MESH: ${{ steps.filter.outputs['ratls-mesh'] }}
          NRI_IMAGE_POLICY: ${{ steps.filter.outputs['nri-image-policy'] }}
        run: |
          set -euo pipefail

          include=()
          add_image() {
            include+=("{\"binary\":\"$1\",\"image\":\"$2\",\"dockerfile\":\"$3\"}")
          }
          add_if_changed() {
            local changed="$1"
            shift
            if [[ "$GITHUB_REF" == refs/tags/* || "$SHARED" == "true" || "$changed" == "true" ]]; then
              add_image "$@"
            fi
          }

          add_if_changed "$C8S" c8s ghcr.io/lunal-dev/c8s-operator cmd/c8s/Dockerfile
          add_if_changed "$CDS" cds ghcr.io/lunal-dev/cds cmd/cds/Dockerfile
          add_if_changed "$GET_CERT" get-cert ghcr.io/lunal-dev/get-cert cmd/get-cert/Dockerfile
          add_if_changed "$RATLS_MESH" ratls-mesh ghcr.io/lunal-dev/ratls-mesh cmd/ratls-mesh/Dockerfile
          add_if_changed "$NRI_IMAGE_POLICY" nri-image-policy ghcr.io/lunal-dev/nri-image-policy cmd/nri-image-policy/Dockerfile

          if [[ ${#include[@]} -eq 0 ]]; then
            echo 'has_images=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix=$(IFS=,; printf '{"include":[%s]}' "${include[*]}")
          echo 'has_images=true' >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  go-modules:
    name: Cache Go Modules
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.has_images == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      - name: Download Go modules
        run: go mod download

  images:
    name: Docker (${{ matrix.binary }})
    runs-on: ubuntu-latest
    needs: [changes, go-modules]
    if: needs.changes.outputs.has_images == 'true'
    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build Go binary
        run: make build-c8s

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          load: ${{ !(github.event_name == 'push') }}
          tags: ${{ steps.meta.outputs.json != '' && fromJSON(steps.meta.outputs.json).tags[0] || format('{0}:ci', matrix.image) }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable GHA caching for Docker layers
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image
        id: container-scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.meta.outputs.json != '' && fromJSON(steps.meta.outputs.json).tags[0] || format('{0}:ci', matrix.image) }}
          fail-build: false
      - name: Inspect action SARIF report
        run: cat ${{ steps.container-scan.outputs.sarif }}
