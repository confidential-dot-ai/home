name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GO_VERSION: "1.26.1"
  ATTESTATION_RS_VERSION: "v0.1.0"

jobs:
  # job to download modules only once
  go-modules:
    name: Cache Go Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      - name: Download Go modules
        run: go mod download

  # Build Rust attestation binaries from lunal-dev/attestation-rs.
  # These get bundled into Docker images that need to perform hardware
  # attestation at runtime (talking to the TPM/vTPM via TSS2).
  attestation-binaries:
    name: Attestation binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache attestation binaries
        id: cache-attestation
        uses: actions/cache@v4
        with:
          path: attestation-rs/bin
          key: attestation-binaries-${{ env.ATTESTATION_RS_VERSION }}

      - name: Install system dependencies
        if: steps.cache-attestation.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtss2-dev pkg-config libssl-dev

      - name: Install Rust nightly
        if: steps.cache-attestation.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@nightly

      - name: Clone attestation-rs
        if: steps.cache-attestation.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.ATTESTATION_RS_VERSION }} https://github.com/lunal-dev/attestation-rs.git

      - name: Build attestation binaries
        if: steps.cache-attestation.outputs.cache-hit != 'true'
        run: cd attestation-rs/lunal-attestation && make build-release

      - name: Upload attestation binaries
        uses: actions/upload-artifact@v7
        with:
          name: attestation-binaries
          path: |
            attestation-rs/bin/attest-sev-snp
            attestation-rs/bin/attest-tdx
          retention-days: 1

  images:
    name: Docker (${{ matrix.binary }})
    runs-on: ubuntu-latest
    needs: [attestation-binaries, go-modules]
    strategy:
      matrix:
        include:
          - binary: assam
            image: ghcr.io/lunal-dev/assam
            dockerfile: cmd/assam/Dockerfile
            needs-attestation: false
          - binary: c8s
            image: ghcr.io/lunal-dev/c8s-operator
            dockerfile: cmd/c8s/Dockerfile
            needs-attestation: false
          - binary: get-cert
            image: ghcr.io/lunal-dev/get-cert
            dockerfile: cmd/get-cert/Dockerfile
            needs-attestation: false
          - binary: ratls-mesh
            image: ghcr.io/lunal-dev/ratls-mesh
            dockerfile: cmd/ratls-mesh/Dockerfile
            needs-attestation: true
          - binary: cert-issuer
            image: ghcr.io/lunal-dev/cert-issuer
            dockerfile: cmd/cert-issuer/Dockerfile
            needs-attestation: false
          - binary: cert-rotator
            image: ghcr.io/lunal-dev/cert-rotator
            dockerfile: cmd/cert-rotator/Dockerfile
            needs-attestation: true
          - binary: nri-image-policy
            image: ghcr.io/lunal-dev/nri-image-policy
            dockerfile: cmd/nri-image-policy/Dockerfile
            needs-attestation: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build Go binary
        run: make build-c8s

      - name: Download attestation binaries
        if: matrix.needs-attestation
        uses: actions/download-artifact@v8
        with:
          name: attestation-binaries
          path: build

      - name: Make attestation binaries executable
        if: matrix.needs-attestation
        run: chmod +x build/attest-*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          load: ${{ !(github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.json != '' && fromJSON(steps.meta.outputs.json).tags[0] || format('{0}:ci', matrix.image) }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable GHA caching for Docker layers
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image
        id: container-scan
        uses: anchore/scan-action@568b89d27fc18c60e56937bff480c91c772cd993 # v7.1.0
        with:
          image: ${{ steps.meta.outputs.json != '' && fromJSON(steps.meta.outputs.json).tags[0] || format('{0}:ci', matrix.image) }}
          fail-build: false
      - name: Inspect action SARIF report
        run: cat ${{ steps.container-scan.outputs.sarif }}
