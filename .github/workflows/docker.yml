name: Docker

on:
  # Build on every branch, and *publish* on every branch push — not just main.
  # Side branches publish their component images so the downstream "Kata guest
  # base" workflow (triggered via workflow_run on Docker's *push* completion)
  # can resolve and bake their digests on feature branches too. main and v*
  # tags keep their existing official tags; side branches only ever publish the
  # opaque short-SHA + sanitized branch-name tags — never latest/main/vX, since
  # latest is gated to is_default_branch and semver/tag tags only apply on tag
  # pushes (see the metadata-action tag list below).
  push:
    branches: ["**"]
    tags: ["v*"]
    paths: &docker-paths
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "cmd/**/Dockerfile"
      - "cmd/nri-image-policy/enable-nri.sh"
      - "internal/helmchart/c8s/**"
      - "Makefile"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths: *docker-paths
  # Manual rebuild escape hatch. The push trigger above is path-gated to source
  # changes, so a rebuild driven by something OFF the source tree — a rotated
  # secret baked into a downstream image (e.g. READ_PRIVATE_GHCR_TOKEN, which
  # the Kata guest base bakes into the measured rootfs), a base-image refresh,
  # or a registry re-push — has no commit that would trip the paths filter and
  # cannot otherwise run. workflow_dispatch publishes EVERY component image at
  # this commit's tags (the matrix fans out to all of them — see
  # docker-build-matrix.sh), exactly as a tag push does, so the downstream
  # "Kata guest base" workflow can resolve every component's :<short-sha> and
  # cascade off this run (its workflow_run gate accepts a workflow_dispatch
  # origin on main / v* — see kata-guest-base.yml).
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read   # dorny/paths-filter calls the PR files API on PR events

env:
  REGISTRY: ghcr.io

jobs:
  # Per-image jobs run only when the component's own cmd/<X> or
  # internal/cmds/<X> changed (this applies to both PR events and
  # branch pushes). Shared code (pkg/**, root internal/** minus
  # cmds/helmchart, go.mod/sum, Makefile, this workflow) fans out to
  # every image. Tag pushes (v*) always fan out so semver release
  # tags land on every image.
  #
  # On branch pushes, unchanged components keep their existing
  # `latest` / `main` tag pointing at the previous build's manifest —
  # which is the correct state, since nothing changed for them.
  # Deploys pinned to `latest` or to a release tag work without any
  # CI-side tag aliasing.
  changes:
    name: Detect changed components
    # With push broadened to all branches, a same-repo PR branch would
    # otherwise run Docker twice: once for its push (which publishes) and once
    # for the pull_request event (which doesn't). Run the push copy and skip the
    # redundant same-repo PR copy; still run for PRs opened from forks, which
    # can't push to this repo and so have no push run to cover them. The
    # dependent jobs (needs: changes) cascade-skip when this one is skipped.
    # workflow_dispatch always runs (manual rebuild of every component).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.docker-matrix.outputs.matrix }}
      has_images: ${{ steps.docker-matrix.outputs.has_images }}
      # retag-unchanged gates on these. A step output that isn't mapped here
      # reads as empty downstream — `has_retag == 'true'` was silently false on
      # every push, so the retag job never ran and unchanged components got no
      # `:<short-sha>` tag (kata-guest-base's fetch.sh then 404'd on them).
      retag_matrix: ${{ steps.docker-matrix.outputs.retag_matrix }}
      has_retag: ${{ steps.docker-matrix.outputs.has_retag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Skip on workflow_dispatch: a manual run has no before/after diff base for
      # paths-filter to compute against, and we fan out to every component anyway
      # (docker-build-matrix.sh treats workflow_dispatch like a tag push). With
      # this step skipped its outputs read empty downstream, which the matrix
      # script correctly sees as "no per-component filter" before falling through
      # to the fan-out.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          predicate-quantifier: every
          filters: |
            shared-core:
              - '{pkg/**,internal/**}'
              - '!internal/cmds/**'
              - '!internal/helmchart/**'
              - '!**/*_test.go'
              - '!**/*.md'
              - '!**/testdata/**'
            shared-cmdsutil:
              # cmdsutil is shared across every component's main package
              - 'internal/cmds/cmdsutil/**'
              - '!**/*_test.go'
              - '!**/*.md'
              - '!**/testdata/**'
            shared-root:
              - '{go.mod,go.sum,go.work,go.work.sum,Makefile,.github/workflows/docker.yml}'
            c8s:
              # cmd/c8s is the multi-mode binary used by the operator image;
              # it imports every internal/cmds subcommand, including get-cert.
              - '{cmd/c8s/**,internal/cmds/**}'
            cds:
              - '{cmd/cds/**,internal/cmds/cds/**}'
            get-cert:
              - '{cmd/get-cert/**,internal/cmds/getcert/**}'
            ratls-mesh:
              - '{cmd/ratls-mesh/**,internal/cmds/ratlsmesh/**}'
            nri-image-policy:
              - '{cmd/nri-image-policy/**,internal/cmds/nriimagepolicy/**}'
      - name: Build Docker matrix
        id: docker-matrix
        env:
          SHARED: ${{ steps.filter.outputs['shared-core'] == 'true' || steps.filter.outputs['shared-cmdsutil'] == 'true' || steps.filter.outputs['shared-root'] == 'true' }}
          C8S: ${{ steps.filter.outputs.c8s }}
          CDS: ${{ steps.filter.outputs.cds }}
          GET_CERT: ${{ steps.filter.outputs['get-cert'] }}
          RATLS_MESH: ${{ steps.filter.outputs['ratls-mesh'] }}
          NRI_IMAGE_POLICY: ${{ steps.filter.outputs['nri-image-policy'] }}
        run: .github/scripts/docker-build-matrix.sh

  go-modules:
    name: Cache Go Modules
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.has_images == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-go-c8s
      - name: Download Go modules
        run: go mod download

  images:
    name: Docker (${{ matrix.binary }})
    runs-on: ubuntu-latest
    needs: [changes, go-modules]
    if: needs.changes.outputs.has_images == 'true'
    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-go-c8s

      - name: Build Go binary
        run: make build-c8s

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Publish on push AND on workflow_dispatch (the manual rebuild path —
          # its whole purpose is to re-publish these images so the Kata guest
          # base can resolve them). PR runs still only `load` for the scan.
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          load: ${{ !(github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
          # Apply ALL computed tags, not just tags[0]. metadata-action emits
          # `type=sha,prefix=` (the 7-char short SHA), and the "Kata guest base"
          # build resolves cds/get-cert by that short SHA (IMAGE_TAG=${HEAD_SHA::7})
          # to pin their digests into the measured bootstrap allowlist. tags[0]
          # is the highest-priority *human* tag (main / branch name / semver),
          # so with the old single-tag push the short-SHA tag never reached GHCR
          # and that lookup could not resolve — on any branch, main included.
          # Pushing the full set also makes `latest` real on main (deploys pin
          # it). Side branches still only get short-SHA + sanitized branch name;
          # latest/semver/tag tags are gated to the default branch / tag pushes.
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable GHA caching for Docker layers
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image
        id: container-scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.meta.outputs.json != '' && fromJSON(steps.meta.outputs.json).tags[0] || format('{0}:ci', matrix.image) }}
          fail-build: false
      - name: Inspect action SARIF report
        run: cat ${{ steps.container-scan.outputs.sarif }}

  # For each component image NOT in this run's build matrix, copy the
  # `:main` tag's manifest under `:<short-sha>`. The downstream
  # "Kata guest base" workflow resolves every component by `:<short-sha>`
  # (kata-guest-base/scripts/fetch.sh: `oras manifest fetch
  # ghcr.io/confidential-dot-ai/{cds,get-cert}:${HEAD_SHA::7}`) to pin the
  # bootstrap allowlist into the measured rootfs. Without this job, a
  # push that only touched one component (say cmd/c8s/**) leaves cds,
  # get-cert, ratls-mesh, nri-image-policy with no `:<short-sha>` tag at
  # all — and kata-guest-base 404s.
  #
  # Source = `:main` always: on main this is the manifest just (or
  # previously) published for an unchanged component; on side branches
  # this is the manifest the branch implicitly inherits for components
  # it didn't change. `oras tag` only mutates the registry's tag index —
  # no layer upload, no manifest rewrite — so the digest of `:<short-sha>`
  # is identical to whatever `:main` currently points at.
  retag-unchanged:
    name: Retag unchanged (${{ matrix.binary }})
    runs-on: ubuntu-latest
    needs: [changes, images]
    # Run when `images` either succeeded or was skipped (has_images=false
    # means nothing was rebuilt this run, so every component needs
    # retagging). `always()` is required so the job isn't auto-skipped
    # when `images` was skipped.
    if: |
      always()
      && github.event_name == 'push'
      && needs.changes.result == 'success'
      && (needs.images.result == 'success' || needs.images.result == 'skipped')
      && needs.changes.outputs.has_retag == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.retag_matrix) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup ORAS
        uses: oras-project/setup-oras@8d34698a59f5ffe24821f0b48ab62a3de8b64b20 # v1.2.3
      - name: Retag :main -> :${{ github.sha }} (short)
        env:
          IMAGE: ${{ matrix.image }}
          # github.sha is the 40-char commit SHA; metadata-action's
          # `type=sha,prefix=` emits the 7-char prefix. Match it.
          FULL_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${FULL_SHA:0:7}"
          echo "==> oras tag ${IMAGE}:main ${SHORT_SHA}"
          # Idempotent: re-runs of the same commit are no-ops if the
          # tag already points at the same manifest.
          oras tag "${IMAGE}:main" "${SHORT_SHA}"
