name: Extract kernel snapshot

# One-shot helper to seed the committed kernel-config lockfile
# (kata-guest-base/kernel/config-x86_64.snapshot) from a runner-produced file
# WITHOUT SSH into the self-hosted build host.
#
# The "Kata guest base" workflow resolves the merged kernel .config (steep's
# required+hardening baseline + kata-guest-base/kernel/container.config) and
# caches it at steep/kernel/config-x86_64.snapshot, keyed on STEEP_REF + the
# container.config hash. This job restores that exact cache and uploads just
# the snapshot as a downloadable artifact — no kernel build, no Docker
# dependency, runs in seconds on a GitHub-hosted runner.
#
# THROWAWAY: delete this workflow once the baseline snapshot is committed (or
# fold it into the eventual snapshot drift gate). It only reads a cache.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  # MUST stay in lockstep with .github/workflows/kata-guest-base.yml: the kernel
  # cache key is scoped to the steep ref the kernel was built against, so a
  # mismatch here turns the exact-key restore into a miss.
  STEEP_REF: "4b731634be9ae6a592f082a2501f8de95f3600ce"

jobs:
  extract:
    name: Extract kernel-config snapshot
    runs-on: ubuntu-latest
    steps:
      # Check out into ./c8s so hashFiles('c8s/kata-guest-base/kernel/
      # container.config') below resolves the SAME workspace path the build
      # hashed into its cache key (kata-guest-base.yml checks c8s out to ./c8s).
      - name: Checkout c8s
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: c8s

      # Exact-key restore of the kata-guest-base kernel cache. The key is a
      # byte-for-byte copy of kata-guest-base.yml's "Save guest kernel build"
      # (runner.os + STEEP_REF + the container.config hash). restore-keys keeps
      # a prefix match useful if only the fragment hash has since drifted.
      - name: Restore kata-guest-base kernel cache
        id: restore
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            steep/output/kernel
            steep/kernel/config-x86_64.snapshot
          key: ${{ runner.os }}-kata-kernel-v2-${{ env.STEEP_REF }}-${{ hashFiles('c8s/kata-guest-base/kernel/container.config') }}
          restore-keys: |
            ${{ runner.os }}-kata-kernel-v2-${{ env.STEEP_REF }}-

      - name: Verify snapshot present + show sha256
        run: |
          set -euo pipefail
          f=steep/kernel/config-x86_64.snapshot
          if [[ ! -f "$f" ]]; then
            echo "::error::no $f in the restored cache (matched key: ${{ steps.restore.outputs.cache-matched-key || 'none' }})"
            exit 1
          fi
          sha256sum "$f"
          echo "expected (kata-guest-base run 27443236830): 0843fe25949efdcd7d67acbfc4c22005ac3e32a6d1564baa56966ee9edd9cee4"

      - name: Upload snapshot
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: config-x86_64.snapshot
          path: steep/kernel/config-x86_64.snapshot
          if-no-files-found: error
