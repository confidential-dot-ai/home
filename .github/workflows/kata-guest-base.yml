name: Kata guest base

# Builds + pushes the kata-guest-base rootfs image — the kata-native
# guest every c8s kata-qemu-snp pod boots into. kata-qemu does measured
# direct-kernel boot (no IGVM/UKI), so we publish the parts kata wants: a
# hardened kernel (built by steep), a dm-verity erofs rootfs (built by
# kata's osbuilder, with our ratls-mesh / attestation-service /
# policy-monitor + bootstrap allowlist baked into the verity root), and
# the verity params. The rootfs root hash rides in the kata kernel
# cmdline and is folded into the SNP kernel-hashes launch measurement;
# per-pod container images (assam, cert-issuer, workloads) are secondary
# measurements the operator attests post-install.
#
# Output: ghcr.io/confidential-dot-ai/kata-guest-base:<tag> via `oras push`. Flat
# at the org level matches every other c8s artifact
# (ghcr.io/confidential-dot-ai/{assam,cert-issuer,ratls-mesh,...}).
#
# Every build also publishes a DEBUG variant at <tag>-debug (build.sh
# Step 5): the same rootfs except the baked kata-agent policy allows the
# host log/exec stream RPCs, so `kubectl logs` / `kubectl exec` work
# against kata-qemu-snp pods. Its launch measurement differs from the
# locked image, so locked-reference attestation rejects it. Selected by
# `c8s install --kata --debug` (kata.guestImage.debug=true). Dev only.
#
# The confidential-GPU pair publishes in lockstep too: <tag>-nvidia and
# <tag>-nvidia-debug (build.sh Step 6) — the SAME c8s rootfs + in-guest
# stack with the NVIDIA payload grafted from kata's stock GPU image,
# booting kata's GPU kernel. Pulled by the GPU image puller for the
# kata-qemu-snp-nvidia RuntimeClass (docs/kata-gpu.md).

on:
  # Run AFTER the Docker workflow finishes so the cds/get-cert image digests
  # we bake into the bootstrap allowlist (fetch.sh, via `oras manifest fetch
  # ghcr.io/confidential-dot-ai/{cds,get-cert}:<IMAGE_TAG>`) are the ones docker.yml
  # just published — not whatever stale digests were on `main` at the moment
  # of a concurrent push. The job-level `if:` below gates on a successful
  # Docker push to main or a release tag (excludes Docker's own PR runs and
  # side-branch pushes — those never build or publish).
  #
  # No `pull_request:` trigger: the build is long (historically 45+ min;
  # ~13 min with warm caches, ~4 min once the kernel + base-rootfs caches
  # hit) and historically flaky on upstream deps (snapshot.ubuntu.com 5xx,
  # docker+apparmor on newer runners — both off the hot path on cache hits).
  # Cost of a post-merge break is "revert + open follow-up"; paid PR feedback
  # isn't worth the build × every push. Use workflow_dispatch to rebuild on
  # demand.
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # One build per *commit*, keyed on the triggering Docker run's head_sha — NOT
  # per ref. Under the workflow_run trigger github.ref is always the default
  # branch (refs/heads/main), the ref this workflow file lives on, regardless of
  # which commit Docker actually succeeded on — the same reason the Checkout step
  # below builds from workflow_run.head_sha rather than github.sha. So the old
  # `${{ github.workflow }}-${{ github.ref }}` group collapsed EVERY run into one
  # bucket: each new merge to main (and even side-branch / tag Docker
  # completions, whose jobs the `if:` later skips) shared the group, so with
  # cancel-in-progress a new merge killed the in-flight build and that commit's
  # measured guest image was never published. Keying on head_sha gives a distinct
  # group per commit, so every merge to main builds to completion (they serialize
  # on the single self-hosted `the-machine` runner); only a duplicate run of the
  # *same* commit shares a group. workflow_dispatch has no workflow_run payload,
  # so it falls back to github.sha (the dispatched commit) — still per-commit.
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.sha }}
  # Never cancel an in-flight build: we want every commit on main to publish its
  # kata-guest-base. A same-commit re-run queues behind the running one (which it
  # would just reproduce) instead of killing it.
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # Kata release the guest-base is built against. Drives the kata-static
  # download + its cache key below, and is inherited by build.sh (whose own
  # KATA_VERSION default is just the local-build fallback — keep it in sync).
  KATA_VERSION: "3.30.0"
  # steep ref the guest kernel is built against. Single source of truth: the
  # checkout pins it and the kernel-output cache key below is scoped to it (a
  # different steep => a potentially different kernel). Pinned to a main
  # commit now that PR #13 (feat/kernel-config) has merged. Bump deliberately:
  # steep main's kernel fragments move (e.g. #16 added dm-crypt/AES-XTS, #21
  # added VIRTIO_IOMMU to required.config), so a new pin means a new guest
  # kernel and therefore a new SNP launch measurement.
  STEEP_REF: "96975ef5407035f766b6b48051ebf3a5e4a9632c"

jobs:
  build:
    name: Build kata-guest-base
    # workflow_run fires for every Docker completion — including its PR runs,
    # which don't publish. Gate the AUTOMATIC path to "Docker succeeded on main
    # or a release tag (v*)": those are the only refs we publish a
    # kata-guest-base image for, so a side-branch push never triggers the
    # ~45-min build or pushes a branch-* tag (head_branch is the source ref of
    # the triggering Docker event — "main", the tag name, or a branch name).
    #
    # Accept BOTH origins of that Docker run: a push (the normal merge-to-main
    # path) and a workflow_dispatch (the manual rebuild — e.g. re-baking a
    # rotated READ_PRIVATE_GHCR_TOKEN into the measured rootfs without a source
    # change). A dispatched Docker run on main publishes every component at this
    # commit's :<short-sha> just like a push does, so cascading off it produces
    # a correct measured image; the head_branch == main / v* guard still keeps a
    # dispatched side-branch Docker run from auto-triggering this build.
    #
    # This workflow's OWN workflow_dispatch stays the manual-rebuild escape
    # hatch and always runs — it can be invoked on a side branch on purpose, and
    # that path does publish a branch-* tag (see Compute tags).
    #
    # head_repository == repository: belt-and-braces against checking out fork
    # code in this packages:write context (CodeQL js/actions/unsafe-checkout).
    # Already unreachable — fork pushes never trigger base-repo workflows and
    # the event filter above excludes Docker's pull_request runs — but the
    # explicit guard makes the invariant local instead of inferred.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_repository.full_name == github.repository &&
       (github.event.workflow_run.event == 'push' ||
        github.event.workflow_run.event == 'workflow_dispatch') &&
       (github.event.workflow_run.head_branch == 'main' ||
        startsWith(github.event.workflow_run.head_branch, 'v')))
    # Self-hosted runner (the SEV-SNP build host) rather than a GitHub-hosted
    # ubuntu image. See the build-deps / glibc / AppArmor notes below for the
    # provisioning invariants this runner has to satisfy.
    runs-on: the-machine
    steps:
      # Source layout in the runner workspace mirrors local dev:
      #   ./c8s
      #   ./attestation-service
      #   ./steep
      # so the scripts' WORKSPACE resolution (IMAGE_DIR/../..) finds
      # both sibling repos without env overrides.
      - name: Checkout c8s
        # On workflow_run, default GITHUB_SHA is the workflow's own ref (main)
        # — not the SHA Docker just succeeded on. Use head_sha so we build the
        # same commit whose images we'll bake into the allowlist.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          path: c8s

      - name: Checkout attestation-rs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: confidential-dot-ai/attestation-rs
          path: attestation-rs
          token: ${{ secrets.ATTESTATION_REPO_TOKEN || github.token }}

      - name: Checkout steep
        # Pinned to a steep main commit — PR #13 (feat/kernel-config) merged
        # 2026-06-03, so main carries `steep kernel --kernel-config-fragment`,
        # which build.sh needs to fold c8s's kernel/container.config into the
        # guest kernel. STEEP_REF above is the single source of truth.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: confidential-dot-ai/steep
          ref: ${{ env.STEEP_REF }}
          path: steep
          token: ${{ secrets.STEEP_REPO_TOKEN || github.token }}

      # --- Build the in-guest binaries ---------------------------------

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Derive the toolchain from the module itself rather than a separate
          # GO_VERSION pin — one source of truth (c8s/go.mod), and no drift
          # between this workflow, docker.yml and go.mod. go.mod declares the
          # minor only (go 1.26), so this floats to the latest 1.26.x patch.
          go-version-file: c8s/go.mod
          cache-dependency-path: c8s/go.sum

      - name: Build c8s-node binary (ratls-mesh entry)
        working-directory: c8s
        run: make build-c8s-node

      - name: Build policy-monitor binary
        working-directory: c8s
        run: make build-policy-monitor

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.12.0

      # attestation-rs changes less often than this repo, so cache the built
      # binary keyed on its source and skip the build (+ its apt dep) on a hit.
      # restore/save are split (not the unified `cache` action) on purpose: the
      # unified action only saves on a fully green job (its post step is
      # post-if: success()). While the downstream kata-guest-base build is being
      # stabilised the job fails late, which skips that save — so the binary
      # never caches and every run rebuilds it cold. The Save step below runs
      # right after the build, before that flaky step.
      - name: Restore attestation-api build
        id: attestation-api-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: attestation-rs/target/release/attestation-api
          key: ${{ runner.os }}-attestation-api-${{ hashFiles('attestation-rs/Cargo.lock', 'attestation-rs/Cargo.toml', 'attestation-rs/crates/**') }}

      # attestation-api links tss-esapi-sys, whose build.rs resolves the TPM2-TSS
      # system library via pkg-config (tss2-sys.pc, shipped by libtss2-dev) for
      # the TPM/vTPM path. Mirrors attestation-rs's own CI.
      - name: Install attestation-api build deps (TPM2-TSS)
        if: steps.attestation-api-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev

      # Build directly on the runner. Constraint: the runner's glibc must stay
      # <= the noble guest's (2.39), or the binary dies inside the guest with
      # "GLIBC_x.xx not found" and blocks c8s-ready.target. On the self-hosted
      # `the-machine` runner this is a provisioning invariant rather than a
      # property we get for free from a GitHub-hosted image: keep its toolchain
      # glibc <= 2.39 (e.g. build in a noble container/sysroot if the host is
      # newer). (musl would dodge glibc but can't resolve tss2-sys via
      # pkg-config, so the glibc pin is the lever here.)
      - name: Build attestation-api
        id: build-attestation-api
        if: steps.attestation-api-cache.outputs.cache-hit != 'true'
        working-directory: attestation-rs
        run: cargo build --release -p attestation-api --bin attestation-api

      # Save now, before the kata-guest-base step that fails today — see the
      # restore-step note for why the unified cache action wouldn't.
      - name: Save attestation-api build
        if: steps.attestation-api-cache.outputs.cache-hit != 'true' && steps.build-attestation-api.outcome == 'success'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: attestation-rs/target/release/attestation-api
          key: ${{ steps.attestation-api-cache.outputs.cache-primary-key }}

      # --- Build steep (kernel only) + its sandbox deps ----------------
      # steep is used ONLY to compile the hardened guest kernel here; the
      # rootfs is built by kata's osbuilder (in Docker) inside build.sh.
      # The mkosi/systemd-container/uv steps below are steep's kernel-
      # builder sandbox deps.

      - name: Setup uv (mkosi v26 toolchain)
        uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4 # v6.7.0

      - name: Setup mkosi
        # Keep in lockstep with steep/.github/workflows/base.yml.
        uses: systemd/mkosi@84af20892b61c8e177e391f997ded8b4cb5514f2 # v26

      - name: Install systemd-container (mkosi sandbox dep)
        run: sudo apt-get update && sudo apt-get install -y systemd-container

      # restore/save split for the same reason as attestation-api above —
      # the save must not hang off whole-job success while we stabilise the
      # kata-guest-base build.
      - name: Restore steep build
        id: steep-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: steep/target/release/steep
          key: ${{ runner.os }}-steep-${{ hashFiles('steep/Cargo.lock', 'steep/src/**', 'steep/crates/**') }}

      # steep changes less often than this repo; skip the rebuild when the cached
      # binary matches the source. (Without this gate the cache restored the
      # binary but cargo rebuilt it anyway — its fingerprints aren't cached.)
      - name: Build steep
        id: build-steep
        if: steps.steep-cache.outputs.cache-hit != 'true'
        working-directory: steep
        run: cargo build --release

      - name: Save steep build
        if: steps.steep-cache.outputs.cache-hit != 'true' && steps.build-steep.outcome == 'success'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: steep/target/release/steep
          key: ${{ steps.steep-cache.outputs.cache-primary-key }}

      # --- Assemble + build the rootfs image ---------------------------

      # Set up oras BEFORE fetch.sh runs: the script's bootstrap-
      # allowlist substitution step calls `oras manifest fetch` against
      # the c8s container images at this commit's tag to pin their
      # SHA-256 digests into /etc/c8s/bootstrap-allowlist.json (which
      # ends up in the dm-verity root and thus the launch measurement).
      # Without oras available, the digest substitution fails fast and
      # the build is aborted — by design; an unpinned allowlist would be
      # silently permissive.
      - name: Setup ORAS
        uses: oras-project/setup-oras@8d34698a59f5ffe24821f0b48ab62a3de8b64b20 # v1.2.3

      # Log in to GHCR for the manifest-fetch step. GHCR allows
      # anonymous reads of public images, but the c8s images are
      # currently private at certain tags; logging in unconditionally
      # avoids a "works on main, breaks on a PR branch" pit. Same
      # token as the publish step below.
      - name: Log in to GHCR (for digest resolution)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch kata-guest-base extras (binaries + unit + config + allowlist)
        working-directory: c8s/kata-guest-base
        env:
          # IMAGE_TAG is the published tag whose cds/get-cert image digests get
          # baked into the bootstrap allowlist. Use the short SHA Docker just
          # published (docker.yml's metadata-action emits `type=sha,prefix=`,
          # which tags every push by 7-char short SHA), so the baked digests —
          # and the launch measurement that pins them — are tied to an
          # immutable commit rather than wherever `main` happens to point at
          # build time. The workflow_run trigger already ensures Docker
          # succeeded on this same head_sha before we get here.
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          # READ_PRIVATE_GHCR_TOKEN (classic read:packages PAT, repo secret):
          # in-guest GHCR creds baked into the dm-verity rootfs so kata's
          # experimental_force_guest_pull can fetch PRIVATE
          # ghcr.io/confidential-dot-ai workload images (fetch.sh ->
          # /etc/c8s/ghcr-auth.json -> tmpfiles copies it to
          # /run/image-security/auth.json at boot). If unset, fetch.sh bakes
          # an empty auth set (anonymous, no secret in the image). Baking a
          # credential into the measured rootfs is a deliberate, documented
          # tradeoff while the repos are private — see docs/pitfalls.md
          # "ghcr-auth.json".
          # GHCR validates the token not the username, but it must be non-empty —
          # pass the repo owner.
          READ_PRIVATE_GHCR_TOKEN: ${{ secrets.READ_PRIVATE_GHCR_TOKEN }}
          GHCR_PULL_USER: ${{ github.repository_owner }}
        run: |
          # docker.yml tags every push by 7-char short SHA
          # (metadata-action `type=sha,prefix=`), so trim head_sha to match.
          export IMAGE_TAG="${HEAD_SHA::7}"
          ./scripts/fetch.sh

      # build.sh runs osbuilder's image-builder on the host (loop-device
      # partitioning fails inside a container) and bakes a pause bundle, so it
      # needs umoci (not packaged on ubuntu — static binary), skopeo, the
      # verity/image tools, and zstd (to unpack kata-static below). docker, sudo,
      # jq, yq, gh, rsync and systemctl ship by default on GitHub-hosted ubuntu;
      # on the self-hosted `the-machine` runner they must be preprovisioned.
      - name: Install kata-guest-base build deps
        run: c8s/kata-guest-base/scripts/ci/install-build-deps.sh

      # The staged artifacts are immutable per kata version, so cache them —
      # the multi-GB kata-static download then happens once, not on every run.
      # v2: the set grew from the confidential image alone to + the NVIDIA
      # confidential image + NVIDIA guest kernel (Step 6 graft sources, so the
      # build no longer needs kata-deploy's /opt/kata on the runner host); the
      # key bump retires v1 caches that lack the NVIDIA artifacts.
      - name: Restore kata guest artifacts
        id: kata-conf-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/kata-conf
          key: kata-guest-artifacts-v2-${{ env.KATA_VERSION }}

      # Stage kata's confidential rootfs image (the source of the CoCo
      # guest-components that build.sh bakes into the measured rootfs) plus
      # the stock NVIDIA confidential image + guest kernel (Step 6's graft
      # sources), all from the sha-pinned kata-static release.
      # Standalone script so shellcheck sees it; reads KATA_VERSION + the
      # runner's RUNNER_TEMP/GITHUB_ENV and exports KATA_CONFIDENTIAL_IMG,
      # KATA_NVIDIA_CONFIDENTIAL_IMG and KATA_NVIDIA_VMLINUZ.
      - name: Stage kata guest artifacts (CoCo + NVIDIA graft sources)
        id: stage-kata-conf
        run: c8s/kata-guest-base/scripts/ci/stage-kata-conf.sh

      # Save right after staging (see the attestation-api note): the unified
      # cache action would skip this when the kata-guest-base build later fails,
      # forcing the multi-GB kata-static re-download on every run.
      - name: Save kata guest artifacts
        if: steps.kata-conf-cache.outputs.cache-hit != 'true' && steps.stage-kata-conf.outcome == 'success'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/kata-conf
          key: ${{ steps.kata-conf-cache.outputs.cache-primary-key }}

      # Cache the pre-overlay base rootfs (build.sh Step 2/5: osbuilder's
      # debootstrap + kata-agent, ~4 min + the snapshot.ubuntu.com flake
      # surface). Nothing commit-specific enters the rootfs until Step 3's
      # overlay, so it is reusable across builds. The cache unit is a
      # build.sh-produced sudo-tar (ROOTFS_CACHE_TAR env on the build step),
      # NOT the directory: actions/cache tars as the runner user and would
      # drop the root ownership + security.capability xattrs that feed the
      # measured verity root.
      #
      # Key: KATA_VERSION (osbuilder + agent + toolchain pins all derive from
      # it) + build.sh itself, whose Step 2 block holds the remaining inputs
      # (DISTRO/OS_VERSION/AGENT_*/EXTRA_PKGS). Hashing the whole script
      # over-invalidates — any build.sh edit re-pays the ~4 min — which is the
      # safe direction; a stale hit is impossible by construction. No
      # restore-keys: a partial-input match could resurrect a rootfs built
      # with different packages into the measured image.
      - name: Restore base rootfs
        id: rootfs-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/kata-base-rootfs.tar.zst
          key: kata-base-rootfs-${{ env.KATA_VERSION }}-${{ hashFiles('c8s/kata-guest-base/scripts/build.sh') }}

      # Cache the guest kernel build output (steep/output/kernel) — the most
      # expensive INVARIANT in this job. build.sh Step 1/5 runs `steep kernel`,
      # which short-circuits the compile + the mkosi tools-tree build (and the
      # kernel-source download under output/kernel/cache/) when its
      # manifest.json fingerprint matches the inputs (steep
      # src/commands/kernel.rs).
      #
      # The resolved-config snapshot (steep/kernel/config-x86_64.snapshot) MUST
      # be cached alongside: steep rewrites it during the build (committed
      # baseline + our container.config fragment merged in) and hashes it into
      # the fingerprint. Without it a fresh steep checkout reverts the snapshot
      # to the committed baseline, the fingerprint never matches, and the
      # "cached" kernel rebuilds every run — tools tree (~200s) + compile
      # (~150s) — which is exactly what happened before the -v2 key.
      # Bumping the version literal busts stale entries (cache keys are
      # immutable, so an exact hit on a bad entry would skip the save forever).
      # -v2 dropped the old snapshot-less entries; -v3 drops the incomplete
      # ~30 KiB snapshot-only entries an unguarded always()-save once seeded
      # when a build died mid-kernel (see the Save step's completeness guard).
      #
      # Key on STEEP_REF (a different steep can yield a different kernel) + the
      # c8s kernel config fragment; restore-keys falls back to the latest
      # same-steep cache so even a fragment change reuses the cached
      # kernel-source tarball. steep re-validates the fingerprint internally,
      # so a stale restore can never yield the wrong kernel — it just rebuilds.
      # Restore here (before build); the matching always()-save is after the
      # build step below.
      - name: Restore guest kernel build
        id: kernel-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            steep/output/kernel
            steep/kernel/config-x86_64.snapshot
          key: ${{ runner.os }}-kata-kernel-v3-${{ env.STEEP_REF }}-${{ hashFiles('c8s/kata-guest-base/kernel/container.config') }}
          restore-keys: |
            ${{ runner.os }}-kata-kernel-v3-${{ env.STEEP_REF }}-

      # Cache steep's mkosi kernel-builder tools tree (build.sh Step 1 →
      # `steep kernel` Step 0a). The tools tree is the only part of this job
      # that talks to snapshot.ubuntu.com — the point-in-time apt mirror
      # pinned in steep's mkosi/kernel-builder/mkosi.conf — which 5xxes often
      # enough to be the job's top flake source. A cache hit takes it off the
      # network entirely: steep owns the reuse decision (it stamps
      # mkosi.output/.steep-tools-stamp with the mkosi.conf hash and skips the
      # `sudo mkosi --force` rebuild on a match — src/commands/kernel.rs
      # ensure_tools_tree), so a restored tree short-circuits Step 0a and a
      # stale one is merely rebuilt, never trusted.
      #
      # Like the base rootfs, the cache unit is a sudo-tar, NOT the directory:
      # mkosi runs under sudo and leaves a root-owned tree, and actions/cache
      # tars as the runner user, which would drop that ownership. The tarball
      # contains mkosi.output itself (not just its contents) so the
      # directory's own ownership/mode round-trip too — steep (running
      # unprivileged) must still be able to manage the stamp file inside.
      #
      # Key: the mkosi.conf hash — the exact digest steep stamps the tree
      # with (the snapshot mirror URL and package list are both in that file)
      # — plus a mkosi version literal, because the stamp only covers the
      # conf while the tree is built by whatever mkosi the Setup step
      # installs. Keep "mkosi-v26" in lockstep with the Setup mkosi step
      # above. No restore-keys: a prefix match could only restore a
      # stamp-mismatched tree that steep would rebuild anyway.
      - name: Restore kernel-builder tools tree
        id: tools-tree-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/steep-tools-tree.tar.zst
          key: ${{ runner.os }}-steep-tools-tree-mkosi-v26-${{ hashFiles('steep/mkosi/kernel-builder/mkosi.conf') }}

      - name: Unpack kernel-builder tools tree
        if: steps.tools-tree-cache.outputs.cache-hit == 'true'
        run: |
          sudo tar --zstd --numeric-owner --xattrs --xattrs-include='*' \
            -xpf "${RUNNER_TEMP}/steep-tools-tree.tar.zst" \
            -C steep/mkosi/kernel-builder

      # kata osbuilder's rootfs-builder Dockerfile fails its first RUN with
      # "apparmor failed to apply profile: ... /proc/thread-self/attr/apparmor/
      # exec: no such file or directory" on newer ubuntu runners. kata's own
      # rootfs.sh already adds --security-opt apparmor=unconfined to its
      # `docker run` (rootfs-builder/rootfs.sh ~L335) but not to its
      # `docker build`, and exposes no env hook to inject one. Disable
      # apparmor on the runner before invoking osbuilder.
      #
      # NOTE: on the self-hosted `the-machine` runner this is NOT bounded to a
      # single ephemeral job the way it was on a throwaway GitHub-hosted VM —
      # the host persists across jobs, so leaving AppArmor torn down would
      # weaken every later workload on it. The "Re-enable AppArmor" step below
      # (if: always()) restores it once the build is done or has failed.
      - name: Disable AppArmor for kata osbuilder docker build
        run: |
          sudo systemctl stop apparmor.service || true
          sudo aa-teardown || true
          sudo systemctl restart docker

      - name: Build kata-guest-base image (steep kernel + kata osbuilder)
        working-directory: c8s/kata-guest-base
        env:
          # build.sh fetches the kata-containers source at the pinned
          # version via `gh api .../tarball` (the repo's git remote is
          # SSH-gated), then drives osbuilder in Docker (which must be
          # available on the self-hosted `the-machine` runner). gh needs a
          # token even for the public repo.
          GH_TOKEN: ${{ github.token }}
          # Base-rootfs cache handshake (see "Restore base rootfs"): when the
          # restore populated this tarball, build.sh unpacks it and skips
          # Step 2; otherwise build.sh packs the freshly built rootfs here,
          # right after Step 2, for the Save step below.
          ROOTFS_CACHE_TAR: ${{ runner.temp }}/kata-base-rootfs.tar.zst
          # Snapshot drift gate: on the master / release-tag publish path, make
          # build.sh abort at Step 1 (before osbuilder + the GHCR push) if the
          # resolved kernel config doesn't match the committed lockfile
          # kata-guest-base/kernel/config-x86_64.snapshot. Off for
          # workflow_dispatch (head_branch empty) so a side-branch test build of
          # an in-flight kernel change can still publish a branch-* image before
          # the snapshot is committed.
          CHECK_SNAPSHOT: ${{ (github.event.workflow_run.head_branch == 'main' || startsWith(github.event.workflow_run.head_branch, 'v')) && '1' || '0' }}
          # GPU variants are mandatory in CI. build.sh Step 6 grafts the
          # NVIDIA payload from the staged kata-static artifacts
          # (KATA_NVIDIA_CONFIDENTIAL_IMG / KATA_NVIDIA_VMLINUZ, exported by
          # the staging step above) — no /opt/kata needed on the runner host.
          BUILD_NVIDIA: "1"
        run: ./scripts/build.sh

      # Restore the AppArmor posture torn down above. if: always() so it runs
      # whether the build succeeded or failed — on the persistent self-hosted
      # runner we must not leave the host with AppArmor disabled for the next
      # job. Best-effort (|| true): the worst case is a stale teardown that the
      # next run's disable step would redo anyway.
      - name: Re-enable AppArmor
        if: always()
        run: |
          sudo systemctl start apparmor.service || true
          sudo systemctl restart docker || true

      # Save the guest kernel build even when a LATER step failed — the kernel
      # is Step 1/5 of build.sh, so an osbuilder/rootfs/publish failure (the
      # historically flaky part) still leaves a complete output/kernel worth
      # keeping. if: always() is the whole point: the default success()-gated
      # post-save of the unified cache action would skip on those late failures
      # and re-pay the ~10-min compile next run. Skip only on an exact-key hit
      # (nothing new to store); a restore-keys-only (prefix) hit still saves
      # under the new fragment's key.
      #
      # COMPLETENESS GUARD: always() also fires when the build died DURING the
      # kernel (a Step 0a tools-tree flake or a Step 0d compile error) — but by
      # then Step 0c.5 has already written steep/kernel/config-x86_64.snapshot,
      # so an unguarded save banks a snapshot-only ~30 KiB cache with no
      # vmlinuz/manifest. That entry then exact-hits the key forever (this save
      # only re-runs on a miss), so every later build recompiles against a cache
      # that can never satisfy steep's fingerprint. Only save when output/kernel
      # is actually complete — the same existence-probe the rootfs/tools-tree
      # saves use.
      - name: Check guest kernel output
        id: kernel-out
        if: always()
        run: |
          if [[ -f steep/output/kernel/vmlinuz && -f steep/output/kernel/manifest.json ]]; then
            echo "complete=true" >> "${GITHUB_OUTPUT}"
          else
            echo "complete=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Save guest kernel build
        if: always() && steps.kernel-cache.outputs.cache-hit != 'true' && steps.kernel-out.outputs.complete == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          # Keep in lockstep with the Restore step: the snapshot must travel
          # with output/kernel or steep's fingerprint check misses every run.
          path: |
            steep/output/kernel
            steep/kernel/config-x86_64.snapshot
          key: ${{ runner.os }}-kata-kernel-v3-${{ env.STEEP_REF }}-${{ hashFiles('c8s/kata-guest-base/kernel/container.config') }}

      # Publish the resolved kernel-config snapshot build.sh wrote in Step 1
      # (steep's required+hardening baseline + our container.config, merged) as
      # a downloadable artifact — the runner-produced source of truth for the
      # committed lockfile kata-guest-base/kernel/config-x86_64.snapshot and the
      # reference a future drift gate diffs. Pulling it from the build (not the
      # kernel cache) means it always matches THIS run's kernel; the cache can
      # legitimately hold an earlier resolve. always() + warn: the snapshot is
      # written early (Step 1), so it's captured even when a later
      # osbuilder/publish step fails; a build that died before Step 1 has
      # nothing to upload and the warn is harmless.
      - name: Upload kernel-config snapshot
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: config-x86_64.snapshot
          path: c8s/kata-guest-base/kernel/config-x86_64.snapshot
          if-no-files-found: warn

      # Pack + save the kernel-builder tools tree (see the Restore step
      # above). The stamp file is the completeness witness: steep writes it
      # only after a successful `mkosi --force` and wipes it before any
      # rebuild, so stamp present ⇒ tree complete, and a Step-0a failure
      # (e.g. snapshot.ubuntu.com 5xx mid-build) leaves nothing to save.
      # if: always() for the usual reason — the historically flaky steps come
      # later, and the tools tree is worth banking even when they fail. Note
      # a kernel-cache HIT run skips Step 0a entirely and produces no tree;
      # exists=false then skips the save, leaving the cold-build run to seed
      # this cache.
      - name: Pack kernel-builder tools tree
        id: tools-tree-tar
        if: always() && steps.tools-tree-cache.outputs.cache-hit != 'true'
        run: |
          if [[ -f steep/mkosi/kernel-builder/mkosi.output/.steep-tools-stamp ]]; then
            sudo tar --zstd --numeric-owner --xattrs --xattrs-include='*' \
              -cpf "${RUNNER_TEMP}/steep-tools-tree.tar.zst" \
              -C steep/mkosi/kernel-builder mkosi.output
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Save kernel-builder tools tree
        if: always() && steps.tools-tree-cache.outputs.cache-hit != 'true' && steps.tools-tree-tar.outputs.exists == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/steep-tools-tree.tar.zst
          key: ${{ steps.tools-tree-cache.outputs.cache-primary-key }}

      # build.sh packs the tarball right after Step 2, before the later steps
      # that historically fail, so an always()-save still banks the ~4-min
      # rootfs on a late failure. But a failure DURING Step 2 leaves no
      # tarball, and hashFiles() can't see RUNNER_TEMP — probe with a step so
      # the save doesn't error on a missing path.
      - name: Check base rootfs tarball
        id: rootfs-tar
        if: always()
        run: echo "exists=$([[ -f "${RUNNER_TEMP}/kata-base-rootfs.tar.zst" ]] && echo true || echo false)" >> "${GITHUB_OUTPUT}"

      - name: Save base rootfs
        if: always() && steps.rootfs-cache.outputs.cache-hit != 'true' && steps.rootfs-tar.outputs.exists == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/kata-base-rootfs.tar.zst
          key: ${{ steps.rootfs-cache.outputs.cache-primary-key }}

      # --- Push to GHCR ------------------------------------------------
      #
      # The job-level `if:` already gates the whole job on a successful
      # Docker push to main / a release tag (or a manual workflow_dispatch),
      # so we publish unconditionally here. Tag derivation uses
      # `head_branch`/`head_sha` from the
      # workflow_run payload so the published tags match the commit Docker
      # just succeeded on (not this workflow's own ref, which is the default
      # branch under workflow_run). workflow_dispatch falls back to github.*.
      #
      # We already logged in to GHCR earlier for the digest-resolution step
      # that feeds the bootstrap allowlist, so no second login is needed.

      - name: Compute tags
        id: tags
        env:
          # head_branch is the source branch of the triggering Docker event:
          # "main" for a main push, the tag name (e.g. "v0.1.0") for a tag push.
          # github.ref_name is the workflow_dispatch fallback.
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: c8s/kata-guest-base/scripts/ci/compute-tags.sh

      - name: Push to GHCR
        working-directory: c8s/kata-guest-base/output
        run: |
          set -euo pipefail
          # The artifact is the kata-native guest: vmlinuz + the dm-verity
          # rootfs image + the verity-params / rootfs-type sidecars +
          # manifest.json. The puller pulls all of these (see
          # kata-image-puller.yaml).
          oras push "${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.tags }}" \
            --artifact-type application/vnd.confidential.kata-guest.v2 \
            ./*

      - name: Push debug variant to GHCR
        working-directory: c8s/kata-guest-base/output-debug
        run: |
          set -euo pipefail
          # Same layout as the locked artifact, one delta: the guest policy
          # allows host log/exec streams (kubectl logs / exec). Published in
          # lockstep at <tag>-debug so kata.guestImage.debug=true can derive
          # the ref from any locked tag (see workflow header).
          oras push "${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.debug_tags }}" \
            --artifact-type application/vnd.confidential.kata-guest.v2 \
            ./*

      # Confidential-GPU variants: the SAME c8s rootfs + in-guest stack +
      # locked policy, with the NVIDIA payload grafted from the stock kata
      # GPU image and kata's GPU kernel (build.sh Step 6). Published as
      # <tag>-nvidia / <tag>-nvidia-debug in lockstep with the non-GPU pair;
      # the chart derives all four from kata.guestImage.tag + debug
      # (c8s.kataGuestImageTag / c8s.kataGuestImageNvidiaTag).
      - name: Push nvidia variant to GHCR
        working-directory: c8s/kata-guest-base/output-nvidia
        env:
          IMAGE: ${{ steps.tags.outputs.image }}
          BASE_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail
          nv_tags=""
          IFS=',' read -ra base <<< "${BASE_TAGS}"
          for t in "${base[@]}"; do nv_tags="${nv_tags}${nv_tags:+,}${t}-nvidia"; done
          echo "==> oras push ${IMAGE}:${nv_tags}"
          oras push "${IMAGE}:${nv_tags}" \
            --artifact-type application/vnd.confidential.kata-guest.v2 \
            ./*

      - name: Push nvidia debug variant to GHCR
        working-directory: c8s/kata-guest-base/output-nvidia-debug
        env:
          IMAGE: ${{ steps.tags.outputs.image }}
          BASE_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail
          nv_tags=""
          IFS=',' read -ra base <<< "${BASE_TAGS}"
          for t in "${base[@]}"; do nv_tags="${nv_tags}${nv_tags:+,}${t}-nvidia-debug"; done
          echo "==> oras push ${IMAGE}:${nv_tags}"
          oras push "${IMAGE}:${nv_tags}" \
            --artifact-type application/vnd.confidential.kata-guest.v2 \
            ./*

  # RETIRED: the interim build-nvidia job (repackaging the stock kata GPU
  # rootfs verbatim on ubuntu-latest) is gone — the GPU variants are now real
  # c8s guests built by `build` above alongside the non-GPU pair.
