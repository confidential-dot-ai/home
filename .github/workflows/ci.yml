name: CI

on:
  push:
    branches: [main, "feat/**"]
    tags: ["v*"]
  pull_request:
    branches: [main, "feat/**"]

env:
  GO_VERSION: "1.26.1"

concurrency:
  group: ci-${{ github.ref }}-tests
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Check formatting
        run: make fmt

      - name: Vet
        run: make vet

      - name: Install controller-gen
        run: make install-controller-gen

      - name: Check chart CRDs
        run: make check-crd-chart

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: make test
