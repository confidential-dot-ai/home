<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Allowlist write flow: an attested writer attests to the CDS, receives an EAR bound to the exact change (pbh), then POSTs to /allowlist with that EAR; the CDS verifies the signature, the writer's measurement, and the body hash before committing.">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7.5,3 L0,6 z" fill="#7c7a72" />
    </marker>
  </defs>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .card { fill: #ffffff; stroke: #e4e2dc; }
    .actor { fill: #f6f5f1; stroke: #d9d7d0; }
    .an { fill: #1f1f1d; font-size: 13px; font-weight: 600; }
    .as { fill: #6b6b66; font-size: 10.5px; }
    .life { stroke: #dcdad3; stroke-width: 1; stroke-dasharray: 3 4; }
    .req { stroke: #7c7a72; stroke-width: 1.5; }
    .res { stroke: #7c7a72; stroke-width: 1.5; stroke-dasharray: 5 4; }
    .lbl { fill: #4a4a46; font-size: 11.5px; }
    .note { fill: #faf6e8; stroke: #8a5a00; }
    .nt { fill: #8a5a00; font-size: 10.5px; }
  </style>

  <rect class="card" x="0.5" y="0.5" width="719" height="339" rx="10" />

  <line class="life" x1="170" y1="64" x2="170" y2="312" />
  <line class="life" x1="556" y1="64" x2="556" y2="312" />

  <rect class="actor" x="62" y="16" width="216" height="46" rx="7" />
  <text class="an" x="170" y="37" text-anchor="middle">Writer</text>
  <text class="as" x="170" y="52" text-anchor="middle">attested TEE · in write-measurements</text>

  <rect class="actor" x="456" y="16" width="200" height="46" rx="7" />
  <text class="an" x="556" y="37" text-anchor="middle">CDS</text>
  <text class="as" x="556" y="52" text-anchor="middle">EAR-signing key (bootstrap)</text>

  <!-- 1: attest -->
  <text class="lbl" x="363" y="88" text-anchor="middle">attest — evidence + intended change</text>
  <line class="req" x1="170" y1="96" x2="556" y2="96" marker-end="url(#ah)" />

  <!-- note: verify -->
  <rect class="note" x="430" y="114" width="252" height="30" rx="5" />
  <text class="nt" x="556" y="133" text-anchor="middle">verify evidence · measurement ∈ write-list</text>

  <!-- 3: EAR -->
  <text class="lbl" x="363" y="168" text-anchor="middle">EAR · pbh = SHA-256(change)</text>
  <line class="res" x1="556" y1="176" x2="170" y2="176" marker-end="url(#ah)" />

  <!-- 4: POST -->
  <text class="lbl" x="363" y="208" text-anchor="middle">POST /allowlist {digest, image} + Bearer EAR</text>
  <line class="req" x1="170" y1="216" x2="556" y2="216" marker-end="url(#ah)" />

  <!-- note: check -->
  <rect class="note" x="420" y="234" width="272" height="30" rx="5" />
  <text class="nt" x="556" y="253" text-anchor="middle">check sig · measurement · pbh = SHA-256(body)</text>

  <!-- 6: 204 -->
  <text class="lbl" x="363" y="288" text-anchor="middle">204 · version bumped</text>
  <line class="res" x1="556" y1="296" x2="170" y2="296" marker-end="url(#ah)" />
</svg>
