image:
  # Replace with the release image tag you are installing, for example v0.1.0.
  tag: v0.1.0

attestationService:
  image:
    tag: v0.1.0

assam:
  enabled: true
  image:
    tag: v0.1.0

certIssuer:
  enabled: true
  image:
    tag: v0.1.0

webhook:
  enabled: true
  apiKeySecret:
    name: c8s-workload-attestation
    key: token
    createInNamespaces:
      - default
